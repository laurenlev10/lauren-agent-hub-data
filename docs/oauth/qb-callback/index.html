<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuickBooks Authorization Callback</title>
<style>body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:680px;margin:50px auto;padding:0 18px;color:#222;line-height:1.6}h1{font-size:22px}code{background:#f3f3f3;padding:2px 6px;border-radius:4px;word-break:break-all}.box{background:#f7f7f9;border:1px solid #e2e2e8;border-radius:8px;padding:14px;margin:10px 0}button{font-size:15px;padding:8px 14px;border-radius:6px;border:1px solid #888;background:#fff;cursor:pointer}</style>
</head><body>
<h1>QuickBooks authorization received ✓</h1>
<p>Copy the values below and paste them back into the chat to finish connecting.</p>
<div class="box"><strong>Authorization code</strong><br><code id="code">—</code></div>
<div class="box"><strong>Realm ID (company ID)</strong><br><code id="realm">—</code></div>
<div class="box"><strong>Full URL</strong><br><code id="full">—</code></div>
<button onclick="copyAll()">Copy all</button>
<script>
  var p = new URLSearchParams(location.search);
  document.getElementById('code').textContent  = p.get('code') || '(none)';
  document.getElementById('realm').textContent = p.get('realmId') || '(none)';
  document.getElementById('full').textContent  = location.href;
  function copyAll(){
    navigator.clipboard.writeText('code='+(p.get('code')||'')+'\nrealmId='+(p.get('realmId')||'')+'\nstate='+(p.get('state')||''));
  }
</script>
</body></html>
