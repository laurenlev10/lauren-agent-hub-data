<script>
const KEY = "contract-review:clauses";
const DEFAULT_CLAUSES = [
  { id:"room_hold", label:"שמירה על החדר (Hold) — 24h Thursday→Friday", enabled:true, critical:true,
    what_to_check:`Contract explicitly states a 24-hour HOLD on the room from Thursday morning to Friday morning, with NO additional charge. The hotel cannot resell or relocate the room during that window.`,
    search_terms:`hold, Thursday, 24 hours, reserved, room reservation`,
    redline:`Add: "Hotel will hold the {venue_room} for 24 hours from Thursday 12:01 AM through Friday 12:01 AM at no additional charge. Hotel may not resell or relocate the room during this hold window."`
  },
  { id:"hall_size", label:"גודל האולם (≥ 2,500 sq ft)", enabled:true, critical:true,
    what_to_check:`Contract explicitly states the EXACT square footage of the event room, AND it is at least 2,500 sq ft. REJECT: vague language like "approximately", "flexible", or square footage below 2,500.`,
    search_terms:`square feet, sq ft, ft², sqft, room size, capacity`,
    redline:`Confirm/add: "The {venue_room} measures exactly {square_feet} sq ft (must be ≥ 2,500)."`
  },
  { id:"final_price", label:"מחיר סופי ≤ $1,500/day (incl. taxes + setup + cleaning + AV + parking)", enabled:true, critical:true,
    what_to_check:`Contract explicitly states ALL fees per day INCLUDING taxes + setup + cleaning + AV + parking. The final all-in daily total must NOT exceed $1,500/day. Watch for hidden fees: 'service charge', 'gratuity', 'resort fee', 'F&B minimum', or 'subject to change'.`,
    search_terms:`price, rate, total, daily, taxes, service charge, gratuity, resort fee, setup fee, cleaning fee, AV, parking`,
    redline:`Confirm/add: "All-inclusive daily rate (room + taxes + setup + cleaning + AV + parking + any service charges) shall not exceed $1,500.00/day for {date_range}. No additional fees may be added."`
  },
  { id:"free_parking", label:"חניה חינם לאורחים", enabled:true, critical:true,
    what_to_check:`Contract explicitly states parking is FREE for ALL event guests (vendors AND customers) for the entire event. REJECT: "valet only", "$X/car", "subject to availability", or "customers pay separately".`,
    search_terms:`parking, valet, self-parking, garage, free`,
    redline:`Add: "Self-parking is included for all event guests and vendors at NO charge for the entire {date_range}. No validation required."`
  },
  { id:"hours_in_out", label:"שעות כניסה ויציאה (setup + teardown)", enabled:true, critical:true,
    what_to_check:`Contract explicitly states the time vendors can ENTER (setup, Thursday morning) and EXIT (teardown, Sunday after close). Both times must be specific (e.g., "Thursday 8 AM" and "Sunday 8 PM"), not vague.`,
    search_terms:`setup, set-up, teardown, tear-down, load-in, load-out, access, vendor entry`,
    redline:`Add: "Vendor access for setup begins Thursday {thursday_date} at 8 AM. Teardown ends by Sunday {sunday_date} at 8 PM. Both at no additional charge."`
  },
  { id:"cancellation_policy", label:"Cancellation Policy — fee-free window", enabled:true, critical:true,
    what_to_check:`Contract has a CLEAR cancellation policy stating how many days before the event Lauren can cancel WITHOUT penalty. REJECT: "no refunds", silence, or unreasonably short windows (< 30 days).`,
    search_terms:`cancellation, refund, force majeure, termination, notice period`,
    redline:`Add: "Either party may cancel with at least 30 days' written notice prior to {start_date} for a 100% refund of deposit. Force-majeure events trigger a full refund or rescheduling option at Lauren's discretion."`
  },
  { id:"load_in_doors", label:"Load-in/Load-out — direct doors from parking (no elevator)", enabled:true, critical:true,
    what_to_check:`Contract states there are direct doors from the parking area to the event room — NO ELEVATOR REQUIRED for load-in/load-out. If elevator is the only path, that's a deal-breaker for vendor logistics.`,
    search_terms:`loading, load-in, doors, entrance, elevator, freight, ground level`,
    redline:`Add: "Vendors will have access via direct doors from {parking_area} to {venue_room}, with NO elevator required for load-in or load-out."`
  },
  { id:"fire_capacity", label:"Fire Code Capacity — max occupancy", enabled:true, critical:true,
    what_to_check:`Contract explicitly states the maximum occupancy of the room per Fire Code. Lauren needs this number to know how many customers can be admitted. REJECT: silence on this point.`,
    search_terms:`capacity, fire code, occupancy, maximum, fire marshal`,
    redline:`Confirm/add: "Maximum Fire Code occupancy of the {venue_room} is {max_capacity} persons."`
  },
  { id:"deposit_amount", label:"ערבות / Deposit — paid + refundable amounts", enabled:true, critical:true,
    what_to_check:`Contract explicitly states (a) the deposit amount Lauren must pay UPFRONT, (b) the date the deposit is due, (c) what amount of the deposit is REFUNDABLE after the event, and (d) under what conditions any portion is forfeited. REJECT: vague "per agreement" language.`,
    search_terms:`deposit, security deposit, refundable, forfeit, due, payment schedule`,
    redline:`Add: "Deposit of $X due {deposit_date}. Of this, $Y is refundable post-event upon room return in original condition (within 30 days). $Z is the non-refundable booking fee."`
  }
];

function loadClauses(){
  try { const s = JSON.parse(localStorage.getItem(KEY) || "null"); if (s && Array.isArray(s)) return s; } catch(e){}
  return structuredClone(DEFAULT_CLAUSES);
}
function saveClauses(c){ try { localStorage.setItem(KEY, JSON.stringify(c)); } catch(e){} }
function showToast(id){ const el=document.getElementById(id); if(!el)return; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"), 1400); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

let clauses = loadClauses();

</script>

function vpStatus(rec){
  const today = new Date().toISOString().slice(0, 10);
  const soon = new Date(Date.now() + 14 * 864e5).toISOString().slice(0, 10);
  const deps = rec.deposits || [], paid = rec.qb_paid_total || 0;
  if (deps.some(d => !vpDepPaid(rec, d) && d.due && d.due < today)) return ["🔴 דיפוזיט באיחור", "background:#fee2e2;color:#b91c1c"];
  if (deps.some(d => !vpDepPaid(rec, d) && d.due && d.due <= soon)) return ["⏳ דיפוזיט קרוב", "background:#fef3c7;color:#b45309"];
  if (rec.contract_total && paid >= rec.contract_total - 1) return ["✓ שולם במלואו", "background:#d1fae5;color:#059669"];
  if (rec.contract_total || deps.length || paid) return ["📒 במעקב", "background:#e0f2fe;color:#0369a1"];
  return ["▫ אין נתונים עדיין", "background:#f3f4f6;color:#6b7280"];
}
function vpRows(){
  if (VP_FOCUS && !VP_SHOW_ALL) {
    const hit = VP_EVS.filter(e => e.evkey === VP_FOCUS);
    if (hit.length) return hit;
  }
  const today = new Date().toISOString().slice(0, 10);
  const lo = new Date(Date.now() - 30 * 864e5).toISOString().slice(0, 10);
  const hi = new Date(Date.now() + 400 * 864e5).toISOString().slice(0, 10);
  let evs = VP_EVS.filter(e => e.start_date >= lo && e.start_date <= hi);
  if (!VP_SHOW_ALL) {
    const hasData = e => { const r = VP.events[e.evkey]; return r && (r.contract_total || (r.deposits || []).length || (r.qb_lines || []).length); };
    evs = evs.filter(e => hasData(e) || e.start_date >= today).slice(0, 12);
  }
  return evs;
}

function vpAddDays(ds, n){ const d=new Date(ds+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function vpFmtRange(sd, ed){
  if(!sd) return "";
  const M=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const a=new Date(sd+"T12:00:00"), b=new Date((ed||sd)+"T12:00:00");
  if(isNaN(a.getTime())) return "";
  const sameM=a.getMonth()===b.getMonth();
  return M[a.getMonth()]+" "+a.getDate()+"–"+(sameM?"":M[b.getMonth()]+" ")+b.getDate()+", "+b.getFullYear();
}
function vpWeekday(ds){
  const D=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const M=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const d=new Date(ds+"T12:00:00"); if(isNaN(d.getTime())) return ds;
  return D[d.getDay()]+", "+M[d.getMonth()]+" "+d.getDate();
}
function vpDetectBrand(rec, e){
  const s = ((rec.venue||(e&&e.venue)||"")+" "+(rec.room_name||"")+" "+(rec.contact_email||"")+" "+(rec.note||"")).toLowerCase();
  if(/bonvoy|marriott|courtyard|residence inn|fairfield|springhill|renaissance|sheraton|westin|four points|delta hotels|ac hotel|aloft|moxy|gaylord|le meridien|autograph/.test(s)) return "bonvoy";
  if(/ihg|holiday inn|crowne plaza|staybridge|candlewood|even hotel|avid|kimpton|intercontinental|hotel indigo|atwell/.test(s)) return "ihg";
  if(/hilton|honors|doubletree|hampton|embassy|garden inn|homewood|home2|tapestry|tru by|waldorf|conrad|canopy|signia|motto|spark by/.test(s)) return "hilton";
  return "";
}

function vpRec(evkey){
  if (!VP.events[evkey]) VP.events[evkey] = {};
  if (!VP.events[evkey].deposits) VP.events[evkey].deposits = [];
  return VP.events[evkey];
}
document.addEventListener("change", ev => {
  const el = ev.target.closest("[data-vp]");
  if (!el) return;
  const kind = el.getAttribute("data-vp"), evkey = el.getAttribute("data-ev"), i = +(el.getAttribute("data-i") || 0);
  if (!evkey) return;
  const rec = vpRec(evkey);
  if (kind === "signed_file_input") {
    const file = el.files && el.files[0]; if (!file) return;
    if (file.size > 25 * 1024 * 1024) { alert("הקובץ גדול מדי (מקסימום 25MB)"); el.value = ""; return; }
    const t = document.getElementById("vp-saved");
    if (t) { t.textContent = "⏳ מעלה חוזה..."; t.classList.add("show"); }
    vpUploadSigned(evkey, file).then(ok => {
      if (t) { t.textContent = ok ? "✓ החוזה החתום הועלה" : "⚠ ההעלאה נכשלה"; setTimeout(() => t.classList.remove("show"), 3500); }
      if (ok) vpRender();
    });
    el.value = "";
    return;
  }
  if (kind === "contract_total") rec.contract_total = el.value === "" ? null : +el.value;
  else if (kind === "note") rec.note = el.value;
  else if (kind === "contact") rec.contact = el.value;
  else if (kind === "contact_name") rec.contact_name = el.value;
  else if (kind === "contact_email") rec.contact_email = el.value;
  else if (kind === "room_name") rec.room_name = el.value;
  else if (kind === "room_sqft") rec.room_sqft = el.value;
  else if (kind === "unusual") rec.unusual = el.value;
  else if (kind === "dep_label") (rec.deposits[i] = rec.deposits[i] || {}).label = el.value;
  else if (kind === "dep_due") (rec.deposits[i] = rec.deposits[i] || {}).due = el.value;
  else if (kind === "dep_amount") (rec.deposits[i] = rec.deposits[i] || {}).amount = el.value === "" ? null : +el.value;
  else if (kind === "dep_paid") (rec.deposits[i] = rec.deposits[i] || {}).paid = el.checked;
});

    const removed = rec.team_notes.splice(i, 1);
    const ok = await vpSave(evkey);
    if (ok) vpRender(); else { rec.team_notes.splice(i, 0, removed[0]); alert("המחיקה נכשלה"); }
  }
  else if (kind === "dep_add") { vpRec(evkey).deposits.push({label: "", due: "", amount: null, paid: false}); vpRender(); }
  else if (kind === "dep_del") { vpRec(evkey).deposits.splice(+(el.getAttribute("data-i") || 0), 1); vpRender(); }
  else if (kind === "save") {
    el.disabled = true; el.textContent = "⏳";
    const ok = await vpSave(evkey);
    el.disabled = false; el.textContent = "💾 שמרי וסיום";
    const t = document.getElementById("vp-saved");
    if (t) { t.textContent = ok ? "✓ נשמר ב-GitHub" : "⚠ השמירה נכשלה"; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }
    if (ok) { VP_EDIT.delete(evkey); vpRender(); }
  }
  else if (kind === "sign") {
    const rec = vpRec(evkey); if (!rec.milestones) rec.milestones = {};
    rec.milestones.contract_signed = new Date().toISOString();
    const ok = await vpSave(evkey); if (ok) vpRender();
  }
  else if (kind === "unsign") {
    if (!confirm("לבטל את סימון 'חוזה נחתם'?")) return;
    const rec = vpRec(evkey); if (!rec.milestones) rec.milestones = {};
    rec.milestones.contract_signed = false;
    const ok = await vpSave(evkey); if (ok) vpRender();
  }
  else if (kind === "signed_file") {
    const inp = document.querySelector('input[data-vp="signed_file_input"][data-ev="' + evkey + '"]');
    if (inp) inp.click();
  }
  else if (kind === "edit") { VP_EDIT.add(evkey); vpRender(); }
  else if (kind === "edit_done") { VP_EDIT.delete(evkey); vpRender(); }
});
async function vpSave(evkey){
  const token = vpToken();
  if (!token) return false;
  const rec = vpRec(evkey);
  rec.deposits = (rec.deposits || []).filter(d => d.label || d.due || d.amount);
  const mine = { contract_total: rec.contract_total ?? null, deposits: rec.deposits, note: rec.note || "",
                 contract_checks: rec.contract_checks || {}, room_name: rec.room_name || "", room_sqft: rec.room_sqft || "",
                 contact: rec.contact || "", contact_name: rec.contact_name || "", contact_email: rec.contact_email || "",
                 unusual: rec.unusual || "", check_notes: rec.check_notes || {}, milestones: rec.milestones || {}, team_notes: rec.team_notes || [], signed_contract: rec.signed_contract || null,
                 updated_at: new Date().toISOString() };
  try {
    const api = "https://api.github.com/repos/" + VP_REPO + "/contents/" + VP_FILE;
    const g = await fetch(api + "?ref=main&_=" + Date.now(), { headers: {"Authorization": "token " + token, "Accept": "application/vnd.github+json"}, cache: "no-store" });
    let sha = null, cloud = { events: {} };
    if (g.ok) { const j = await g.json(); sha = j.sha; try { cloud = JSON.parse(decodeURIComponent(escape(atob((j.content || "").replace(/\n/g, ""))))); } catch(e){} }
    if (!cloud.events) cloud.events = {};
    // MERGE: overlay only the browser-owned fields of THIS event (IRON RULE #18)
    cloud.events[evkey] = Object.assign({}, cloud.events[evkey] || {}, mine);
    cloud._updated_at = new Date().toISOString();
    const body = { message: "contract: venue payments " + evkey, content: btoa(unescape(encodeURIComponent(JSON.stringify(cloud, null, 1)))), branch: "main" };
    if (sha) body.sha = sha;
    const r = await fetch(api, { method: "PUT", headers: {"Authorization": "token " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json"}, body: JSON.stringify(body) });
    if (r.ok) { VP.events[evkey] = Object.assign({}, VP.events[evkey] || {}, mine); }
    return r.ok;
  } catch(e) { console.error("vpSave", e); return false; }
}
async function vpUploadSigned(evkey, file){
  const token = vpToken();
  if (!token) return false;
  const ext = ((file.name.split(".").pop() || "pdf").toLowerCase().replace(/[^a-z0-9]/g, "")) || "pdf";
  const path = "docs/contract/signed/" + evkey + "." + ext;
  try {
    const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(String(r.result).split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
    const api = "https://api.github.com/repos/" + VP_REPO + "/contents/" + path;
    let sha = null;
    const g = await fetch(api + "?ref=main&_=" + Date.now(), { headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" }, cache: "no-store" });
    if (g.ok) { try { sha = (await g.json()).sha; } catch(e){} }
    const body = { message: "contract: signed file " + evkey, content: b64, branch: "main" };
    if (sha) body.sha = sha;
    const r = await fetch(api, { method: "PUT", headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" }, body: JSON.stringify(body) });
    if (!r.ok) return false;
    const rec = vpRec(evkey);
    rec.signed_contract = { path: path, name: file.name, ext: ext, size: file.size, uploaded_at: new Date().toISOString() };
    return await vpSave(evkey);
  } catch(e) { console.error("vpUploadSigned", e); return false; }
}
const vpShowAllBtn = document.getElementById("vp-showall");
if (vpShowAllBtn) vpShowAllBtn.onclick = () => { VP_SHOW_ALL = !VP_SHOW_ALL; vpRender(); };
vpLoad();
