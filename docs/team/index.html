<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>👥 דשבורד צוות — The Makeup Blowout</title>
<style>
  :root{ --pink:#ec4899; --purple:#7c3aed; --ink:#1f2937; --muted:#6b7280; --bg:#f6f7fb; --card:#ffffff; --ok:#16a34a; --warn:#d97706; --bad:#dc2626; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",Arial,"Heebo",sans-serif}
  a{color:inherit}
  .hdr{background:linear-gradient(135deg,#ec4899 0%,#7c3aed 100%);color:#fff;padding:18px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .hdr h1{margin:0;font-size:22px;font-weight:900}
  .hdr .sub{font-size:13px;opacity:.92}
  .hdr .spacer{flex:1}
  .hdr a.back{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;text-decoration:none;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700}
  .tabs{display:flex;gap:8px;padding:14px 22px 0;flex-wrap:wrap}
  .tab{border:0;background:#e5e7eb;color:#374151;font-weight:800;font-size:15px;padding:10px 18px;border-radius:12px 12px 0 0;cursor:pointer}
  .tab.on{background:#fff;color:var(--purple);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  .wrap{padding:18px 22px;max-width:1280px;margin:0 auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .mcard{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.07);cursor:pointer;position:relative;transition:transform .08s}
  .mcard:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12)}
  .avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:20px;flex-shrink:0}
  .mtop{display:flex;gap:12px;align-items:center;margin-bottom:10px}
  .mname{font-size:18px;font-weight:900}
  .mfull{font-size:12px;color:var(--muted)}
  .mrow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-top:1px dashed #eef0f4}
  .mrow b{font-weight:800}
  .corner-tl{position:absolute;top:10px;left:12px;display:flex;gap:6px;align-items:center}
  .bday-soon{font-size:18px}
  .act-pill{border:0;cursor:pointer;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:900}
  .act-pill.on{background:#dcfce7;color:#166534}
  .act-pill.off{background:#e5e7eb;color:#6b7280}
  .mcard.inactive{opacity:.55;filter:grayscale(.4)}
  .pill{display:inline-block;border-radius:999px;padding:2px 10px;font-size:11.5px;font-weight:800}
  .pill.green{background:#dcfce7;color:#166534}
  .pill.orange{background:#ffedd5;color:#9a3412}
  .pill.gray{background:#f3f4f6;color:#6b7280}
  .pill.blue{background:#dbeafe;color:#1e40af}
  .section-title{font-size:16px;font-weight:900;margin:22px 0 10px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
  th{background:#f9fafb;text-align:right;font-size:12.5px;color:#6b7280;padding:9px 12px;border-bottom:1px solid #eef0f4}
  td{padding:9px 12px;border-bottom:1px solid #f3f4f6;font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:0}
  .amt{font-weight:900;white-space:nowrap}
  .src{font-size:10.5px;color:#9ca3af;margin-inline-start:5px}
  .editbtn{border:0;background:transparent;cursor:pointer;font-size:13px;opacity:.55}
  .editbtn:hover{opacity:1}
  .detail-head{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.07);flex-wrap:wrap}
  .stat{background:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);text-align:center;min-width:120px}
  .stat .v{font-size:21px;font-weight:900;color:var(--purple)}
  .stat .l{font-size:12px;color:var(--muted)}
  .stats-row{display:flex;gap:12px;margin:14px 0;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 11px;font-size:13px;font-weight:800;cursor:pointer;border:1.5px solid transparent;user-select:none}
  .chip.planned{background:#dcfce7;color:#166534;border-color:#bbf7d0}
  .chip.standby{background:#ffedd5;color:#9a3412;border-color:#fed7aa}
  .chip .x{opacity:.45;font-weight:900;cursor:pointer;padding:0 2px}
  .chip .x:hover{opacity:1;color:var(--bad)}
  .evrow{background:#fff;border-radius:14px;padding:13px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .evrow.hl{outline:3px solid var(--pink)}
  .evdate{font-weight:900;font-size:13.5px;min-width:96px;color:var(--purple)}
  .evcity{font-weight:900;font-size:15px;min-width:150px}
  .evchips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .addsel{border:1px solid #e5e7eb;border-radius:9px;padding:4px 8px;font-size:12.5px;background:#fafafa}
  .load-strip{display:flex;gap:7px;flex-wrap:wrap;background:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px;font-size:12.5px}
  .load-strip .it{background:#f3f4f6;border-radius:999px;padding:3px 11px;font-weight:700}
  .load-strip .it b{color:var(--purple)}
  .chip.avail{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}
  .chip.manager{background:#dbeafe;color:#1e40af;border-color:#93c5fd;font-weight:900}
  .schedhead{display:flex;gap:14px;padding:4px 16px;font-size:11.5px;color:#9ca3af;font-weight:800}
  .col-avail{flex-basis:235px;flex-shrink:0;min-width:170px}
  .col-notes{flex-basis:215px;flex-shrink:0;min-width:150px;font-size:12.5px;color:#374151}
  .col-notes .ntxt{white-space:pre-wrap}
  .col-notes .nempty{color:#c4c8cf;font-style:italic}
  @media (max-width:900px){ .col-avail,.col-notes{flex-basis:100%} }
  .toast{position:fixed;bottom:18px;right:18px;background:#111827;color:#fff;border-radius:12px;padding:11px 17px;font-size:14px;font-weight:700;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.3);display:none}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:center;justify-content:center;padding:16px}
  .modal{background:#fff;border-radius:18px;padding:22px;max-width:430px;width:100%;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 14px}
  .modal label{display:block;font-size:12.5px;font-weight:800;color:#6b7280;margin:10px 0 4px}
  .modal input,.modal textarea{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:8px 10px;font-size:14px;font-family:inherit}
  .btn{border:0;border-radius:11px;padding:9px 18px;font-size:14px;font-weight:900;cursor:pointer}
  .btn.save{background:var(--purple);color:#fff}
  .btn.cancel{background:#f3f4f6;color:#374151}
  .note{font-size:12px;color:#9ca3af;margin-top:6px}
  .backlink{cursor:pointer;font-size:13.5px;font-weight:800;color:var(--purple);background:none;border:0;padding:0;margin-bottom:12px;display:inline-block}
  @media (max-width:640px){ .wrap{padding:12px} .evcity,.evdate{min-width:0} }
</style>
</head>
<body>
<div class="hdr">
  <h1>👥 דשבורד צוות</h1>
  <div class="sub">שכר לפי אירוע · שיבוץ אירועים עתידיים · נתונים מתחילת 2026</div>
  <div class="spacer"></div>
  <a class="back" href="../launch/">🎪 לוח האירועים</a>
  <a class="back" href="../">🏠 דשבורד ראשי</a>
</div>

<div class="tabs">
  <button class="tab on" id="tab-team" onclick="showTab('team')">👥 הצוות</button>
  <button class="tab" id="tab-sched" onclick="showTab('sched')">📅 שיבוץ אירועים עתידיים</button>
  <button class="tab" id="tab-avail" onclick="showTab('avail')">📨 זמינות עובדים</button>
</div>

<div class="wrap">
  <div id="view-team"><div class="grid" id="member-grid">טוען…</div></div>
  <div id="view-detail" style="display:none"></div>
  <div id="view-sched" style="display:none"></div>
  <div id="view-avail" style="display:none"></div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal-box"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   Team dashboard — data: docs/state/team_roster.json (Lauren-editable
   via this page, GitHub Contents API per IRON RULE #7, read-merge per
   IRON RULE #18). Earnings resolution per (event, member):
     1) roster.manual_earnings[ev][slug]   — Lauren manual (highest)
     2) manager_reports.json latest final  — runtime overlay
     3) roster.earnings[ev][slug]          — baked from event_pnl staff_lines
   ============================================================ */
var ROSTER = null;
var MR_EARN = {};            // evkey -> slug -> total (from manager_reports.json)
var AVAIL = {};              // evkey -> slug -> {ans:"yes"|"no", at} (latest per member+event)
var AVAIL_SUBS = [];         // raw submissions, newest first
var DIRTY = [];              // [section, key] pairs pending merge-write
var TODAY = new Date().toISOString().slice(0,10);
var ROSTER_REPO_FILE = "docs/state/team_roster.json";
var ALIAS = {"goni":"goni","daniel":"daniel","danielle":"daniel","maiken":"maiken","brit":"brit","razi":"razi",
  "shai":"shai","eva":"evelin","evelin":"evelin","dor":"dor","cecilie":"cecilie","cecille":"cecilie",
  "bryson":"bryson","hila":"hila","hilla":"hila","roey":"roey","roy":"roey",
  "anna":"lina","ron":"ron","mor":"mor","lina":"lina","shira":"shira"};
var AV_COLORS = ["#ec4899","#7c3aed","#0ea5e9","#f59e0b","#10b981","#ef4444","#6366f1","#14b8a6","#d946ef","#f97316"];

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toast(msg, bad){ var t=document.getElementById("toast"); t.textContent=msg; t.style.background = bad?"#b91c1c":"#111827"; t.style.display="block"; clearTimeout(t._h); t._h=setTimeout(function(){t.style.display="none";},3200); }
function fmtMoney(v){ return v==null?"—":("$"+Math.round(v).toLocaleString()); }
function fmtDate(iso){ if(!iso) return "—"; var p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function avColor(slug){ var h=0; for(var i=0;i<slug.length;i++) h=(h*31+slug.charCodeAt(i))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
function age(bday){ if(!bday) return null; var b=new Date(bday), n=new Date(); var a=n.getFullYear()-b.getFullYear(); var m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a; }
function bdaySoon(bday){ if(!bday) return false; var n=new Date(); var b=new Date(bday); b.setFullYear(n.getFullYear()); var diff=(b-n)/864e5; if(diff<-330){ b.setFullYear(n.getFullYear()+1); diff=(b-n)/864e5; } return diff>=-1 && diff<=30; }

/* ---------- earnings resolution ---------- */
function resolveEarn(evkey, slug){
  var man = ROSTER.manual_earnings && ROSTER.manual_earnings[evkey] && ROSTER.manual_earnings[evkey][slug];
  if (man && man.total != null) return {total:man.total, src:"manual", label:"ידני"};
  if (MR_EARN[evkey] && MR_EARN[evkey][slug] != null) return {total:MR_EARN[evkey][slug], src:"report", label:"דוח מנהלת"};
  var bk = ROSTER.earnings && ROSTER.earnings[evkey] && ROSTER.earnings[evkey][slug];
  if (bk && bk.total != null) return {total:bk.total, src:"pnl", label:"P&L"};
  return null;
}
function memberEvents(slug){
  var past=[], future=[], seen={};
  var keys = Object.keys(ROSTER.assignments||{});
  keys.forEach(function(ev){
    var a=ROSTER.assignments[ev];
    var ent=(a.team||[]).filter(function(e){return e.m===slug;})[0];
    if(!ent) return;
    seen[ev]=1;
    if (a.end_date < TODAY) past.push({ev:ev,a:a,status:ent.status});
    else future.push({ev:ev,a:a,status:ent.status});
  });
  // events where member has earnings but isn't on the xlsx roster
  var extra = {};
  [ROSTER.earnings||{}, ROSTER.manual_earnings||{}].forEach(function(src){
    Object.keys(src).forEach(function(ev){ if(src[ev][slug]!=null && !seen[ev]) extra[ev]=1; });
  });
  Object.keys(MR_EARN).forEach(function(ev){ if(MR_EARN[ev][slug]!=null && !seen[ev]) extra[ev]=1; });
  Object.keys(extra).forEach(function(ev){
    var a=ROSTER.assignments[ev] || {city:ev, state:"", start_date:ev.slice(-10), end_date:ev.slice(-10)};
    if((a.end_date||"") < TODAY) past.push({ev:ev,a:a,status:"worked",offRoster:true});
  });
  past.sort(function(x,y){ return x.a.start_date<y.a.start_date?1:-1; });
  future.sort(function(x,y){ return x.a.start_date>y.a.start_date?1:-1; });
  return {past:past, future:future};
}
function memberTotals(slug){
  var me=memberEvents(slug), tot=0, n=0, c26=0, c25=0;
  me.past.forEach(function(p){
    var y=(p.a.start_date||"").slice(0,4);
    if(y==="2025"){ c25++; return; }            // 2025 = history only, not in the money totals
    c26++;
    var e=resolveEarn(p.ev, slug); if(e){ tot+=e.total; n++; }
  });
  return {total:tot, paidEvents:n, pastCount:c26, count2025:c25, futureCount:me.future.length};
}

/* ---------- views ---------- */
function showTab(which){
  ["team","sched","avail"].forEach(function(t){
    document.getElementById("tab-"+t).classList.toggle("on", which===t);
    document.getElementById("view-"+t).style.display = which===t?"":"none";
  });
  document.getElementById("view-detail").style.display = "none";
  if (which==="sched") renderSched();
  if (which==="team") renderGrid();
  if (which==="avail") renderAvail();
}
function renderGrid(){
  var g=document.getElementById("member-grid");
  if(!ROSTER){ g.textContent="טוען…"; return; }
  var slugs=Object.keys(ROSTER.members);
  slugs.sort(function(a,b){
    var ia=(ROSTER.members[a].active===false)?1:0, ib=(ROSTER.members[b].active===false)?1:0;
    if(ia!==ib) return ia-ib;                       // active first, inactive at the end
    var ta=memberTotals(a), tb=memberTotals(b);
    if(tb.pastCount!==ta.pastCount) return tb.pastCount-ta.pastCount;   // most events worked first (RTL: top-right)
    return tb.total-ta.total;
  });
  g.innerHTML = slugs.map(function(s){
    var m=ROSTER.members[s], t=memberTotals(s), ag=age(m.birthday);
    var inactive=(m.active===false);
    return '<div class="mcard'+(inactive?' inactive':'')+'" onclick="openDetail(\''+s+'\')">'+
      '<span class="corner-tl">'+
        '<button class="act-pill '+(inactive?'off':'on')+'" title="לחיצה: החלפת סטטוס פעיל/לא פעיל" onclick="toggleActive(event,\''+s+'\')">'+(inactive?'לא פעיל':'פעיל ✓')+'</button>'+
        (bdaySoon(m.birthday)?'<span class="bday-soon" title="יומולדת קרוב!">🎂</span>':'')+
      '</span>'+
      '<div class="mtop"><div class="avatar" style="background:'+avColor(s)+'">'+esc(m.name.slice(0,2))+'</div>'+
      '<div><div class="mname">'+esc(m.name)+'</div><div class="mfull">'+esc(m.full_name||"")+(ag!=null?(' · גיל '+ag):'')+'</div></div></div>'+
      '<div class="mrow"><span>🎂 תאריך לידה</span><b>'+fmtDate(m.birthday)+'</b></div>'+
      '<div class="mrow"><span>💵 שכר בסיס</span><b>'+(m.base_salary!=null&&m.base_salary!==""?fmtMoney(m.base_salary):"—")+'</b></div>'+
      '<div class="mrow"><span>🎪 אירועים ב-2026</span><b>'+t.pastCount+'</b></div>'+
      '<div class="mrow"><span>💵 סה״כ שכר 2026</span><b>'+fmtMoney(t.total||null)+(t.paidEvents<t.pastCount?' <span class="src">('+t.paidEvents+'/'+t.pastCount+' אירועים)</span>':'')+'</b></div>'+
      '<div class="mrow"><span>📅 שיבוצים קרובים</span><b>'+t.futureCount+'</b></div>'+
      (t.count2025?'<div class="mrow"><span>🗓️ אירועים ב-2025</span><b>'+t.count2025+'</b></div>':'')+
    '</div>';
  }).join("");
}
function openDetail(slug){
  var m=ROSTER.members[slug]; if(!m) return;
  var me=memberEvents(slug), t=memberTotals(slug), ag=age(m.birthday);
  var v=document.getElementById("view-detail");
  document.getElementById("view-team").style.display="none";
  document.getElementById("view-sched").style.display="none";
  v.style.display="";
  var past26=me.past.filter(function(p){return (p.a.start_date||"").slice(0,4)!=="2025";});
  var past25=me.past.filter(function(p){return (p.a.start_date||"").slice(0,4)==="2025";});
  var pastRows = past26.map(function(p){
    var e=resolveEarn(p.ev, slug);
    var amtHtml = e ? '<span class="amt">'+fmtMoney(e.total)+'</span><span class="src">'+e.label+'</span>'
                    : '<span style="color:#9ca3af">— אין נתון —</span>';
    return '<tr><td>'+fmtDate(p.a.start_date)+'</td><td><b>'+esc(p.a.city)+'</b> '+esc(p.a.state||"")+(p.offRoster?' <span class="pill blue">לא ברשימת השיבוץ</span>':'')+'</td>'+
      '<td>'+amtHtml+' <button class="editbtn" title="עריכה ידנית" onclick="editEarn(\''+p.ev+'\',\''+slug+'\')">✏️</button></td></tr>';
  }).join("") || '<tr><td colspan="3" style="color:#9ca3af">אין אירועים</td></tr>';
  var rows25 = past25.map(function(p){
    return '<tr><td>'+fmtDate(p.a.start_date)+'</td><td><b>'+esc(p.a.city)+'</b> '+esc(p.a.state||"")+'</td></tr>';
  }).join("");
  var futRows = me.future.map(function(f){
    var pill = f.status==="standby" ? '<span class="pill orange">סטנד ביי</span>' : '<span class="pill green">מתוכנן ומאושר</span>';
    return '<tr><td>'+fmtDate(f.a.start_date)+'</td><td><b>'+esc(f.a.city)+'</b> '+esc(f.a.state||"")+'</td>'+
      '<td>'+pill+' <button class="editbtn" title="החלף סטטוס" onclick="toggleStatus(\''+f.ev+'\',\''+slug+'\')">🔁</button></td></tr>';
  }).join("") || '<tr><td colspan="3" style="color:#9ca3af">אין שיבוצים עתידיים</td></tr>';
  v.innerHTML =
    '<button class="backlink" onclick="showTab(\'team\')">→ חזרה לכל הצוות</button>'+
    '<div class="detail-head">'+
      '<div class="avatar" style="background:'+avColor(slug)+';width:64px;height:64px;font-size:25px">'+esc(m.name.slice(0,2))+'</div>'+
      '<div style="flex:1;min-width:200px"><div style="font-size:21px;font-weight:900">'+esc(m.full_name||m.name)+'</div>'+
      '<div style="font-size:13px;color:#6b7280">🎂 '+fmtDate(m.birthday)+(ag!=null?' (גיל '+ag+')':'')+(m.phone?' · 📞 '+esc(m.phone):'')+(m.base_salary!=null&&m.base_salary!==""?' · 💵 שכר בסיס '+fmtMoney(m.base_salary):'')+'</div>'+
      (m.notes?'<div style="font-size:13px;margin-top:5px;color:#374151">📝 '+esc(m.notes)+'</div>':'')+
      '</div>'+
      '<button class="btn cancel" onclick="editMember(\''+slug+'\')">✏️ עריכת פרטים</button>'+
      '<button class="act-pill '+(m.active===false?'off':'on')+'" style="font-size:13px;padding:8px 14px" onclick="toggleActive(event,\''+slug+'\')">'+(m.active===false?'לא פעיל — לחצי להפעלה':'פעיל ✓')+'</button>'+
    '</div>'+
    '<div class="stats-row">'+
      '<div class="stat"><div class="v">'+fmtMoney(t.total||null)+'</div><div class="l">סה״כ שכר 2026</div></div>'+
      '<div class="stat"><div class="v">'+t.pastCount+'</div><div class="l">אירועים ב-2026</div></div>'+
      '<div class="stat"><div class="v">'+(t.paidEvents?fmtMoney(t.total/t.paidEvents):"—")+'</div><div class="l">ממוצע לאירוע</div></div>'+
      '<div class="stat"><div class="v">'+t.futureCount+'</div><div class="l">שיבוצים קרובים</div></div>'+
    '</div>'+
    '<div class="section-title">🎪 אירועי 2026 + שכר</div>'+
    '<table><tr><th>תאריך</th><th>אירוע</th><th>שכר</th></tr>'+pastRows+'</table>'+
    (rows25?('<div class="section-title">🗓️ אירועי 2025 ('+past25.length+')</div>'+

/* ---------- GitHub sync (IRON RULE #7 + #18: read-merge-write, blobs fallback, fail loud) ---------- */
function markDirty(section, key){ DIRTY.push([section,key]); }
async function ghReadRosterSafe(token){
  var url="https://api.github.com/repos/laurenlev10/lauren-agent-hub-data/contents/"+ROSTER_REPO_FILE+"?ref=main&_="+Date.now();
  var r=await fetch(url,{headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json"},cache:"no-store"});
  if(!r.ok) throw new Error("contents GET "+r.status);
  var j=await r.json();
  var content=j.content||"";
  if(!content && j.git_url){
    var rb=await fetch(j.git_url+"?_="+Date.now(),{headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json"},cache:"no-store"});
    if(!rb.ok) throw new Error("blobs GET "+rb.status);
    var jb=await rb.json(); content=jb.content||"";
  }
  if(!content) throw new Error("empty content — aborting save (IRON RULE #18)");
  var txt=decodeURIComponent(escape(atob(content.replace(/\n/g,""))));
  return {sha:j.sha, data:JSON.parse(txt)};
}
async function saveRoster(msg){
  var token=(localStorage.getItem("lauren_gh_token_v1")||"").trim();
  if(!token){ token=prompt("צריך GitHub token כדי לשמור (נשמר רק במכשיר הזה):")||""; token=token.trim(); if(!token){ toast("⚠️ אין token — לא נשמר", true); return false; } localStorage.setItem("lauren_gh_token_v1", token); }
  try{
    var cloud=await ghReadRosterSafe(token);
    var merged=cloud.data;
    merged.members=merged.members||{}; merged.assignments=merged.assignments||{}; merged.manual_earnings=merged.manual_earnings||{}; merged.manual_availability=merged.manual_availability||{};
    DIRTY.forEach(function(d){
      var sec=d[0], key=d[1];
      if(sec==="members") merged.members[key]=ROSTER.members[key];
      if(sec==="assignments") merged.assignments[key]=ROSTER.assignments[key];
      if(sec==="manual_availability"){
        if(ROSTER.manual_availability && ROSTER.manual_availability[key] && Object.keys(ROSTER.manual_availability[key]).length) merged.manual_availability[key]=ROSTER.manual_availability[key];
        else delete merged.manual_availability[key];
      }
      if(sec==="manual_earnings"){
        if(ROSTER.manual_earnings && ROSTER.manual_earnings[key] && Object.keys(ROSTER.manual_earnings[key]).length) merged.manual_earnings[key]=ROSTER.manual_earnings[key];
        else delete merged.manual_earnings[key];
      }
    });
    merged._updated_at=new Date().toISOString();
    var body={message:msg, branch:"main", sha:cloud.sha,
      content:btoa(unescape(encodeURIComponent(JSON.stringify(merged,null,1))))};
    var r=await fetch("https://api.github.com/repos/laurenlev10/lauren-agent-hub-data/contents/"+ROSTER_REPO_FILE,
      {method:"PUT",headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok) throw new Error("PUT "+r.status);
    ROSTER=merged; DIRTY=[];
    return true;
  }catch(e){
    console.error("saveRoster failed:", e);
    toast("⚠️ שמירה נכשלה: "+e.message, true);
    return false;
  }
}

async function loadAvailability(){

  try{
    var r=await fetch("../state/team_availability.json?_="+Date.now(),{cache:"no-store"});
    if(r.ok){ var j=await r.json(); subs=subs.concat(j.submissions||[]); }
  }catch(e){}
  try{
    // interim path — old worker appends availability under reports["team-availability"]
    var r2=await fetch("../state/manager_reports.json?_="+Date.now(),{cache:"no-store"});
    if(r2.ok){ var m=await r2.json(); subs=subs.concat(((m.reports||{})["team-availability"])||[]); }
  }catch(e){}
  subs=subs.filter(function(s){ return s && s.kind==="team_availability"; });
  subs.sort(function(a,b){ return (a.submitted_at||"")<(b.submitted_at||"")?1:-1; });
  AVAIL_SUBS=subs;
  AVAIL={};

  subs.slice().reverse().forEach(function(s){
    var slug=s.member_slug||"";
    if(!slug) return;
    Object.keys(s.events||{}).forEach(function(ev){
      AVAIL[ev]=AVAIL[ev]||{};
      AVAIL[ev][slug]={ans:s.events[ev], at:s.submitted_at};
    });
  });
}

  if(qp.get("member") && ROSTER.members[qp.get("member")]){ renderGrid(); openDetail(qp.get("member")); }
  else if(qp.get("ev")){ showTab("sched"); renderSched(qp.get("ev")); }
  else renderGrid();
}
init();
</script>
</body>
