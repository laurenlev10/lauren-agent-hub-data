<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Makeup Blowout — Work Availability Form</title>
<style>
  :root{ --pink:#ec4899; --purple:#7c3aed; --ink:#1f2937; --muted:#6b7280; --bg:#f6f7fb; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",Arial,sans-serif}
  .hdr{background:linear-gradient(135deg,#ec4899 0%,#7c3aed 100%);color:#fff;padding:20px 18px;text-align:center}
  .hdr h1{margin:0;font-size:21px;font-weight:900}
  .hdr p{margin:6px 0 0;font-size:13.5px;opacity:.93}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  .card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:800;color:#6b7280;margin:0 0 5px}
  select,input,textarea{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px;font-size:15px;font-family:inherit;background:#fafafa}
  .ev{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;flex-wrap:wrap}
  .ev:last-child{border-bottom:0}
  .ev .when{font-weight:900;font-size:13px;color:var(--purple);min-width:88px}
  .ev .city{font-weight:800;font-size:14.5px;flex:1;min-width:120px}
  .opts{display:flex;gap:6px}
  .opt{border:1.5px solid #e5e7eb;background:#fafafa;border-radius:999px;padding:6px 13px;font-size:13px;font-weight:800;cursor:pointer;user-select:none}
  .opt.yes.on{background:#dcfce7;border-color:#16a34a;color:#166534}
  .opt.no.on{background:#fee2e2;border-color:#dc2626;color:#991b1b}
  .btn{width:100%;border:0;border-radius:13px;padding:14px;font-size:17px;font-weight:900;cursor:pointer;background:var(--purple);color:#fff;margin-top:6px}
  .btn:disabled{opacity:.6}
  .note{font-size:12px;color:#9ca3af;margin-top:8px;text-align:center}
  .okbox{display:none;background:#dcfce7;border:1.5px solid #16a34a;color:#166534;border-radius:14px;padding:16px;text-align:center;font-weight:800;margin-bottom:14px}
</style>
</head>
<body>
<div class="hdr">
  <h1>💄 The Makeup Blowout Sale</h1>
  <p>Tell us which upcoming events you're available &amp; want to work 💪</p>
</div>
<div class="wrap">
  <div class="okbox" id="okbox">✅ Thank you! Your availability was sent to Lauren.</div>
  <div class="card">
    <label>Who are you? *</label>
    <select id="f-who"><option value="">— choose your name —</option></select>
    <div style="height:10px"></div>
    <label>Phone (optional)</label>
    <input id="f-phone" type="tel" placeholder="+1 ...">
  </div>
  <div class="card">
    <label style="font-size:14.5px;color:#1f2937">📅 Upcoming events — tap ✅ if you're available &amp; interested, ❌ if not:</label>
    <div id="ev-list">Loading events…</div>
  </div>
  <div class="card">
    <label>Notes (optional — preferences, constraints, anything)</label>
    <textarea id="f-notes" rows="3" placeholder="e.g. I prefer west coast events / not available in August..."></textarea>
  </div>
  <button class="btn" id="btn-send" onclick="submitForm()">📨 Send my availability</button>
  <div class="note">Your answers go straight to Lauren's team dashboard.</div>
</div>

<script>
"use strict";
var ROSTER=null, ANSWERS={}, ENDPOINT="";
var LAUREN_WA="14243547625";
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(iso){ if(!iso) return ""; var p=iso.split("-"); return p[1]+"/"+p[2]; }
async function init(){
  try{ var rc=await fetch("../manager-report/config.json?_="+Date.now(),{cache:"no-store"}); if(rc.ok){ ENDPOINT=((await rc.json()).save_endpoint||"").trim(); } }catch(e){}
  try{
    var r=await fetch("../state/team_roster.json?_="+Date.now(),{cache:"no-store"});
    ROSTER=await r.json();
  }catch(e){ document.getElementById("ev-list").textContent="⚠️ Could not load events — please try again later."; return; }
  var sel=document.getElementById("f-who");
  Object.keys(ROSTER.members).filter(function(s){return ROSTER.members[s].active!==false;})
    .sort(function(a,b){ return (ROSTER.members[a].name||"").localeCompare(ROSTER.members[b].name||""); })
    .forEach(function(s){
      var o=document.createElement("option"); o.value=s; o.textContent=ROSTER.members[s].full_name||ROSTER.members[s].name; sel.appendChild(o);
    });
  var other=document.createElement("option"); other.value="__other__"; other.textContent="Someone else (type name in notes)"; sel.appendChild(other);
  var today=new Date().toISOString().slice(0,10);
  var evs=Object.keys(ROSTER.assignments).filter(function(ev){ return ROSTER.assignments[ev].end_date>=today; });
  evs.sort(function(a,b){ return ROSTER.assignments[a].start_date<ROSTER.assignments[b].start_date?-1:1; });
  document.getElementById("ev-list").innerHTML = evs.map(function(ev){
    var a=ROSTER.assignments[ev];
    return '<div class="ev"><span class="when">'+fmtDate(a.start_date)+'–'+fmtDate(a.end_date)+'</span>'+
      '<span class="city">'+esc(a.city)+', '+esc(a.state||"")+'</span>'+
      '<span class="opts">'+
      '<span class="opt yes" id="y-'+ev+'" onclick="pick(\''+ev+'\',\'yes\')">✅ Available</span>'+
      '<span class="opt no" id="n-'+ev+'" onclick="pick(\''+ev+'\',\'no\')">❌ No</span>'+
      '</span></div>';
  }).join("") || "No upcoming events right now.";
}
function pick(ev, ans){
  if (ANSWERS[ev]===ans){ delete ANSWERS[ev]; }
  else ANSWERS[ev]=ans;
  document.getElementById("y-"+ev).classList.toggle("on", ANSWERS[ev]==="yes");
  document.getElementById("n-"+ev).classList.toggle("on", ANSWERS[ev]==="no");
}
function buildText(p){
  var lines=["Availability form — "+p.name, ""];
  Object.keys(p.events).forEach(function(ev){
    var a=ROSTER.assignments[ev]||{};
    lines.push((p.events[ev]==="yes"?"✅":"❌")+" "+(a.city||ev)+", "+(a.state||"")+" ("+fmtDate(a.start_date)+")");
  });
  if(p.phone) lines.push("", "Phone: "+p.phone);
  if(p.notes) lines.push("", "Notes: "+p.notes);
  return lines.join("\n");
}
async function submitForm(){
  var who=document.getElementById("f-who").value;
  if(!who){ alert("Please choose your name 🙂"); return; }
  if(!Object.keys(ANSWERS).length){ alert("Please mark at least one event ✅ / ❌"); return; }
  var m=(who!=="__other__" && ROSTER.members[who])||null;
  var p={
    kind:"team_availability",
    evkey:"team-availability",
    mode:"final",
    member_slug:(who==="__other__"?"":who),
    name:(m?(m.full_name||m.name):"(other — see notes)"),
    manager_name:(m?(m.full_name||m.name):"(other)"),
    phone:document.getElementById("f-phone").value.trim(),
    notes:document.getElementById("f-notes").value.trim(),
    events:ANSWERS,
    submitted_at:new Date().toISOString(),
    source:"availability-form"
  };
  var btn=document.getElementById("btn-send");
  btn.disabled=true; btn.textContent="⏳ Sending...";
  if(ENDPOINT){
    try{
      var r=await fetch(ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(p)});
      if(r.ok){
        document.getElementById("okbox").style.display="block";
        btn.textContent="✓ Sent!"; window.scrollTo(0,0);
        return;
      }
      throw new Error("HTTP "+r.status);
    }catch(e){ console.warn("endpoint failed:", e); }
  }
  // fallback — WhatsApp to Lauren
  window.open("https://wa.me/"+LAUREN_WA+"?text="+encodeURIComponent(buildText(p)),"_blank");
  btn.disabled=false; btn.textContent="📨 Send my availability";
}
init();
</script>
</body>
</html>
