<script id="app">
// ─────────── State ───────────
let SCHEDULE = {};          // { evkey: { city, state, start_date, end_date, ... } }
let SCHEDULE_LOADED = false;
let ALL_SESSIONS = {};      // { session_key: { ...session data } }

const TOKEN_KEY       = "lauren_gh_token_v1";

// ─────────── Utilities ───────────
function $(id) { return document.getElementById(id); }
function el(html) { const d = document.createElement("div"); d.innerHTML = html; return d.firstElementChild; }
function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]); }
function fmtMoney(n) { const sign = n < 0 ? "-" : ""; return sign + "$" + Math.abs(n).toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function parseAmount(v) {
  if (typeof v === "number") return v;
  if (!v) return 0;
  const s = String(v).replace(/[\$,\s]/g, "").replace(/[()]/g, m => m === "(" ? "-" : "");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function parseDate(v) {
  if (v instanceof Date) return v;
  if (typeof v === "number") {
    // Excel serial date
    const d = new Date((v - 25569) * 86400 * 1000);
    return d;
  }
  if (typeof v === "string") {
    const m = v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (m) {
      let y = parseInt(m[3]); if (y < 100) y += 2000;
      return new Date(y, parseInt(m[1]) - 1, parseInt(m[2]));
    }
    const d = new Date(v); if (!isNaN(d)) return d;
  }
  return null;
}
function dateISO(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function dateMMDD(d) { return String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0") + "/" + d.getFullYear(); }
function toast(msg, type) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "") + " show";
  setTimeout(() => t.className = "toast " + (type || ""), 2400);
}

// ─────────── GitHub token gate ───────────
function getToken() { return (localStorage.getItem(TOKEN_KEY) || "").trim(); }
function setToken(v) { localStorage.setItem(TOKEN_KEY, v.trim()); renderTokenArea(); }

function renderTokenArea() {
  const area = $("token-area");
  if (getToken()) {
    area.innerHTML = `<div class="token-ok">✓ GitHub token פעיל · <a href="#" id="reset-token" style="color:#6e6e73">החלפה</a></div>`;
    $("reset-token").onclick = (e) => { e.preventDefault(); localStorage.removeItem(TOKEN_KEY); renderTokenArea(); };
  } else {
    area.innerHTML = `
      <div class="token-card">
        <b>⚠ נדרש GitHub token לסנכרון</b><br>
        בלי token, סימוני Done שלך לא יסתנכרנו בין מכשירים.
        <div class="row">

          <button id="token-save">שמרי</button>
        </div>
        <div style="margin-top:8px;font-size:11px;opacity:0.7">ה-token נשמר רק במכשיר הזה (localStorage), לא נשלח לאף שרת חוץ מ-GitHub עצמו.</div>
      </div>`;
    $("token-save").onclick = () => {
      const v = $("token-input").value.trim();
      if (v.length > 20) setToken(v);
      else toast("token לא תקין", "error");
    };
  }
}

// ─────────── Load state from GitHub ───────────
async function loadState() {
  try {
    const r = await fetch(STATE_FILE_URL + "?_=" + Date.now(), { cache: "no-store" });
    if (r.ok) {
      const j = await r.json();
      ALL_SESSIONS = j.sessions || {};
    }
  } catch (e) { console.warn("loadState failed:", e); }
  // Also fetch SHA for later writes
  const token = getToken();
  if (token) {
    try {
      const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${STATE_FILE_PATH}?ref=main`,
        { headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" } });
      if (r.ok) STATE_SHA = (await r.json()).sha;
    } catch (e) { console.warn("SHA fetch failed:", e); }
  }
}

async function saveState(commitMsg) {
  const token = getToken();
  if (!token) { toast("⚠ אין token — סימון נשמר רק במכשיר", "error"); return false; }
  const payload = { _updated_at: new Date().toISOString(), _schema_version: 1, sessions: ALL_SESSIONS };
  try {
    // Refresh SHA right before write
    const getR = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${STATE_FILE_PATH}?ref=main`,
      { headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" } });
    if (getR.ok) STATE_SHA = (await getR.json()).sha;
    const body = {
      message: commitMsg || "bookkeeping: state update",
      content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
      branch: "main",
    };
    if (STATE_SHA) body.sha = STATE_SHA;
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${STATE_FILE_PATH}`, {
      method: "PUT",
      headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (r.ok) {
      STATE_SHA = (await r.json()).content.sha;
      return true;
    } else {
      const err = await r.text();
      console.error("saveState bad response:", r.status, err);
      toast("⚠ שמירה נכשלה — " + r.status, "error");
      return false;
    }
  } catch (e) { console.error("saveState exception:", e); toast("⚠ שמירה נכשלה", "error"); return false; }
}

// ─────────── Schedule (fetched from /launch/) ───────────
async function loadSchedule() {
  try {
    const r = await fetch("../launch/?_=" + Date.now(), { cache: "no-store" });
    const html = await r.text();
    const m = html.match(/const\s+SCHEDULE\s*=\s*(\{[\s\S]*?\n\s*\})\s*;/);
    if (!m) throw new Error("SCHEDULE not found in /launch/");
    SCHEDULE = (new Function("return " + m[1]))();
    SCHEDULE_LOADED = true;
    console.log("Schedule loaded:", Object.keys(SCHEDULE).length, "events");
  } catch (e) {
    console.warn("loadSchedule failed:", e);
    SCHEDULE = {};
  }
}

function nearestEvent(date) {
  if (!SCHEDULE_LOADED || !date) return null;
  let best = null, bestDist = Infinity;
  const t = date.getTime();
  for (const [k, ev] of Object.entries(SCHEDULE)) {
    if (!ev || !ev.start_date) continue;
    const start = new Date(ev.start_date).getTime();
    const end   = ev.end_date ? new Date(ev.end_date).getTime() : start;
    let dist;
    if (t >= start && t <= end) dist = 0;
    else if (t < start) dist = start - t;
    else dist = t - end;
    if (dist < bestDist) { bestDist = dist; best = ev; }
  }
  if (!best) return null;
  return { ev: best, days: Math.round(bestDist / 86400000), in_window: bestDist === 0 };
}

// ─────────── File parsing ───────────
function parseFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array", cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        // Try to find header row + data rows
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
        resolve(rows);
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsArrayBuffer(file);
  });
}

function findColumns(rows) {
  // Look for header row containing Date/Amount/Description patterns
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const row = rows[i].map(c => String(c || "").toLowerCase());
    const dateCol = row.findIndex(c => /\bdate\b|posting\s*date|trans/.test(c));
    const amtCol  = row.findIndex(c => /\bamount\b|\bdebit\b|\bcredit\b/.test(c));
    const descCol = row.findIndex(c => /\bdescription\b|\bpayee\b|\bdetails?\b|\bmemo\b/.test(c));
    if (dateCol >= 0 && amtCol >= 0 && descCol >= 0) {
      return { headerRow: i, dateCol, amtCol, descCol };
    }
  }
  // Fallback for QB exports which sometimes have no header
  if (rows.length && rows[0].length >= 3) {
    return { headerRow: -1, dateCol: 0, amtCol: 2, descCol: 1 };
  }
  return null;
}

function detectAccount(rows, cols) {
  // Sniff from description text
  let ccLike = 0, ckLike = 0;
  const sample = rows.slice(cols.headerRow + 1, cols.headerRow + 40);
  for (const r of sample) {
    const d = String(r[cols.descCol] || "").toLowerCase();
    if (/\bzelle\b|online transfer|wt fed|\bcheck\b|online advance/.test(d)) ckLike++;
    else if (/airline|hotel|marriott|southwest|amazon|uber|lyft/i.test(d)) ccLike++;
  }
  return ccLike > ckLike ? "cc7945" : "ck1955";
}

// ─────────── Classification ───────────
function classify(tx) {
  // tx: { date, amt, desc }
  const d = tx.desc || "";
  const amt = tx.amt || 0;
  const isCredit = amt > 0;  // bank exports: positive = credit/deposit

  // Transfer detection — not an expense
  if (TRANSFER_PATTERNS.test(d)) {
    return { bucket: "transfer", tag: "Transfer", cls: "transfer", qb_account: "Transfer", isCredit };
  }

  // Credit / refund
  if (isCredit && !/zelle from/i.test(d)) {
    // Probably a refund — try to match a travel vendor for tagging later
    for (const k of Object.keys(TRAVEL_VENDORS)) {
      if (TRAVEL_VENDORS[k].test(d)) {
        const guess = nearestEvent(tx.date);
        return {
          bucket: "credit_travel", tag: guess ? `${guess.ev.city} ${guess.ev.state}` : "החזר",
          cls: guess ? "event" : "credit", qb_account: "Refund — Travel", isCredit: true,
          guessed: !guess?.in_window, evkey: guess?.ev ? slugEv(guess.ev) : null,
        };
      }
    }
    return { bucket: "credit", tag: "החזר / זיכוי", cls: "credit", qb_account: "Income/Refund", isCredit: true };
  }

  // Recurring
  for (const r of RECURRING) {
    if (r.pat.test(d)) {
      const tol = r.tol ?? 0.05;
      const diff = r.exp ? Math.abs(Math.abs(amt) - r.exp) / r.exp : 0;
      const flag = r.exp && diff > tol ? `⚠ סטייה ${(diff*100).toFixed(0)}%` : null;
      return {
        bucket: r.owner ? "owner" : "recurring",
        tag: r.name, cls: r.owner ? "owner" : "recurring",
        qb_account: r.qb, isCredit, flag,
      };
    }
  }

  // Zelle / inventory vendors
  if (/zelle/i.test(d)) {
    if (INVENTORY_VENDORS.test(d)) {
      const m = d.match(/zelle\s+(?:to|from)\s+([^$]+?)(?:\s+\$|$)/i);
      const vendor = m ? m[1].trim() : "Vendor";
      return { bucket: "inventory", tag: "Inventory · " + vendor, cls: "inventory",
               qb_account: "Inventory + " + vendor, isCredit };
    }
    if (SUBCONTRACTOR_VENDORS.test(d)) {
      return { bucket: "subcontractor", tag: "Subcontractor", cls: "subcontractor",
               qb_account: "Subcontractor", isCredit };
    }
    // Generic Zelle — needs Lauren review
    return { bucket: "other_zelle", tag: "Zelle — לבדיקה", cls: "notag",
             qb_account: "?", isCredit };
  }

  if (OWNER_PERSONAL.test(d)) {
    return { bucket: "owner", tag: "Owner's Pay", cls: "owner",
             qb_account: "Owner's Pay & Personal Expenses", isCredit };
  }

  // Travel — needs Gmail TAG (assign tentative based on bank-charge nearest-event)
  for (const k of Object.keys(TRAVEL_VENDORS)) {
    if (TRAVEL_VENDORS[k].test(d)) {
      const guess = nearestEvent(tx.date);
      if (guess && guess.in_window) {
        // High-confidence — bank charge falls inside event window
        return {
          bucket: "travel_confident",
          tag: `${guess.ev.city} ${guess.ev.state}`,
          cls: "event", qb_account: `Travel — ${k}`, isCredit,
          travel_type: k, evkey: slugEv(guess.ev),
          gmail_needed: false,
        };
      } else if (guess) {
        return {
          bucket: "travel_pending",
          tag: `${guess.ev.city} ${guess.ev.state}? (${guess.days}d)`,
          cls: "pending", qb_account: `Travel — ${k}`, isCredit,
          travel_type: k, evkey: slugEv(guess.ev),
          gmail_needed: true,
        };
      } else {
        return {
          bucket: "travel_pending", tag: "Travel ?",
          cls: "pending", qb_account: `Travel — ${k}`, isCredit,
          travel_type: k, gmail_needed: true,
        };
      }
    }
  }

  // Catch-all
  return { bucket: "no_tag", tag: "ללא TAG", cls: "notag", qb_account: "?", isCredit };
}

function slugEv(ev) {
  return ev.city.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") + "-" + ev.start_date;
}

// ─────────── Build session ───────────
function buildSession(file, accountKey, monthVal) {
  return parseFile(file).then(rows => {
    const cols = findColumns(rows);
    if (!cols) throw new Error("לא הצלחתי לזהות עמודות Date/Amount/Description בקובץ");
    let account = accountKey;
    if (account === "auto") account = detectAccount(rows, cols);

    const tx = [];
    for (let i = cols.headerRow + 1; i < rows.length; i++) {
      const row = rows[i]; if (!row || row.length === 0) continue;
      const date = parseDate(row[cols.dateCol]);
      const amt = parseAmount(row[cols.amtCol]);
      const desc = String(row[cols.descCol] || "").trim();
      if (!date || !desc || amt === 0) continue;
      // Filter by full date range if provided (Lauren 2026-06-05)
      const _iso = dateISO(date);
      if (monthVal && monthVal.from && _iso < monthVal.from) continue;
      if (monthVal && monthVal.to && _iso > monthVal.to) continue;
      const cls = classify({ date, amt, desc });
      tx.push({
        id: "tx-" + i + "-" + Math.abs(amt).toFixed(2).replace(".", "") + "-" + date.getTime(),
        row: i, date: dateISO(date), date_human: dateMMDD(date),
        amt, desc, ...cls, done: false, gmail_verified: false,
      });
    }

    const fromIso = (monthVal && monthVal.from) || (dateISO(new Date()).slice(0,8) + "01");
    const sessionKey = fromIso.slice(0,7) + "-" + account;
    const ymY = parseInt(fromIso.slice(0,4));
    const ymM = parseInt(fromIso.slice(5,7)) - 1;

    return {
      session_key: sessionKey,
      account, account_label: ACCOUNT_LABELS[account],
      month_iso: fromIso.slice(0,7), date_from: (monthVal && monthVal.from) || null, date_to: (monthVal && monthVal.to) || null,
      month_label_he: HEBREW_MONTHS[ymM] + " " + ymY,
      tx, total_tx: tx.length,
      generated_at: new Date().toISOString(),
      events_tagged: [...new Set(tx.filter(t => t.cls === "event" || t.cls === "pending").map(t => t.evkey).filter(Boolean))],
    };
  });
}

// ─────────── UI ───────────
function renderSessionsList() {
  const list = $("sessions-list");
  const entries = Object.entries(ALL_SESSIONS).sort((a,b) => (b[1].generated_at || "").localeCompare(a[1].generated_at || ""));
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">📚</div><div>אין סשנים עדיין. העלי קובץ למעלה כדי להתחיל.</div></div>`;
    return;
  }
  list.innerHTML = `<div class="section-title">📂 סשנים קודמים <span class="count">${entries.length}</span></div>` +
    entries.map(([k, s]) => {
      const done = s.tx ? s.tx.filter(t => t.done).length : 0;
      const total = s.tx ? s.tx.length : (s.total_tx || 0);
      const cls = (done >= total && total > 0) ? "done" : "";
      const pct = total > 0 ? Math.round(100 * done / total) : 0;
      return `
        <div class="card ${cls}" style="cursor:pointer" data-open="${escapeHtml(k)}">
          <div class="info">
            <div class="top-line">${escapeHtml(s.month_label_he || k)}</div>
            <div class="bottom-line">${escapeHtml(s.account_label || "")} · ${done}/${total} (${pct}%) · ${(s.events_tagged||[]).length} אירועים</div>
          </div>
          <button class="done-btn" data-open="${escapeHtml(k)}">פתיחה</button>
        </div>`;
    }).join("");
  list.querySelectorAll("[data-open]").forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    openSession(b.getAttribute("data-open"));
  });
}

function openSession(key) {
  CURRENT_SESSION = ALL_SESSIONS[key];
  if (!CURRENT_SESSION) return;
  $("form-card").classList.add("hidden");
  $("sessions-list").classList.add("hidden");
  $("tracker").classList.remove("hidden");
  renderTracker();
  window.scrollTo(0,0);
}

function closeSession() {
  CURRENT_SESSION = null;
  $("form-card").classList.remove("hidden");
  $("sessions-list").classList.remove("hidden");
  $("tracker").classList.add("hidden");
  renderSessionsList();
}

function renderTracker() {
  const s = CURRENT_SESSION; if (!s) return;
  const done = s.tx.filter(t => t.done).length;
  const total = s.tx.length;
  const pct = total > 0 ? Math.round(100 * done / total) : 0;
  $("progress-fill").style.width = pct + "%";
  $("progress-text").textContent = `${done} / ${total} סומנו (${pct}%)`;
  $("tracker-pills").innerHTML = `
    <div class="pill">📅 <b>${escapeHtml(s.month_label_he)}</b></div>
    <div class="pill">💳 ${escapeHtml(s.account_label)}</div>
    <div class="pill">📋 <b>${total}</b> טרנזקציות</div>
    <div class="pill">🎯 <b>${s.events_tagged.length}</b> אירועים</div>`;

  const pendingTravel = s.tx.filter(t => t.gmail_needed && !t.gmail_verified && !t.done);
  if (pendingTravel.length > 0) {
    $("btn-gmail").classList.remove("hidden");
    $("btn-gmail").textContent = `🚀 שלח ${pendingTravel.length} נסיעות ל-@books לאימות Gmail`;
  } else {
    $("btn-gmail").classList.add("hidden");
  }

  const sections = [
    { id: "travel_confident", title: "✈ נסיעות (TAG ודאי)", filter: t => t.bucket === "travel_confident" },
    { id: "travel_pending",   title: "🟡 נסיעות (TAG משוער — דרוש Gmail)", filter: t => t.bucket === "travel_pending" },
    { id: "recurring",        title: "🔁 הוצאות קבועות", filter: t => t.bucket === "recurring" },
    { id: "owner",            title: "🏠 Owner's Pay / Personal", filter: t => t.bucket === "owner" },
    { id: "inventory",        title: "📦 Inventory (Zelle)", filter: t => t.bucket === "inventory" },
    { id: "subcontractor",    title: "👷 Subcontractor", filter: t => t.bucket === "subcontractor" },
    { id: "credit_travel",    title: "💰 החזרים מטיסות/מלונות", filter: t => t.bucket === "credit_travel" },
    { id: "credit",           title: "💰 זיכויים אחרים", filter: t => t.bucket === "credit" },
    { id: "other_zelle",      title: "❓ Zelle לבדיקה", filter: t => t.bucket === "other_zelle" },
    { id: "no_tag",           title: "❌ ללא TAG", filter: t => t.bucket === "no_tag" },
    { id: "transfer",         title: "↔ העברות (לא הוצאה)", filter: t => t.bucket === "transfer" },
  ];

  let html = "";
  for (const sec of sections) {
    const rows = s.tx.filter(sec.filter);
    if (rows.length === 0) continue;
    const sdone = rows.filter(t => t.done).length;
    html += `<div class="section-title">${escapeHtml(sec.title)} <span class="count">${sdone}/${rows.length}</span></div>`;
    html += rows.map(t => renderCard(t)).join("");
  }
  $("sections").innerHTML = html;

  $("sections").querySelectorAll(".done-btn").forEach(b => {
    b.onclick = () => toggleDone(b.getAttribute("data-tx"));
  });
}

function renderCard(t) {
  const cls = t.done ? "done" : "";
  const badgeClass = t.cls || "notag";
  const amtCls = t.isCredit ? "amt credit" : "amt";
  const flag = t.flag ? ` <span style="color:#92400e;font-size:11px">${escapeHtml(t.flag)}</span>` : "";
  const gmailMark = t.gmail_verified ? " ✓" : (t.gmail_needed ? " 📧" : "");
  return `
    <div class="card ${cls}">
      <div class="info">
        <div class="top-line">${escapeHtml(t.desc.slice(0, 60))}${t.desc.length > 60 ? "…" : ""}</div>
        <div class="bottom-line">${escapeHtml(t.date_human)} · <span class="${amtCls}">${fmtMoney(t.amt)}</span> · ${escapeHtml(t.qb_account || "")}${flag}</div>
      </div>
      <span class="badge ${badgeClass}">${escapeHtml(t.tag)}${gmailMark}</span>
      <button class="done-btn" data-tx="${escapeHtml(t.id)}">${t.done ? "בוצע" : "Done"}</button>
    </div>`;
}

async function toggleDone(txId) {
  const s = CURRENT_SESSION; if (!s) return;
  const t = s.tx.find(x => x.id === txId); if (!t) return;
  t.done = !t.done;
  renderTracker();
  ALL_SESSIONS[s.session_key] = s;
  const ok = await saveState(`bookkeeping: toggle done on ${txId.slice(0,18)} (${s.session_key})`);
  if (ok) toast("✓ נשמר", "success");
}

function gmailVerificationCommand() {
  const s = CURRENT_SESSION; if (!s) return "";
  const pending = s.tx.filter(t => t.gmail_needed && !t.gmail_verified && !t.done);
  if (pending.length === 0) return "";
  const lines = pending.map(t => `  - ${t.date_human} · ${fmtMoney(t.amt)} · ${t.desc.slice(0, 70)} · (תוואי TAG: ${t.tag}) · id=${t.id}`).join("\n");
  return `Read this file and follow its instructions exactly: \`C:\\Users\\laure\\OneDrive\\מסמכים\\Claude\\Scheduled\\NEW\\bookkeeping\\SKILL.md\` — it is the orchestrator for @books.

This is **Phase 2 Gmail verification** for an existing bookkeeping session.
Session key: \`${s.session_key}\` · Month: ${s.month_label_he} · Account: ${s.account_label}

The browser already classified the session and tagged everything except the ${pending.length} travel transactions below. For each one, search Gmail (eli@makeupblowoutsalegroup.com — NOT pr@) by exact amount + sender domain per \`references/tag_rules.md\`, extract the actual travel/check-in date, apply the NEAREST-EVENT rule to the schedule, and update the session state at \`docs/state/bookkeeping_sessions.json\` → \`sessions["${s.session_key}"].tx[<id>]\` with: \`gmail_verified=true\`, corrected \`tag\`, corrected \`evkey\`, corrected \`cls\` (event), \`gmail_thread_id\`, \`gmail_subject\`.

Travel transactions to verify:
${lines}

Standard SMS touchpoints apply (Touchpoint 1 start, Touchpoint 3 done). Touchpoint 3 must include the dashboard URL https://dashboard.themakeupblowout.com/bookkeeping/ on its own line. NO bit.ly anywhere (IRON RULE #6).`;
}

async function sendToGmailAgent() {
  const cmd = gmailVerificationCommand();
  if (!cmd) { toast("אין נסיעות לאמת", "error"); return; }
  try {
    await navigator.clipboard.writeText(cmd);
    toast("✓ הפקודה הועתקה — הדביקי ב-Cowork", "success");
  } catch (e) {
    // Fallback: show a modal with the text
    prompt("העתיקי את הפקודה (Ctrl+C) והדביקי ב-Cowork:", cmd);

}

// ─────────── Form handlers ───────────
function setupForm() {

  $("btn-start").onclick = startSession;

function selectFile(file) {
  SELECTED_FILE = file;
  $("file-selected").textContent = "✓ " + file.name + " (" + (file.size/1024).toFixed(0) + " KB)";
  $("file-selected").classList.remove("hidden");

async function startSession() {
  if (!SELECTED_FILE) return;
  $("btn-start").disabled = true;
  $("btn-start").textContent = "⏳ מעבד...";
  try {
    if (!SCHEDULE_LOADED) await loadSchedule();
    const account = $("f-account").value;
    const range = { from: $("f-date-from").value || null, to: $("f-date-to").value || null };
    const session = await buildSession(SELECTED_FILE, account, range);
    ALL_SESSIONS[session.session_key] = session;
    const ok = await saveState(`bookkeeping: new session ${session.session_key} (${session.total_tx} tx)`);
    if (!ok) toast("⚠ סשן נוצר אבל לא נשמר ב-GitHub", "error");
    CURRENT_SESSION = session;
    $("form-card").classList.add("hidden");
    $("sessions-list").classList.add("hidden");
    $("tracker").classList.remove("hidden");
    renderTracker();
    window.scrollTo(0,0);
  } catch (e) {
    console.error(e);
    toast("⚠ " + (e.message || "שגיאה בעיבוד הקובץ"), "error");
  } finally {
    $("btn-start").disabled = false;
    $("btn-start").textContent = "🚀 התחל סשן";
  }
}

// ─────────── QB auto-pull session (Lauren 2026-06-05) ───────────
async function startQBSession() {
  const btn = $("btn-qb");
  btn.disabled = true; btn.textContent = "⏳ מושך מ-QuickBooks...";
  try {
    if (!SCHEDULE_LOADED) await loadSchedule();
    const from = $("f-date-from").value || null;
    const to = $("f-date-to").value || null;
    const r = await fetch("../state/qb_untagged.json?_=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("qb_untagged.json לא נמצא — תבקשי ממני רענון משיכה");
    const data = await r.json();
    const rows = (data.rows || []).filter(x => (!from || (x.date || "") >= from) && (!to || (x.date || "") <= to));
    if (!rows.length) throw new Error("אין הוצאות ללא Class בטווח שנבחר");
    if (rows.length > 800) throw new Error("יותר מ-800 שורות בטווח (" + rows.length + ") — צמצמי את טווח התאריכים");
    const tx = rows.map((x, i) => {
      const dateObj = new Date(x.date + "T12:00:00");
      const amt = -Math.abs(Number(x.amount) || 0);
      const desc = [x.vendor || "", x.account || "", x.memo || ""].filter(Boolean).join(" · ");
      const cls = classify({ date: dateObj, amt, desc });
      return { id: "qb-" + (x.txn_type || "") + "-" + (x.txn_id || i) + "-" + (x.line_id || 0),
               row: i, date: x.date, date_human: (x.date || "").slice(5).split("-").reverse().join("/"),
               amt, desc, ...cls, done: false, gmail_verified: false,
               qb_txn_id: x.txn_id, qb_txn_type: x.txn_type, qb_line_id: x.line_id,
               qb_paid_from: x.paid_from || "", qb_payment_type: x.payment_type || "" };
    });
    const sessionKey = "qb-" + (from || "start") + "-" + (to || "now");
    const session = {
      session_key: sessionKey, account: "qb", account_label: "QuickBooks (ללא Class)",
      month_iso: (from || "").slice(0, 7), date_from: from, date_to: to,
      month_label_he: "QuickBooks · " + (from || "") + " → " + (to || ""),
      tx, total_tx: tx.length, generated_at: new Date().toISOString(),
      source: "quickbooks_api", qb_pulled_at: data._updated_at || null,
      events_tagged: [...new Set(tx.filter(t => t.cls === "event" || t.cls === "pending").map(t => t.evkey).filter(Boolean))],
    };
    ALL_SESSIONS[session.session_key] = session;
    const ok = await saveState("bookkeeping: QB session " + sessionKey + " (" + tx.length + " tx)");
    if (!ok) toast("⚠ סשן נוצר אבל לא נשמר ב-GitHub", "error");
    CURRENT_SESSION = session;
    $("form-card").classList.add("hidden");
    $("sessions-list").classList.add("hidden");
    $("tracker").classList.remove("hidden");
    renderTracker(); window.scrollTo(0, 0);
  } catch (e) {
    console.error(e); toast("⚠ " + (e.message || "שגיאה במשיכה מ-QuickBooks"), "error");
  } finally {
    btn.disabled = false; btn.textContent = "📥 משוך מ-QuickBooks (הוצאות ללא Class)";
  }
}

// ─────────── Init ───────────
(async function init() {
  renderTokenArea();
  setupForm();
  await Promise.all([loadState(), loadSchedule()]);
  renderSessionsList();
})();
</script>
