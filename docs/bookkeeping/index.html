      { headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json" } });
    if (getR.ok) STATE_SHA = (await getR.json()).sha;
    const body = {
      message: commitMsg || "bookkeeping: state update",
      content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
      branch: "main",
    };
    if (STATE_SHA) body.sha = STATE_SHA;
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${STATE_FILE_PATH}`, {
      method: "PUT",
      headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (r.ok) {
      STATE_SHA = (await r.json()).content.sha;
      return true;
    } else {
      const err = await r.text();
      console.error("saveState bad response:", r.status, err);
      toast("⚠ שמירה נכשלה — " + r.status, "error");
      return false;
    }
  } catch (e) { console.error("saveState exception:", e); toast("⚠ שמירה נכשלה", "error"); return false; }
}

// ─────────── Schedule (fetched from /launch/) ───────────
async function loadSchedule() {
  try {
    const r = await fetch("../launch/?_=" + Date.now(), { cache: "no-store" });
    const html = await r.text();
    const m = html.match(/const\s+SCHEDULE\s*=\s*(\{[\s\S]*?\n\s*\})\s*;/);
    if (!m) throw new Error("SCHEDULE not found in /launch/");
    SCHEDULE = (new Function("return " + m[1]))();
    SCHEDULE_LOADED = true;
    console.log("Schedule loaded:", Object.keys(SCHEDULE).length, "events");
  } catch (e) {
    console.warn("loadSchedule failed:", e);
    SCHEDULE = {};
  }
}

function nearestEvent(date) {
  if (!SCHEDULE_LOADED || !date) return null;
  let best = null, bestDist = Infinity;
  const t = date.getTime();
  for (const [k, ev] of Object.entries(SCHEDULE)) {
    if (!ev || !ev.start_date) continue;
    const start = new Date(ev.start_date).getTime();
    const end   = ev.end_date ? new Date(ev.end_date).getTime() : start;
    let dist;
    if (t >= start && t <= end) dist = 0;
    else if (t < start) dist = start - t;
    else dist = t - end;
    if (dist < bestDist) { bestDist = dist; best = ev; }
  }
  if (!best) return null;
  return { ev: best, days: Math.round(bestDist / 86400000), in_window: bestDist === 0 };
}

// ─────────── File parsing ───────────
function parseFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: "array", cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        // Try to find header row + data rows
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
        resolve(rows);
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsArrayBuffer(file);
  });
}

function findColumns(rows) {
  // Look for header row containing Date/Amount/Description patterns
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const row = rows[i].map(c => String(c || "").toLowerCase());
    const dateCol = row.findIndex(c => /\bdate\b|posting\s*date|trans/.test(c));
    const amtCol  = row.findIndex(c => /\bamount\b|\bdebit\b|\bcredit\b/.test(c));
    const descCol = row.findIndex(c => /\bdescription\b|\bpayee\b|\bdetails?\b|\bmemo\b/.test(c));
    if (dateCol >= 0 && amtCol >= 0 && descCol >= 0) {
      return { headerRow: i, dateCol, amtCol, descCol };
    }
  }
  // Fallback for QB exports which sometimes have no header
  if (rows.length && rows[0].length >= 3) {
    return { headerRow: -1, dateCol: 0, amtCol: 2, descCol: 1 };
  }
  return null;
}

function detectAccount(rows, cols) {
  // Sniff from description text
  let ccLike = 0, ckLike = 0;
  const sample = rows.slice(cols.headerRow + 1, cols.headerRow + 40);
  for (const r of sample) {
    const d = String(r[cols.descCol] || "").toLowerCase();
    if (/\bzelle\b|online transfer|wt fed|\bcheck\b|online advance/.test(d)) ckLike++;
    else if (/airline|hotel|marriott|southwest|amazon|uber|lyft/i.test(d)) ccLike++;
  }
  return ccLike > ckLike ? "cc7945" : "ck1955";
}

// ─────────── Classification ───────────
function classify(tx) {
  // tx: { date, amt, desc }
  const d = tx.desc || "";
  const amt = tx.amt || 0;
  const isCredit = amt > 0;  // bank exports: positive = credit/deposit

  // Transfer detection — not an expense
  if (TRANSFER_PATTERNS.test(d)) {
    return { bucket: "transfer", tag: "Transfer", cls: "transfer", qb_account: "Transfer", isCredit };
  }

  // Credit / refund
  if (isCredit && !/zelle from/i.test(d)) {
    // Probably a refund — try to match a travel vendor for tagging later
    for (const k of Object.keys(TRAVEL_VENDORS)) {
      if (TRAVEL_VENDORS[k].test(d)) {
        const guess = nearestEvent(tx.date);
        return {
          bucket: "credit_travel", tag: guess ? `${guess.ev.city} ${guess.ev.state}` : "החזר",
          cls: guess ? "event" : "credit", qb_account: "Refund — Travel", isCredit: true,
          guessed: !guess?.in_window, evkey: guess?.ev ? slugEv(guess.ev) : null,
        };
      }
    }
    return { bucket: "credit", tag: "החזר / זיכוי", cls: "credit", qb_account: "Income/Refund", isCredit: true };
  }

  // Recurring
  for (const r of RECURRING) {
    if (r.pat.test(d)) {
      const tol = r.tol ?? 0.05;
      const diff = r.exp ? Math.abs(Math.abs(amt) - r.exp) / r.exp : 0;
      const flag = r.exp && diff > tol ? `⚠ סטייה ${(diff*100).toFixed(0)}%` : null;
      return {
        bucket: r.owner ? "owner" : "recurring",
        tag: r.name, cls: r.owner ? "owner" : "recurring",
        qb_account: r.qb, isCredit, flag,
      };
    }
  }

  // Zelle / inventory vendors
  if (/zelle/i.test(d)) {
    if (INVENTORY_VENDORS.test(d)) {
      const m = d.match(/zelle\s+(?:to|from)\s+([^$]+?)(?:\s+\$|$)/i);
      const vendor = m ? m[1].trim() : "Vendor";
      return { bucket: "inventory", tag: "Inventory · " + vendor, cls: "inventory",
               qb_account: "Inventory + " + vendor, isCredit };
    }
    if (SUBCONTRACTOR_VENDORS.test(d)) {
      return { bucket: "subcontractor", tag: "Subcontractor", cls: "subcontractor",
               qb_account: "Subcontractor", isCredit };
    }
    // Generic Zelle — needs Lauren review
    return { bucket: "other_zelle", tag: "Zelle — לבדיקה", cls: "notag",
             qb_account: "?", isCredit };
  }

  if (OWNER_PERSONAL.test(d)) {
    return { bucket: "owner", tag: "Owner's Pay", cls: "owner",
             qb_account: "Owner's Pay & Personal Expenses", isCredit };
  }

  // Travel — needs Gmail TAG (assign tentative based on bank-charge nearest-event)
  for (const k of Object.keys(TRAVEL_VENDORS)) {
    if (TRAVEL_VENDORS[k].test(d)) {
      const guess = nearestEvent(tx.date);
      if (guess && guess.in_window) {
        // High-confidence — bank charge falls inside event window
        return {
          bucket: "travel_confident",
          tag: `${guess.ev.city} ${guess.ev.state}`,
          cls: "event", qb_account: `Travel — ${k}`, isCredit,
          travel_type: k, evkey: slugEv(guess.ev),
          gmail_needed: false,
        };
      } else if (guess) {
        return {
          bucket: "travel_pending",
          tag: `${guess.ev.city} ${guess.ev.state}? (${guess.days}d)`,
          cls: "pending", qb_account: `Travel — ${k}`, isCredit,
          travel_type: k, evkey: slugEv(guess.ev),
          gmail_needed: true,
        };
      } else {
        return {
          bucket: "travel_pending", tag: "Travel ?",
          cls: "pending", qb_account: `Travel — ${k}`, isCredit,
          travel_type: k, gmail_needed: true,
        };
      }
    }
  }

  // Catch-all
  return { bucket: "no_tag", tag: "ללא TAG", cls: "notag", qb_account: "?", isCredit };
}

function slugEv(ev) {
  return ev.city.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") + "-" + ev.start_date;
}

// ─────────── Build session ───────────
function buildSession(file, accountKey, monthVal) {
  return parseFile(file).then(rows => {
    const cols = findColumns(rows);
    if (!cols) throw new Error("לא הצלחתי לזהות עמודות Date/Amount/Description בקובץ");
    let account = accountKey;
    if (account === "auto") account = detectAccount(rows, cols);

    const tx = [];
    for (let i = cols.headerRow + 1; i < rows.length; i++) {
      const row = rows[i]; if (!row || row.length === 0) continue;
      const date = parseDate(row[cols.dateCol]);
      const amt = parseAmount(row[cols.amtCol]);
      const desc = String(row[cols.descCol] || "").trim();
      if (!date || !desc || amt === 0) continue;
      // Filter by full date range if provided (Lauren 2026-06-05)
      const _iso = dateISO(date);
      if (monthVal && monthVal.from && _iso < monthVal.from) continue;
      if (monthVal && monthVal.to && _iso > monthVal.to) continue;
      const cls = classify({ date, amt, desc });
      tx.push({
        id: "tx-" + i + "-" + Math.abs(amt).toFixed(2).replace(".", "") + "-" + date.getTime(),
        row: i, date: dateISO(date), date_human: dateMMDD(date),
        amt, desc, ...cls, done: false, gmail_verified: false,
      });
    }

    const fromIso = (monthVal && monthVal.from) || (dateISO(new Date()).slice(0,8) + "01");
    const sessionKey = fromIso.slice(0,7) + "-" + account;
    const ymY = parseInt(fromIso.slice(0,4));
    const ymM = parseInt(fromIso.slice(5,7)) - 1;

    return {
      session_key: sessionKey,
      account, account_label: ACCOUNT_LABELS[account],
      month_iso: fromIso.slice(0,7), date_from: (monthVal && monthVal.from) || null, date_to: (monthVal && monthVal.to) || null,
      month_label_he: HEBREW_MONTHS[ymM] + " " + ymY,
      tx, total_tx: tx.length,
      generated_at: new Date().toISOString(),
      events_tagged: [...new Set(tx.filter(t => t.cls === "event" || t.cls === "pending").map(t => t.evkey).filter(Boolean))],
    };
  });
}

// ─────────── UI ───────────
function renderSessionsList() {
  const list = $("sessions-list");
  const entries = Object.entries(ALL_SESSIONS).sort((a,b) => (b[1].generated_at || "").localeCompare(a[1].generated_at || ""));
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">📚</div><div>אין סשנים עדיין. העלי קובץ למעלה כדי להתחיל.</div></div>`;
    return;
  }
  list.innerHTML = `<div class="section-title">📂 סשנים קודמים <span class="count">${entries.length}</span></div>` +
    entries.map(([k, s]) => {
      const done = s.tx ? s.tx.filter(t => t.done).length : 0;
      const total = s.tx ? s.tx.length : (s.total_tx || 0);
      const cls = (done >= total && total > 0) ? "done" : "";
      const pct = total > 0 ? Math.round(100 * done / total) : 0;
      return `
        <div class="card ${cls}" style="cursor:pointer" data-open="${escapeHtml(k)}">
          <div class="info">
            <div class="top-line">${escapeHtml(s.month_label_he || k)}</div>
            <div class="bottom-line">${escapeHtml(s.account_label || "")} · ${done}/${total} (${pct}%) · ${(s.events_tagged||[]).length} אירועים</div>
          </div>
          <button class="done-btn" data-open="${escapeHtml(k)}">פתיחה</button>
          <button class="done-btn" data-del="${escapeHtml(k)}" style="background:#fee2e2;color:#b91c1c" title="מחיקת הסשן">🗑</button>
        </div>`;
    }).join("");
  list.querySelectorAll("[data-del]").forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    const k = b.getAttribute("data-del");
    if (!confirm("למחוק את הסשן הזה? (ההוצאות עצמן לא נמחקות — רק רשימת העבודה)")) return;
    DELETED_SESSIONS.add(k);
    delete ALL_SESSIONS[k];
    if (CURRENT_SESSION && CURRENT_SESSION.session_key === k) CURRENT_SESSION = null;
    renderSessionsList();
    const ok = await saveState("bookkeeping: delete session " + k);
    toast(ok ? "🗑 הסשן נמחק" : "⚠ מחיקה לא נשמרה", ok ? "success" : "error");
  });
  list.querySelectorAll("[data-open]").forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    openSession(b.getAttribute("data-open"));
  });
}

const DELETED_SESSIONS = new Set();
let EMAILQ = null;
let EMAILQ_BUSY = false;
async function applyEmailResults(manual) {
  if (EMAILQ_BUSY) return;
  EMAILQ_BUSY = true;
  try { await _applyEmailResults(manual); } finally { EMAILQ_BUSY = false; }
}
async function _applyEmailResults(manual) {
  const s = CURRENT_SESSION;
  if (!s || s.source !== "quickbooks_api") return;
  try {
    const r = await fetch("../state/qb_email_check_queue.json?_=" + Date.now(), { cache: "no-store" });
    if (r.ok) EMAILQ = await r.json();
  } catch(e) { return; }
  // live status chip — never leave Lauren in the dark
  const chip = document.getElementById("email-status");
  if (chip && EMAILQ) {
    const keys = new Set(s.tx.map(t => t.qb_key));
    const mine = (EMAILQ.queue || []).filter(e => keys.has(e.key));
    const pend = mine.filter(e => e.status === "pending").length;
    const ready = mine.filter(e => e.status === "done").length;
    const noRec = mine.filter(e => e.status === "no_receipt" || e.status === "error").length;
    chip.textContent = (pend || ready || noRec)
      ? `⏳ בבדיקה: ${pend} · ✓ נמצאו: ${ready}` + (noRec ? ` · ⚠ לא נמצאו: ${noRec}` : "")
      : "";
    if (manual && pend) toast("⏳ עדיין בבדיקה — " + pend + " ממתינות. האתר מתעדכן תוך ~דקה", "success");
    if (manual && !pend && !ready && !noRec) toast("אין בדיקות פעילות לסשן הזה", "success");
  }
  const done = {};
  (EMAILQ && EMAILQ.queue || []).forEach(e => { if (e.status === "done" && (e.result_cls || e.result_account)) done[e.key] = e; });
  let applied = 0;
  s.tx.forEach(t => {
    const e = t.qb_key && done[t.qb_key];
    if (e && !t.done && !t.email_applied) {
      if (e.result_cls) t.sel_class = e.result_cls;
      if (e.result_account) t.sel_account = e.result_account;
      t.recognized = true; t.email_applied = true; applied++;
    }
  });
  if (applied) {
    toast("📧 " + applied + " שיוכים הגיעו מבדיקת האימייל", "success");
    ALL_SESSIONS[s.session_key] = s;
    saveState("bookkeeping: applied " + applied + " email-match results");
    renderTracker();
  }
}

function openSession(key) {
  CURRENT_SESSION = ALL_SESSIONS[key];

function buildClassOptions(selVal) {
  const today = new Date().toISOString().slice(0, 10);
  const evs = EVENTS_INDEX.events || [];
  const qbSet = new Set((QB_LISTS.classes || []).map(c => c.name));
  const mark = n => qbSet.has(n) ? n : n + " ⚠";   // ⚠ = Class not created in QB yet
  const opt = (v, label) => `<option value="${escapeHtml(v)}" ${v === selVal ? "selected" : ""}>${escapeHtml(label)}</option>`;
  const recent = evs.filter(e => e.start_date <= today).slice(-5).reverse();
  const next = evs.filter(e => e.start_date > today).slice(0, 3);
  const fixedCls = (QB_LISTS.classes || []).filter(c => !/\d{4}\s*$/.test(c.name));
  let html = '<option value="">— Class —</option>';
  const inLists = new Set([...recent, ...next].map(e => e.class_name).concat(fixedCls.map(c => c.name)));
  if (selVal && !inLists.has(selVal)) html += opt(selVal, selVal);
  if (recent.length) html += '<optgroup label="🕘 אירועים אחרונים">' + recent.map(e => opt(e.class_name, mark(e.class_name))).join("") + "</optgroup>";
  if (next.length) html += '<optgroup label="📅 אירועים קרובים">' + next.map(e => opt(e.class_name, mark(e.class_name))).join("") + "</optgroup>";
  if (fixedCls.length) html += '<optgroup label="🏬 קבועים">' + fixedCls.map(c => opt(c.name, c.name)).join("") + "</optgroup>";
  html += '<option value="__search__">🔍 אירוע אחר — חיפוש...</option>';
  return html;
}

function buildQueueEntry(t, status) {
  return { key: t.qb_key, txn_type: t.qb_txn_type, txn_id: t.qb_txn_id, line_id: t.qb_line_id,
    date: t.date, amount: Math.abs(t.amt), desc: (t.desc||"").slice(0,80),
    etype: t.etype || "", vendor: t.qb_vendor || "", paid_from: t.qb_paid_from || "", payment_type: t.qb_payment_type || "",
    set: { account: t.sel_account || "", cls: t.sel_class || "", vendor: t.sel_vendor || "" },
    status: status, queued_at: new Date().toISOString() };
}
function learnFromRows(d, rows, now) {
  d = d || { rules: {} }; if (!d.rules) d.rules = {};
  rows.forEach(t => {
    const k = ruleKey(t);
    if (isGenericRuleKey(k)) return;   // never learn a rule from a generic key (2026-06-07)
    const rule = { account: t.sel_account || "", vendor: t.sel_vendor || "" };
    if (t.sel_class && !/\d{4}\s*$/.test(t.sel_class)) rule.cls = t.sel_class;
    const acc = (t.sel_account || "").toLowerCase();
    rule.etype = t.etype_manual ? (t.etype || "")
               : (/loan/.test(acc) ? "loan" : (/owner|personal/.test(acc) ? "owner" : (t.etype || "")));
    d.rules[k] = Object.assign({}, d.rules[k] || {}, rule, { learned_at: now });
    QB_RULES.rules[k] = d.rules[k];
  });
  return d;
}

function evkeyForClass(clsName) {
  if (!clsName) return null;
  const ev = (EVENTS_INDEX.events || []).find(e => e.class_name === clsName);
  return ev ? ev.evkey : null;
}
async function pnlLiveAdd(t, status) {
  const evkey = evkeyForClass(t.sel_class); if (!evkey) return;
  await ghPutJson("docs/state/pnl_qb_live.json", d => {
    d = d || { events: {} }; if (!d.events) d.events = {};
    const ev = d.events[evkey] = d.events[evkey] || { entries: {} };
    ev.entries[t.qb_key] = { date: t.date, amount: Math.abs(t.amt),
      desc: (t.qb_vendor || t.desc || "").slice(0, 60), account: t.sel_account || "",
      etype: t.etype || "", status: status, added_at: new Date().toISOString() };
    return d;
  }, "pnl-live: " + evkey + " ← " + t.qb_key);
}
async function pnlLiveRemove(key) {
  await ghPutJson("docs/state/pnl_qb_live.json", d => {
    d = d || { events: {} };
    for (const ev of Object.values(d.events || {})) { if (ev.entries) delete ev.entries[key]; }
    return d;
  }, "pnl-live: remove " + key);
}

// ── stage / unstage: Done on a QB row = "טופל" — saved + learned + hidden, pushed later ──
async function stageRows(rows) {
  const now = new Date().toISOString();
  const entries = rows.map(t => buildQueueEntry(t, "staged"));
  const files = [
    { path: "docs/state/qb_post_queue.json", mutate: d => {
        d = d || { queue: [] }; if (!d.queue) d.queue = [];
        entries.forEach(entry => {
          const i = d.queue.findIndex(q => q.key === entry.key && q.status !== "applied");
          if (i >= 0) d.queue[i] = entry; else d.queue.push(entry);
        });
        return d; } },
    { path: "docs/state/qb_processed.json", mutate: d => {
        d = d || { processed: {} }; if (!d.processed) d.processed = {};
        entries.forEach(e => { d.processed[e.key] = { status: "staged", at: now }; });
        return d; } },
    { path: "docs/state/qb_filing_rules.json", mutate: d => learnFromRows(d, rows, now) },
  ];
  const withEv = rows.filter(t => evkeyForClass(t.sel_class));
  if (withEv.length) files.push({ path: "docs/state/pnl_qb_live.json", mutate: d => {
      d = d || { events: {} }; if (!d.events) d.events = {};
      withEv.forEach(t => {
        const evkey = evkeyForClass(t.sel_class);
        const ev = d.events[evkey] = d.events[evkey] || { entries: {} };
        ev.entries[t.qb_key] = { date: t.date, amount: Math.abs(t.amt),
          desc: (t.qb_vendor || t.desc || "").slice(0, 60), account: t.sel_account || "",
          etype: t.etype || "", status: "staged", added_at: now };
      });
      return d; } });
  const r = await ghBatchJson(files, "bookkeeping: stage " + rows.length + " rows (bulk Done)");
  if (r) STAGED_TOTAL += rows.length;
  return !!r;
}

async function doneSelected() {
  const s = CURRENT_SESSION; if (!s) return;
  const picked = s.tx.filter(t => t.picked && !t.done && t.qb_key);

  const btn = document.getElementById("btn-done-sel");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ שומר..."; }
  const ok = await stageRows(picked);
  if (ok) {
    picked.forEach(t => { t.done = true; t.picked = false; t.recognized = true; });
    ALL_SESSIONS[s.session_key] = s;
    await saveState("bookkeeping: bulk Done " + picked.length + " (" + s.session_key + ")");
    toast("✓ " + picked.length + " טופלו ונשמרו — יידחפו בלחיצת 📤", "success");
    const nPaid = await syncSupplierPayments(picked);
    if (nPaid) toast("🧾 " + nPaid + " חשבוניות סומנו כשולמו בדשבורד הספקים", "success");
  } else {
    toast("⚠ לא נשמר — השורות נשארו ברשימה, נסי שוב", "error");
  }
  renderTracker();
}

async function stageRow(t) {
  const s = CURRENT_SESSION; if (!s) return false;
  const now = new Date().toISOString();
  const entry = buildQueueEntry(t, "staged");
  const evkey = evkeyForClass(t.sel_class);
  const files = [
    { path: "docs/state/qb_post_queue.json", mutate: d => {
        d = d || { queue: [] }; if (!d.queue) d.queue = [];
        const i = d.queue.findIndex(q => q.key === entry.key && q.status !== "applied");
        if (i >= 0) d.queue[i] = entry; else d.queue.push(entry);
        return d; } },
    { path: "docs/state/qb_processed.json", mutate: d => {
        d = d || { processed: {} }; if (!d.processed) d.processed = {};
        d.processed[entry.key] = { status: "staged", at: now };
        return d; } },
    { path: "docs/state/qb_filing_rules.json", mutate: d => learnFromRows(d, [t], now) },
  ];
  if (evkey) files.push({ path: "docs/state/pnl_qb_live.json", mutate: d => {
      d = d || { events: {} }; if (!d.events) d.events = {};
      const ev = d.events[evkey] = d.events[evkey] || { entries: {} };
      ev.entries[t.qb_key] = { date: t.date, amount: Math.abs(t.amt),
        desc: (t.qb_vendor || t.desc || "").slice(0, 60), account: t.sel_account || "",
        etype: t.etype || "", status: "staged", added_at: now };
      return d; } });
  const r = await ghBatchJson(files, "bookkeeping: stage " + entry.key);
  if (!r) return false;
  STAGED_TOTAL += 1;
  return true;
}
async function unstageRow(t) {

    { path: "docs/state/qb_processed.json", mutate: d => {

// ── the big push: everything staged → queued → CI applies to QuickBooks ──
async function pushStaged() {
  const btn = document.getElementById("btn-push-staged");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ דוחף..."; }
  try {
    let stagedEntries = [];
    const nowIso = new Date().toISOString();
    await ghBatchJson([
      { path: "docs/state/qb_post_queue.json", mutate: d => {
          d = d || { queue: [] };
          (d.queue || []).forEach(q => { if (q.status === "staged") { q.status = "queued"; q.queued_at = nowIso; stagedEntries.push(q); } });
          return d; } },
      { path: "docs/state/qb_processed.json", mutate: d => {
          d = d || { processed: {} };
          stagedEntries.forEach(e => { d.processed[e.key] = { status: "queued", at: nowIso }; });
          return d; } },
      { path: "docs/state/pnl_qb_live.json", mutate: d => {
          d = d || { events: {} };
          const keys = new Set(stagedEntries.map(e => e.key));
          for (const ev of Object.values(d.events || {})) {
            for (const [k, ent] of Object.entries(ev.entries || {})) {
              if (keys.has(k)) { ent.status = "pushed"; ent.pushed_at = nowIso; }
            }
          }
          return d; } },
    ], "bookkeeping: push " + STAGED_TOTAL + " staged rows to QuickBooks [qb-go]");
    const supRows = stagedEntries.filter(e => e.etype === "supplier").map(e => ({
      etype: e.etype, qb_vendor: e.vendor, desc: e.desc, amt: e.amount, date: e.date,
      qb_payment_type: e.payment_type, qb_paid_from: e.paid_from }));
    const nPaid = await syncSupplierPayments(supRows);
    if (nPaid) toast("🧾 " + nPaid + " חשבוניות סומנו כשולמו בדשבורד הספקים", "success");
    toast("🚀 " + stagedEntries.length + " הוצאות נדחפו לקוויקבוקס — יוחלו תוך כדקה", "success");
    STAGED_TOTAL = 0;
    renderTracker();
  } catch (e) {
    toast("⚠ " + (e.message || "שגיאה בדחיפה"), "error");
  } finally {
    if (btn) {
      btn.disabled = false;
      if (/דוחף/.test(btn.textContent || "")) btn.textContent = "📤 דחוף לקוויקבוקס (" + STAGED_TOTAL + " שטופלו)";
    }
  }
}

async function syncSupplierPayments(rows) {
  // Lauren 2026-06-06 #4: a posted supplier expense marks the matching invoice as PAID
  // in the suppliers dashboard. Conservative: only when exactly ONE unpaid invoice of
  // that supplier matches the amount within $1.
  const supRows = rows.filter(t => t.etype === "supplier" && matchSupplierName(t));
  if (!supRows.length) return 0;
  let invoices = {};
  try {
    const r = await fetch("../state/supplier_invoices.json?_=" + Date.now(), { cache: "no-store" });
    if (r.ok) invoices = (await r.json()).suppliers || {};
  } catch(e) { return 0; }
  let payState = {};
  try {
    const r = await fetch("../state/supplier_payments.json?_=" + Date.now(), { cache: "no-store" });
    if (r.ok) payState = (await r.json()).invoices || {};
  } catch(e) {}
  const updates = {};
  let manual = [];
  try {
    const r = await fetch("../state/supplier_manual_invoices.json?_=" + Date.now(), { cache: "no-store" });
    if (r.ok) manual = (await r.json()).invoices || [];
  } catch(e) {}
  for (const t of supRows) {
    const supName = matchSupplierName(t);
    const all = ((invoices[supName] || {}).invoices || []).concat(manual.filter(i => (i.supplier || "") === supName));
    if (!all.length) continue;
    const amt = Math.abs(t.amt);
    const unpaid = all.filter(inv => !((payState[inv.id] || {}).paid) && !updates[inv.id]);
    let cands = unpaid.filter(inv => Math.abs((inv.amount || 0) - amt) <= 1.0);
    if (!cands.length) cands = unpaid.filter(inv => (inv.shipping || 0) && Math.abs((inv.amount || 0) + inv.shipping - amt) <= 1.0);
    if (cands.length === 1) {
      const pt = ((t.qb_payment_type || "") + " " + (t.qb_paid_from || "")).toLowerCase();
      const method = pt.indexOf("credit") !== -1 ? "Credit Card" : (pt.indexOf("check") !== -1 ? "Check" : "Zelle");
      updates[cands[0].id] = { paid: true, paid_date: t.date, payment_method: method,
        auto_source: "bookkeeping POST " + t.qb_key };
    }
  }
  const n = Object.keys(updates).length;
  if (!n) return 0;
  await ghPutJson("docs/state/supplier_payments.json", d => {
    d = d || { invoices: {} }; if (!d.invoices) d.invoices = {};
    for (const [id, u] of Object.entries(updates)) d.invoices[id] = Object.assign({}, d.invoices[id] || {}, u);
    return d;
  }, "suppliers: auto-mark " + n + " invoices paid (from bookkeeping POST)");
  return n;
}

The browser already classified the session and tagged everything except the ${pending.length} travel transactions below. For each one, search Gmail (eli@makeupblowoutsalegroup.com — NOT pr@) by exact amount + sender domain per \`references/tag_rules.md\`, extract the actual travel/check-in date, apply the NEAREST-EVENT rule to the schedule, and update the session state at \`docs/state/bookkeeping_sessions.json\` → \`sessions["${s.session_key}"].tx[<id>]\` with: \`gmail_verified=true\`, corrected \`tag\`, corrected \`evkey\`, corrected \`cls\` (event), \`gmail_thread_id\`, \`gmail_subject\`.

Travel transactions to verify:
${lines}

Standard SMS touchpoints apply (Touchpoint 1 start, Touchpoint 3 done). Touchpoint 3 must include the dashboard URL https://dashboard.themakeupblowout.com/bookkeeping/ on its own line. NO bit.ly anywhere (IRON RULE #6).`;
}

async function sendToGmailAgent() {
  const cmd = gmailVerificationCommand();
  if (!cmd) { toast("אין נסיעות לאמת", "error"); return; }
  try {
    await navigator.clipboard.writeText(cmd);
    toast("✓ הפקודה הועתקה — הדביקי ב-Cowork", "success");
  } catch (e) {
    // Fallback: show a modal with the text
    prompt("העתיקי את הפקודה (Ctrl+C) והדביקי ב-Cowork:", cmd);
  }
}

// ─────────── Form handlers ───────────
function setupForm() {
  const today = new Date();
  const fmtD = (dt) => dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
  $("f-session-date").value = fmtD(today);

  const zone = $("file-zone");
  const input = $("f-file");
  input.onchange = () => { if (input.files[0]) selectFile(input.files[0]); };
  zone.ondragover = (e) => { e.preventDefault(); zone.classList.add("drag"); };
  zone.ondragleave = () => zone.classList.remove("drag");
  zone.ondrop = (e) => {
    e.preventDefault(); zone.classList.remove("drag");
    if (e.dataTransfer.files[0]) selectFile(e.dataTransfer.files[0]);
  };

  $("btn-start").onclick = startSession;
  $("btn-qb").onclick = startQBSession;
  $("btn-update").onclick = doUpdate;
  renderTiles();
  $("btn-qb-refresh").onclick = async () => {
    const token = getToken();
    if (!token) { toast("⚠ אין GitHub token", "error"); return; }
    const b = $("btn-qb-refresh"); b.disabled = true; b.textContent = "⏳ מרענן... (~דקה)";
    try {
      const r = await fetch(`https://api.github.com/repos/${GH_REPO}/actions/workflows/qb-untagged-refresh.yml/dispatches`, {
        method: "POST",
        headers: { "Authorization": "token " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ ref: "main" }) });
      toast(r.ok || r.status === 204 ? "🔄 הרענון רץ — עוד כדקה אפשר למשוך" : "⚠ נכשל (" + r.status + ")", r.ok || r.status === 204 ? "success" : "error");
    } catch(e) { toast("⚠ " + e.message, "error"); }
    setTimeout(() => { b.disabled = false; b.textContent = "🔄 רענן מ-QB"; }, 60000);
  };
  $("btn-back").onclick = closeSession;
  $("btn-gmail").onclick = sendToGmailAgent;
}

function selectFile(file) {
  SELECTED_FILE = file;
  $("file-selected").textContent = "✓ " + file.name + " (" + (file.size/1024).toFixed(0) + " KB)";
  $("file-selected").classList.remove("hidden");
  $("btn-start").disabled = false;
}

async function startSession() {
  if (!SELECTED_FILE) return;
  $("btn-start").disabled = true;
  $("btn-start").textContent = "⏳ מעבד...";
  try {
    if (!SCHEDULE_LOADED) await loadSchedule();
    const account = $("f-account").value;
    const sd = $("f-session-date").value || null;   // bookkeeping handling date
    const range = sd ? { from: sd.slice(0,7) + "-01", to: sd } : null;
    const session = await buildSession(SELECTED_FILE, account, range);
    ALL_SESSIONS[session.session_key] = session;
    const ok = await saveState(`bookkeeping: new session ${session.session_key} (${session.total_tx} tx)`);
    if (!ok) toast("⚠ סשן נוצר אבל לא נשמר ב-GitHub", "error");
    CURRENT_SESSION = session;
    $("form-card").classList.add("hidden");
    $("sessions-list").classList.add("hidden");
    $("tracker").classList.remove("hidden");
    renderTracker();
    window.scrollTo(0,0);
  } catch (e) {
    console.error(e);
    toast("⚠ " + (e.message || "שגיאה בעיבוד הקובץ"), "error");
  } finally {
    $("btn-start").disabled = false;
    $("btn-start").textContent = "🚀 התחל סשן";
  }
}

// ─────────── QB auto-pull session (Lauren 2026-06-05) ───────────
async function startQBSession() {
  const btn = $("btn-qb");
  btn.disabled = true; btn.textContent = "⏳ מושך מ-QuickBooks...";
  try {
    if (!SCHEDULE_LOADED) await loadSchedule();
    const sd = $("f-session-date").value || new Date().toISOString().slice(0,10);
    const fromD = new Date(sd + "T12:00:00"); fromD.setDate(fromD.getDate() - 60);
    const from = fromD.toISOString().slice(0,10);   // default window: 60 days back from the handling date
    const to = sd;
    const acct = $("f-account").value;
    const ACCT_QB_MATCH = { cc7945: "7945", ck1955: "1955", mc9800: "9800", dm3977: "3977", bm8884: "8884" };
    await loadQBRefs();
    const r = await fetch("../state/qb_untagged.json?_=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("qb_untagged.json לא נמצא — תבקשי ממני רענון משיכה");
    const data = await r.json();
    let rows = (data.rows || []).filter(x => (x.date || "") >= from && (x.date || "") <= to);
    if (acct !== "auto" && ACCT_QB_MATCH[acct]) rows = rows.filter(x => (x.paid_from || "").indexOf(ACCT_QB_MATCH[acct]) !== -1);
    // skip rows Lauren already processed/queued (the real "pending" = not handled by Lauren yet)
    rows = rows.filter(x => !QB_PROCESSED.processed[(x.txn_type||"") + "-" + (x.txn_id||"") + "-" + (x.line_id||"")]);
    if (!rows.length) throw new Error("אין הוצאות ללא Class בטווח שנבחר");
    if (rows.length > 800) throw new Error("יותר מ-800 שורות בטווח (" + rows.length + ") — צמצמי את טווח התאריכים");
    const tx = rows.map((x, i) => {
      const dateObj = new Date(x.date + "T12:00:00");
      const amt = -Math.abs(Number(x.amount) || 0);
      const desc = [x.vendor || "", x.account || "", x.memo || ""].filter(Boolean).join(" · ");
      const cls = classify({ date: dateObj, amt, desc });
      return { id: "qb-" + (x.txn_type || "") + "-" + (x.txn_id || i) + "-" + (x.line_id || 0),
               row: i, date: x.date, date_human: (x.date || "").slice(5).replace("-", "/"),
               amt, desc, ...cls, done: false, gmail_verified: false,
               qb_txn_id: x.txn_id, qb_txn_type: x.txn_type, qb_line_id: x.line_id,
               qb_key: (x.txn_type||"") + "-" + (x.txn_id||"") + "-" + (x.line_id||""),
               qb_vendor: x.vendor || "", qb_paid_from: x.paid_from || "", qb_payment_type: x.payment_type || "",
               qb_memo: x.memo || "",
               sel_account: x.account || "", sel_class: "", sel_vendor: x.vendor || "", picked: false };
    });
    // apply learned filing rules → auto-recognized rows (green)
    tx_apply_rules: {
      // (rules applied below after tx built)
    }
    const acctLabel = (acct === "auto") ? "כל החשבונות" : ($("f-account").selectedOptions[0].textContent);
    tx.forEach(t => {
      const _rk = ruleKey(t);
      const rule = isGenericRuleKey(_rk) ? null : QB_RULES.rules[_rk];
      if (rule) {
        t.sel_account = rule.account || t.sel_account;
        if (rule.cls) t.sel_class = rule.cls;
        if (rule.vendor) t.sel_vendor = rule.vendor;
        t.recognized = true;
      }
      t.etype = classifyType(t);
      // category suggestion — rows arrive as "Uncategorized Expense" (auto-add architecture);
      // learned rule fills first (above); otherwise suggest by payee pattern
      if (!t.sel_account || /uncategorized/i.test(t.sel_account)) {
        const hay = ((t.qb_vendor || "") + " " + (t.desc || "")).toLowerCase();
        for (const [pat, cat] of (QB_TYPES.category_suggestions || [])) {
          if (hay.indexOf(pat) !== -1) { t.sel_account = cat; t.cat_suggested = true; break; }
        }
        // Lauren 2026-06-07: personal expense -> suggest "Owner Expenses" (QB acct 284).
        // Any payee matching the "owner" etype patterns in qb_expense_types.json lands here;
        // after Lauren POSTs once, learnFromRows() stores a per-payee rule (acc matches /owner/ -> etype owner).
        if ((!t.sel_account || /uncategorized/i.test(t.sel_account)) && t.etype === "owner") {
          t.sel_account = "Owner Expenses"; t.cat_suggested = true;
        }
      }
      // Lauren 2026-06-06: manager-card expenses (food/gas/lyft/coffee/supplies/parking)
      // auto-assigned to the event whose window [start-3d .. end+1d] contains the date
      const AC = QB_TYPES.auto_class || {};
      if (!t.sel_class && (AC.cards || []).some(c => (t.qb_paid_from || "").indexOf(c) !== -1)) {
        const hay = ((t.qb_vendor || "") + " " + (t.desc || "")).toLowerCase();
        if ((AC.patterns || []).some(pat => hay.indexOf(pat) !== -1)) {
          const ev = findEventForDate(t.date, AC.days_before || 3, AC.days_after || 1);
          if (ev) { t.sel_class = ev.class_name; t.auto_class = true; if (!t.etype || t.etype === "event_travel") t.etype = "event_accum"; }
        }
      }
      // venue payment? (hotel that IS the event hall — Lauren 2026-06-08)
      const vm = findVenueEvent(t);
      if (vm) {
        t.venue_match = vm.ev.class_name;
        if (!t.sel_class) t.sel_class = vm.ev.class_name;
        const VR = QB_TYPES.venue_rent || {};
        if (Math.abs(t.amt) >= (VR.min_amount || 1500) && !t.recognized) {
          t.sel_account = VR.account || "Rent Expense:Trade Show Rent";
          t.venue_rent = true; t.cat_suggested = false;
        }
      }
    });
    const sessionKey = "qb-" + sd + "-" + acct;
    const session = {
      session_key: sessionKey, account: acct, account_label: "🏦 " + acctLabel + " · QuickBooks",
      month_iso: sd.slice(0, 7), date_from: from, date_to: to, session_date: sd,
      month_label_he: "טיפול " + sd.split("-").reverse().join("/"),
      tx, total_tx: tx.length, generated_at: new Date().toISOString(),
      source: "quickbooks_api", qb_pulled_at: data._updated_at || null,
      events_tagged: [...new Set(tx.filter(t => t.cls === "event" || t.cls === "pending").map(t => t.evkey).filter(Boolean))],
    };
    ALL_SESSIONS[session.session_key] = session;
    const ok = await saveState("bookkeeping: QB session " + sessionKey + " (" + tx.length + " tx)");
    if (!ok) toast("⚠ סשן נוצר אבל לא נשמר ב-GitHub", "error");
    CURRENT_SESSION = session;
    $("form-card").classList.add("hidden");
    $("sessions-list").classList.add("hidden");
    $("tracker").classList.remove("hidden");
    renderTracker(); window.scrollTo(0, 0);
  } catch (e) {
    console.error(e); toast("⚠ " + (e.message || "שגיאה במשיכה מ-QuickBooks"), "error");
  } finally {
    btn.disabled = false; btn.textContent = "📥 משוך מ-QuickBooks (הוצאות ללא Class)";
  }
}

// ─────────── Init ───────────
(async function init() {
  renderTokenArea();
  setupForm();
  await Promise.all([loadState(), loadSchedule()]);
  renderSessionsList();
})();
</script>
