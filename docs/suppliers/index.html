<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>ספקים — מעקב חשבוניות ותשלומים</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0;padding:22px;line-height:1.45}
.wrap{max-width:1040px;margin:0 auto}
h1{font-size:24px;margin:0 0 4px}.sub{color:#666;margin-bottom:16px;font-size:14px}
.sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.sc{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc .v{font-size:20px;font-weight:800}.sc .l{color:#777;font-size:13px}
.sc.out .v{color:#dc2626}.sc.paid .v{color:#16a34a}
table{width:100%;border-collapse:collapse;font-size:14px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid #eee}
th{color:#666;font-weight:600;font-size:12px;background:#fafafa}
tr.sup{cursor:pointer}tr.sup:hover{background:#faf5ff}
tr.man{background:#f5f3ff}
.num{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.pill{font-size:11px;border-radius:20px;padding:2px 9px;font-weight:700}
.pill.ok{background:#dcfce7;color:#166534}.pill.no{background:#fee2e2;color:#991b1b}
.tag{font-size:10px;background:#ede9fe;color:#6d28d9;border-radius:5px;padding:1px 5px;margin-right:5px}
.back{cursor:pointer;color:#7c3aed;font-weight:600;margin-bottom:10px;display:inline-block;user-select:none}
input,select{font-size:13px;padding:4px 6px;border:1px solid #ccc;border-radius:6px}
input.invno{width:115px}input.pdate{width:140px}
.paidbox{transform:scale(1.25);cursor:pointer}
button{font-size:13px;padding:6px 12px;border-radius:7px;border:0;background:#7c3aed;color:#fff;cursor:pointer}
button.del{background:#fff;color:#dc2626;border:1px solid #f3c0c0;padding:3px 8px;font-size:12px}
.addrow td{background:#faf5ff}
.addrow input{width:100%}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;pointer-events:none}
#toast.show{opacity:1}
.bar{height:7px;background:#eee;border-radius:6px;overflow:hidden;margin-top:5px}.bar>div{height:100%;background:#16a34a}
.tokrow{font-size:12px;color:#888;text-align:center;margin-top:14px}

tr.openrow{background:#fff7ed}
tr.openrow td{border-bottom:1px solid #fde0c0;font-weight:600}
tr.openrow .num{color:#c2410c}
tr.openrow .pill.no{font-size:12px;padding:3px 11px}
tr.donerow{color:#9aa6b2}
tr.donerow .num{color:#475569;font-weight:600}
tr.donerow input,tr.donerow select{color:#64748b;border-color:#e5e7eb}
tr.donerow.man{background:#f8f7ff}
</style></head><body><div class="wrap" id="app">טוען…</div><div id="toast"></div>
<script>
const REPO="laurenlev10/lauren-agent-hub-data";
const PAY_FILE="docs/state/supplier_payments.json";
const MAN_FILE="docs/state/supplier_manual_invoices.json";
const METHODS=["Zelle","Check","Credit Card","Cash"];
let INV=null, PAY=null, MAN=null, VIEW=null, BANK=null, LINKS=null, VIEWMODE='invoices';
let EXPANDED=new Set();
const LINK_FILE="docs/state/supplier_manual_links.json";

function money(v){return "$"+(Number(v)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){const d=document.createElement("div");d.textContent=(s==null?"":s);return d.innerHTML;}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.className="show";setTimeout(()=>t.className="",2400);}
function rec(id){return (PAY.invoices&&PAY.invoices[id])||{};}
function bkFor(id){ if(BANK.matched&&BANK.matched[id])return BANK.matched[id]; const bid=LINKS&&LINKS.links&&LINKS.links[id]; if(bid){const c=(BANK.bank_charges||[]).find(x=>String(x.id)===String(bid)); if(c)return {paid:true,paid_date:c.date,payment_method:'',bank_txn_id:bid,bank_amount:c.amount,confidence:'manual'};} return null; }
function matchedBankIds(){ const s=new Set(); Object.values(BANK.matched||{}).forEach(m=>s.add(String(m.bank_txn_id))); Object.values((LINKS&&LINKS.links)||{}).forEach(b=>s.add(String(b))); return s; }
function unmatchedCharges(){ const mb=matchedBankIds(); const ig=new Set((LINKS.ignored||[]).map(String)); return (BANK.bank_charges||[]).filter(c=>!mb.has(String(c.id))&&!ig.has(String(c.id))); }
function effAmt(iv){if(iv.manual)return +iv.amount||0;const o=rec(iv.id).amount_override;return (typeof o==="number")?o:(+iv.amount||0);}
function slug(s){return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}

// Lauren 2026-06-18: read state straight from GitHub's raw source — it reflects every
// commit INSTANTLY, independent of GitHub Pages rebuilds (Pages can lag/fail when the
// dashboard saves often). Fall back to the Pages copy only if raw is unreachable.
const RAW_BASE="https://raw.githubusercontent.com/"+REPO+"/main/docs/state/";
async function freshJson(file){
 const bust="?_="+Date.now();
 try{const r=await fetch(RAW_BASE+file+bust,{cache:"no-store"});if(r.ok)return await r.json();}catch(e){}
 try{const r=await fetch("../state/"+file+bust,{cache:"no-store"});if(r.ok)return await r.json();}catch(e){}
 return null;
}

async function load(){
 INV=await freshJson("supplier_invoices.json");
 if(!INV){document.getElementById("app").innerHTML="<h1>שגיאה בטעינה</h1>";return;}
 PAY=await freshJson("supplier_payments.json");
 MAN=await freshJson("supplier_manual_invoices.json");
 if(!PAY)PAY={_updated_at:null,invoices:{}}; if(!PAY.invoices)PAY.invoices={};
 if(!MAN)MAN={_updated_at:null,invoices:[]}; if(!MAN.invoices)MAN.invoices=[];
 BANK=await freshJson("supplier_bank_payments.json");
 if(!BANK)BANK={matched:{},supplier_totals:{}}; if(!BANK.matched)BANK.matched={}; if(!BANK.bank_charges)BANK.bank_charges=[];
 LINKS=await freshJson("supplier_manual_links.json");
 if(!LINKS)LINKS={links:{},rejected:[],ignored:[]}; LINKS.links=LINKS.links||{}; LINKS.rejected=LINKS.rejected||[]; LINKS.ignored=LINKS.ignored||[];
 route();
}
function supNames(){
 const s=new Set(Object.keys(INV.suppliers||{}));
 MAN.invoices.forEach(i=>s.add(i.supplier));
 return [...s];
}
function supInvoices(name){
 const auto=((INV.suppliers||{})[name]||{invoices:[]}).invoices.map(x=>({...x,manual:false}));
 const man=MAN.invoices.filter(i=>i.supplier===name).map(x=>({...x,manual:true}));
 return auto.concat(man).filter(i=>!isDeleted(i.id)).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
}
function isPaid(id){const r=rec(id);if(r&&typeof r.paid==='boolean')return r.paid;return !!bkFor(id);}
function reconBadge(r,bk){const mp=(r&&typeof r.paid==='boolean')?r.paid:null;
  if(mp===true&&bk)return "<br><span class='tag' style='background:#dcfce7;color:#166534' title='סומן ידנית + אומת בבנק'>✅ מאושר</span>";
  if(mp===true&&!bk)return "<br><span class='tag' style='background:#fef9c3;color:#854d0e' title='סומן ידנית — עדיין לא נמצא תשלום תואם בבנק'>✋ ידני</span>";
  if(mp!==true&&bk)return "<br><span class='tag' style='background:#dbeafe;color:#1e40af' title='הבנק מראה תשלום — סמני ידנית לאישור'>🏦 לא סומן</span>";
  return "";}
function isDeleted(id){return !!rec(id).deleted;}

function renderList(){
 VIEW=null;
 let names=supNames();
 let allTotal=0,allPaid=0,allCount=0;
 const rows=names.map(name=>{
   const invs=supInvoices(name);
   const tot=invs.reduce((x,i)=>x+effAmt(i),0);
   const pd=invs.filter(i=>isPaid(i.id)).reduce((x,i)=>x+effAmt(i),0);
   allTotal+=tot;allPaid+=pd;allCount+=invs.length;
   return {name,n:invs.length,tot,pd,out:tot-pd};
 }).sort((a,b)=>b.tot-a.tot);
 let h="<div style='display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap'><h1>📦 ספקים — מעקב חשבוניות ותשלומים</h1><a href='https://bookkeeping.themakeupblowout.com/' style='background:#0369a1;color:#fff;text-decoration:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;white-space:nowrap;margin-inline-end:6px'>📒 לבוקקיפינג</a><a href='https://dashboard.themakeupblowout.com/launch/' style='background:#7c3aed;color:#fff;text-decoration:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;white-space:nowrap'>🚀 לדשבורד האירועים</a></div><div class='sub'>כל החשבוניות מתחילת 2026 · לחצי על ספק לפירוט והוספה</div>";
 h+=navBar();
 h+="<div class='sum'>"+
  "<div class='sc'><div class='v'>"+names.length+"</div><div class='l'>ספקים</div></div>"+
  "<div class='sc'><div class='v'>"+allCount+"</div><div class='l'>חשבוניות</div></div>"+
  "<div class='sc'><div class='v'>"+money(allTotal)+"</div><div class='l'>סה״כ</div></div>"+
  "<div class='sc paid'><div class='v'>"+money(allPaid)+"</div><div class='l'>שולם</div></div>"+
  "<div class='sc out'><div class='v'>"+money(allTotal-allPaid)+"</div><div class='l'>נותר לתשלום</div></div></div>";
 h+="<table><tr><th>ספק</th><th>חשבוניות</th><th>סה״כ</th><th>שולם</th><th>נותר</th><th>סטטוס</th></tr>";
 rows.forEach(r=>{const pct=r.tot?Math.round(r.pd/r.tot*100):0;
   const bf=((BANK.supplier_totals||{})[r.name]||{}).bank_found||0;
   const bankFlag=(r.tot>0&&bf<r.tot*0.3)?" <span class='tag' style='background:#fee2e2;color:#b91c1c' title='לא נמצא תשלום תואם בבנק'>⚠ לא בבנק</span>":(bf>0?" <span class='tag' style='background:#dbeafe;color:#1e40af' title='נמצא בבנק'>🏦 "+money(bf)+"</span>":"");
   h+="<tr class='sup' onclick=\"openSup('"+esc(r.name).replace(/'/g,"\\'")+"')\">"+
   "<td><b>"+esc(r.name)+"</b>"+bankFlag+"</td><td>"+r.n+"</td><td class='num'>"+money(r.tot)+"</td><td class='num'>"+money(r.pd)+"</td>"+
   "<td class='num' style='color:"+(r.out>0?'#dc2626':'#16a34a')+"'>"+money(r.out)+"</td>"+
   "<td style='min-width:90px'><span class='pill "+(r.out<=0?'ok':'no')+"'>"+(r.out<=0?'שולם':pct+'%')+"</span><div class='bar'><div style='width:"+pct+"%'></div></div></td></tr>";
 });
 h+="</table><div class='tokrow'>שמירה דורשת GitHub token (אותו אחד של שאר הדשבורדים). <a href='#' onclick='setTok();return false'>הגדרה</a></div>";
 document.getElementById("app").innerHTML=h;
}

window.toggleRow=id=>{ if(EXPANDED.has(id))EXPANDED.delete(id); else EXPANDED.add(id); openSup(VIEW); };
function compactRow(iv){
 const r=rec(iv.id), bk=bkFor(iv.id);
 const pm=(r.payment_method||(bk&&bk.payment_method)||""), pdv=(r.paid_date||(bk&&bk.paid_date)||"");
 return "<tr class='"+(iv.manual?"man ":"")+"donerow' style='cursor:pointer' onclick=\"toggleRow('"+iv.id+"')\" title='לחצי לעריכה'>"+
   "<td><span class='pill ok'>✓</span></td>"+
   "<td>"+esc(iv.date||"—")+"</td>"+
   "<td>"+(iv.manual?"<span class='tag'>ידני</span>":"")+esc(iv.event||"—")+"</td>"+
   "<td class='num'>"+money(effAmt(iv))+"</td>"+
   "<td style='font-size:12px;color:#94a3b8'>"+esc(r.invoice_number||iv.invoice_number||"")+"</td>"+
   "<td style='text-align:center'>"+(bk?"<span class='tag' style='background:#dbeafe;color:#1e40af'>🏦 "+money(bk.bank_amount)+"</span>":"<span class='tag' style='background:#fef9c3;color:#854d0e' title='סומן שולם ידנית — הבנק עוד לא אישר'>✋ ממתין לבנק</span>")+"</td>"+
   "<td style='font-size:12px'>"+esc(pdv)+"</td>"+
   "<td style='font-size:12px'>"+esc(pm)+"</td>"+
   "<td style='color:#cbd5e1;text-align:center'>✏️</td></tr>";
}
function openSup(name){
 VIEW=name;
 let invs=supInvoices(name);
 const paidOf=iv=>isPaid(iv.id);
 invs=invs.slice().sort((x,y)=>{const px=paidOf(x),py=paidOf(y); if(px!==py)return px?1:-1; return (y.date||"").localeCompare(x.date||"");});
 const open=invs.filter(iv=>!paidOf(iv)), paid=invs.filter(paidOf);
 const tot=invs.reduce((x,i)=>x+effAmt(i),0), openTot=open.reduce((x,i)=>x+effAmt(i),0);
 let h="<span class='back' onclick='renderList()'>← חזרה לכל הספקים</span>"+navBar();
 h+="<h1>"+esc(name)+"</h1>";
 h+="<div class='sum'>"+
   "<div class='sc out'><div class='v'>"+open.length+"</div><div class='l'>🔴 פתוחות</div></div>"+
   "<div class='sc out'><div class='v'>"+money(openTot)+"</div><div class='l'>נותר לתשלום</div></div>"+
   "<div class='sc paid'><div class='v'>"+paid.length+"</div><div class='l'>✓ שולמו</div></div>"+
   "<div class='sc'><div class='v'>"+money(tot)+"</div><div class='l'>סה״כ</div></div></div>";
 h+="<table><tr><th>סטטוס</th><th>תאריך</th><th>אירוע</th><th>סכום</th><th>מס׳ חשבונית</th><th>תשלום</th><th>תאריך תשלום</th><th>אופן</th><th></th></tr>";
 const rowHtml=(iv)=>{
   const r=rec(iv.id); const bk=bkFor(iv.id);
   const paidChk=(typeof r.paid==='boolean')?r.paid:!!bk; const isOpen=!paidChk;
   const pdv=r.paid_date||(bk&&bk.paid_date)||"";
   const pmv=r.payment_method||(bk&&bk.payment_method)||"";
   const opts=METHODS.map(m=>"<option "+(pmv===m?"selected":"")+">"+m+"</option>").join("")+(["Card","ACH","Bank"].includes(pmv)?"<option selected>"+pmv+"</option>":"");
   const st=isOpen?"<span class='pill no'>🔴 פתוחה</span>":"<span class='pill ok'>✓ שולם</span>";
   let pay="<input type='checkbox' class='paidbox' id='pd-"+iv.id+"' "+(paidChk?"checked":"")+" onchange=\"save('"+iv.id+"')\">";
   if(isOpen){ pay+="<br><button style='background:#0369a1;margin-top:4px;padding:4px 9px;font-size:12px' onclick=\"openLinkPicker('"+iv.id+"')\">🔗 קשר חיוב</button>"; }
   else { if(bk)pay+=" <a href='https://bookkeeping.themakeupblowout.com/?txn="+bk.bank_txn_id+"' target='_blank' class='tag' style='background:#dbeafe;color:#1e40af;text-decoration:none' title='שולם מהבנק'>🏦 "+money(bk.bank_amount)+"</a> <span onclick=\"rejectMatch('"+iv.id+"','"+bk.bank_txn_id+"')\" title='ביטול שיוך שגוי' style='cursor:pointer;color:#b91c1c;font-size:12px'>✗</span>"; pay+=reconBadge(r,bk); }
   return "<tr class='"+(iv.manual?"man ":"")+(isOpen?"openrow":"donerow")+"'>"+
     "<td>"+st+"</td>"+
     "<td>"+(iv.manual?"<input type='date' style='width:128px' id='md-"+iv.id+"' value='"+esc(iv.date||"")+"' onchange=\"editMan('"+iv.id+"')\">":esc(iv.date||"—"))+"</td>"+
     "<td>"+(iv.manual?"<span class='tag'>ידני</span><input style='width:118px' id='me-"+iv.id+"' value='"+esc(iv.event||"")+"' onchange=\"editMan('"+iv.id+"')\">":esc(iv.event||"—"))+"</td>"+
     "<td class='num'>"+(iv.manual?"<input style='width:85px' id='ma-"+iv.id+"' value='"+esc(iv.amount||"")+"' onchange=\"editMan('"+iv.id+"')\">":"<input style='width:90px' id='amt-"+iv.id+"' value='"+effAmt(iv)+"' onchange=\"saveAmount('"+iv.id+"',"+(+iv.amount||0)+")\">"+(rec(iv.id).amount_override!=null?" <span class='tag'>✏️</span>":"")+(iv.shipping?" <span style='color:#999;font-size:11px'>(+"+money(iv.shipping)+")</span>":""))+"</td>"+
     "<td><input class='invno' id='no-"+iv.id+"' value='"+esc(r.invoice_number||iv.invoice_number||"")+"' placeholder='מס׳' onchange=\"save('"+iv.id+"')\"></td>"+
     "<td style='text-align:center'>"+pay+"</td>"+
     "<td><input class='pdate' type='date' id='dt-"+iv.id+"' value='"+esc(pdv)+"' onchange=\"save('"+iv.id+"')\"></td>"+
     "<td><select id='pm-"+iv.id+"' onchange=\"save('"+iv.id+"')\"><option value=''>—</option>"+opts+"</select></td>"+
     "<td><button class='del' onclick=\"delInv('"+iv.id+"',"+(iv.manual?"true":"false")+")\">מחק</button></td></tr>";
 };
 open.forEach(iv=>h+=rowHtml(iv));
 if(paid.length)h+="<tr class='sep'><td colspan='9' style='background:#f1f5f9;color:#64748b;font-size:12px;font-weight:700;padding:6px 10px'>— שולמו ("+paid.length+") —</td></tr>";
 paid.forEach(iv=>h+=(EXPANDED.has(iv.id)?rowHtml(iv):compactRow(iv)));
 const sn=esc(name).replace(/'/g,"\\'");
 h+="<tr class='addrow'><td>➕</td><td><input type='date' id='add-date'></td>"+
    "<td><input id='add-event' placeholder='אירוע / תיאור'></td>"+
    "<td><input id='add-amount' placeholder='סכום'></td>"+
    "<td colspan='3'><input id='add-invno' placeholder='מס׳ חשבונית (לא חובה)'></td>"+
    "<td colspan='2'><button onclick=\"addMan('"+sn+"')\">+ הוסף חשבונית</button></td></tr>";
 h+="</table>";
 document.getElementById("app").innerHTML=h;
}

async function putFile(file,data,msg){
 const tok=(localStorage.getItem("lauren_gh_token_v1")||"").trim();
 if(!tok){toast("צריך GitHub token");setTok();return false;}
 const g=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+file+"?ref=main&_="+Date.now(),
   {headers:{"Authorization":"token "+tok,"Accept":"application/vnd.github+json"},cache:"no-store"});
 let sha=null,cur=null;
 if(g.ok){const j=await g.json();sha=j.sha;try{cur=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,"")))));}catch(e){}}
 const merged=data(cur);
 merged._updated_at=new Date().toISOString();
 const body={message:msg,content:btoa(unescape(encodeURIComponent(JSON.stringify(merged,null,2)))),branch:"main"};
 if(sha)body.sha=sha;
 const put=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+file,
   {method:"PUT",headers:{"Authorization":"token "+tok,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
 if(!put.ok){toast("שמירה נכשלה ("+put.status+")");return false;}
 return merged;
}

async function save(id){
 toast("שומר…");
 const r={invoice_number:(document.getElementById("no-"+id)||{}).value||"",
   paid:(document.getElementById("pd-"+id)||{}).checked||false,
   paid_date:(document.getElementById("dt-"+id)||{}).value||"",
   payment_method:(document.getElementById("pm-"+id)||{}).value||""};
 const m=await putFile(PAY_FILE,cur=>{cur=cur||{invoices:{}};if(!cur.invoices)cur.invoices={};cur.invoices[id]=Object.assign({},cur.invoices[id]||{},r);return cur;},"supplier-payment: "+id);
 if(m){PAY=m;toast("✓ נשמר");}
}
async function saveAmount(id,base){
 const raw=(document.getElementById("amt-"+id)||{}).value;const val=parseFloat(raw);
 toast("שומר…");
 const m=await putFile(PAY_FILE,cur=>{cur=cur||{invoices:{}};if(!cur.invoices)cur.invoices={};
   const r=Object.assign({},cur.invoices[id]||{});
   if(isNaN(val)||Math.abs(val-base)<0.005){delete r.amount_override;}else{r.amount_override=Math.round(val*100)/100;}
   cur.invoices[id]=r;return cur;},"supplier-amount override: "+id);
 if(m){PAY=m;toast("✓ נשמר");openSup(VIEW);}
}
async function addMan(name){
 const date=(document.getElementById("add-date")||{}).value||"";
 const event=(document.getElementById("add-event")||{}).value||"";
 const amount=parseFloat((document.getElementById("add-amount")||{}).value||"0")||0;
 const invno=(document.getElementById("add-invno")||{}).value||"";
 if(!amount&&!event){toast("צריך לפחות סכום או תיאור");return;}
 const id="man-"+slug(name)+"-"+Date.now();
 toast("מוסיף…");
 const m=await putFile(MAN_FILE,cur=>{cur=cur||{invoices:[]};if(!cur.invoices)cur.invoices=[];
   cur.invoices.push({id,supplier:name,date,event,amount});return cur;},"supplier-manual-invoice add: "+id);
 if(!m)return; MAN=m;
 if(invno){await save(id);} // store invoice number via payments file (also writes id)
 // ensure payment record has the invoice number even if save() not triggered
 if(invno){const p=await putFile(PAY_FILE,cur=>{cur=cur||{invoices:{}};if(!cur.invoices)cur.invoices={};
   cur.invoices[id]=Object.assign({},cur.invoices[id]||{},{invoice_number:invno});return cur;},"supplier-payment invno: "+id);if(p)PAY=p;}
 toast("✓ נוספה"); openSup(name);
}
async function editMan(id){
 const date=(document.getElementById("md-"+id)||{}).value;
 const event=(document.getElementById("me-"+id)||{}).value;
 const amount=parseFloat((document.getElementById("ma-"+id)||{}).value||"0")||0;
 const m=await putFile(MAN_FILE,cur=>{cur=cur||{invoices:[]};
   cur.invoices=(cur.invoices||[]).map(i=>i.id===id?Object.assign({},i,{date,event,amount}):i);return cur;},"supplier-manual-invoice edit: "+id);
 if(m){MAN=m;toast("✓ עודכן");}
}
async function delInv(id,isMan){
 if(!confirm(isMan?"למחוק את החשבונית הידנית?":"למחוק את החשבונית הזו מהרשימה? (חשבונית מיובאת — תוסתר לצמיתות)"))return;
 toast("מוחק…");
 if(isMan){
  const m=await putFile(MAN_FILE,cur=>{cur=cur||{invoices:[]};cur.invoices=(cur.invoices||[]).filter(i=>i.id!==id);return cur;},"supplier-manual-invoice del: "+id);
  if(!m)return; MAN=m;
 }else{
  const m=await putFile(PAY_FILE,cur=>{cur=cur||{invoices:{}};if(!cur.invoices)cur.invoices={};cur.invoices[id]=Object.assign({},cur.invoices[id]||{},{deleted:true});return cur;},"supplier-invoice hide: "+id);
  if(!m)return; PAY=m;
 }
 toast("✓ נמחק");openSup(VIEW);
}
function setTok(){const t=prompt("הדביקי GitHub token (Contents: write):");if(t){localStorage.setItem("lauren_gh_token_v1",t.trim());toast("נשמר במכשיר");}}

function navBar(){
 const un=unmatchedCharges().length; const dz=dupeManual().length; const sl=suspiciousLinks().length;
 const b=(m,lbl,extra)=>"<button onclick=\"setView('"+m+"')\" style=\"margin-inline-end:6px;background:"+(VIEWMODE===m?'#4c1d95':'#7c3aed')+";"+(extra||'')+"\">"+lbl+"</button>";
 return "<div style='margin:10px 0'>"+b('invoices','📄 חשבוניות')+
   b('unmatched','🏦 חיובי בנק ללא שיוך'+(un?' ('+un+')':''), un?'background:#0369a1':'')+
   b('dupes','⚠ כפילויות'+(dz?' ('+dz+')':''), dz?'background:#b45309':'')+
   b('suspicious','🚩 קישורים חשודים'+(sl?' ('+sl+')':''), sl?'background:#b91c1c':'')+"</div>";
}
function setView(m){VIEWMODE=m;route();}
function route(){ if(VIEWMODE==='unmatched')return renderUnmatched(); if(VIEWMODE==='dupes')return renderDupes(); if(VIEWMODE==='suspicious')return renderSuspicious(); VIEWMODE='invoices'; renderList(); }

function invSupplierOf(invId){ for(const name in (INV.suppliers||{})){ if(((INV.suppliers[name].invoices)||[]).some(iv=>iv.id===invId))return name; } const m=(MAN.invoices||[]).find(i=>i.id===invId); return m?m.supplier:null; }
function chargeById(bid){ return (BANK.bank_charges||[]).find(c=>String(c.id)===String(bid))||null; }
function invObjOf(invId){ for(const name in (INV.suppliers||{})){ const iv=((INV.suppliers[name].invoices)||[]).find(x=>x.id===invId); if(iv)return iv; } return (MAN.invoices||[]).find(i=>i.id===invId)||null; }
function suspiciousLinks(){ const out=[]; const matched=BANK.matched||{};
  const usage={}; for(const iid in matched){ const b=String(matched[iid].bank_txn_id); usage[b]=(usage[b]||0)+1; }
  for(const invId in matched){ const m=matched[invId]; const c=chargeById(m.bank_txn_id); if(!c)continue;
    if(m.confidence==='manual')continue; // deliberate manual links are intentional, not suspicious
    const invSup=invSupplierOf(invId); const cg=c.supplier_guess;
    if(cg&&invSup&&cg!==invSup){ out.push({invId,invSup,charge:c,m,reason:'ספק שונה'}); continue; }
    if(usage[String(m.bank_txn_id)]===1){ const iv=invObjOf(invId); if(iv){ const tot=(iv.amount||0)+(iv.shipping||0), base=(iv.amount||0);
      if(Math.min(Math.abs(tot-m.bank_amount),Math.abs(base-m.bank_amount))>Math.max(15,tot*0.05)) out.push({invId,invSup,charge:c,m,reason:'סכום שונה'}); } } }
  return out;
}
function renderSuspicious(){
 VIEW=null;
 const list=suspiciousLinks();
 let h="<span class='back' onclick=\"setView('invoices')\">← חזרה</span>"+navBar();
 h+="<h1>⚠ קישורים חשודים</h1><div class='sub'>חיובים שהספק שלהם (לפי התיאור) שונה מספק החשבונית שאליה הם מקושרים. בדקי כל אחד — אם שגוי, נתקי.</div>";
 if(!list.length){h+="<div class='sub'>✅ אין קישורים חשודים.</div>";document.getElementById('app').innerHTML=h;return;}
 h+="<table><tr><th>חשבונית (ספק)</th><th>אירוע</th><th>סכום חשבונית</th><th>חיוב מקושר</th><th>בעיה</th><th>נראה כמו</th><th></th></tr>";
 list.forEach(x=>{ const iv=(((INV.suppliers[x.invSup]||{}).invoices)||[]).find(i=>i.id===x.invId)||(MAN.invoices||[]).find(i=>i.id===x.invId)||{};
   h+="<tr style='background:#fff7ed'><td><b>"+esc(x.invSup)+"</b></td><td>"+esc(iv.event||'')+"</td><td class='num'>"+money(effAmt(Object.assign({manual:!!iv.supplier},iv)))+"</td>"+
   "<td style='font-size:12px'>"+esc(x.charge.date)+" "+money(x.charge.amount)+"<br>"+esc(x.charge.desc)+"</td>"+
   "<td><span class='tag' style='background:#fde68a;color:#854d0e'>"+esc(x.reason||'')+"</span></td>"+
   "<td>"+(x.charge.supplier_guess?"<span class='tag' style='background:#fee2e2;color:#b91c1c'>"+esc(x.charge.supplier_guess)+"</span>":"")+"</td>"+
   "<td><button class='del' onclick=\"rejectMatch('"+x.invId+"','"+x.charge.id+"')\">✗ נתק</button></td></tr>"; });
 h+="</table>";
 document.getElementById('app').innerHTML=h;
}
function dupeManual(){
 // STRICT: same supplier + amount within $1/0.5% + dates within 12 days (avoids
 // coincidental same-amount collisions across different events).
 const out=[];
 (MAN.invoices||[]).forEach(m=>{
   if(isDeleted(m.id))return;
   const autos=(((INV.suppliers||{})[m.supplier]||{}).invoices||[]);
   const ma=+m.amount||0, md=m.date||'';
   const hit=autos.find(a=>{const aa=(a.amount||0)+(a.shipping||0);
     if(Math.abs(ma-aa)>Math.max(1,aa*0.005))return false;
     const ad=a.date||''; if(!md||!ad)return false;
     return Math.abs((new Date(md)-new Date(ad))/86400000)<=12;});
   if(hit)out.push({man:m,auto:hit});
 });
 return out;
}
function renderDupes(){
 VIEW=null;
 const list=dupeManual();
 let h="<span class='back' onclick=\"setView('invoices')\">← חזרה</span>"+navBar();
 h+="<h1>⚠ חשבוניות ידניות שכפולות אוטומטיות</h1>";
 if(!list.length){h+="<div class='sub'>✅ אין כפילויות.</div>";document.getElementById('app').innerHTML=h;return;}
 h+="<div class='sub'>לכל שורה: החשבונית הידנית (זהה סכום) כבר קיימת אוטומטית. מומלץ למחוק את הידנית.</div>";
 h+="<table><tr><th>ספק</th><th>סכום</th><th>ידני (תיאור)</th><th>אוטומטי (אירוע)</th><th></th></tr>";
 list.forEach(d=>{ h+="<tr class='man'><td><b>"+esc(d.man.supplier)+"</b></td><td class='num'>"+money(d.man.amount)+"</td>"+
   "<td><span class='tag'>ידני</span>"+esc(d.man.event||'—')+"</td><td>"+esc(d.auto.event||'—')+" <span style='color:#999;font-size:11px'>"+esc(d.auto.date||'')+"</span></td>"+
   "<td><button class='del' onclick=\"delInv('"+d.man.id+"',true)\">מחק ידני</button></td></tr>"; });
 h+="</table>";
 document.getElementById('app').innerHTML=h;
}

function invName(id){ for(const sup in (INV.suppliers||{})){const iv=((INV.suppliers[sup].invoices)||[]).find(x=>x.id===id);if(iv)return sup+" · "+(iv.event||iv.date||'');} const m=(MAN.invoices||[]).find(x=>x.id===id); if(m)return m.supplier+" · "+(m.event||m.date||'')+" (ידני)"; return id; }
function renderUnmatched(){
 VIEW=null;
 const list=unmatchedCharges().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
 let h="<span class='back' onclick=\"setView('invoices')\">← חזרה</span>"+navBar();
 h+="<h1>🏦 חיובי בנק ללא חשבונית</h1>";
 h+="<div class='sub'>חיובי Merchandise Purchase שלא שויכו לשום חשבונית. קשרי לחשבונית קיימת, צרי חשבונית, או התעלמי (לא-ספק כמו חנות).</div>";
 if(!list.length){h+="<div class='sub'>✅ הכל משויך.</div>";document.getElementById('app').innerHTML=h;return;}
 h+="<table><tr><th>תאריך</th><th>סכום</th><th>תיאור</th><th>ספק משוער</th><th>פעולות</th></tr>";
 list.forEach(c=>{ const sg=c.supplier_guess?("<span class='tag'>"+esc(c.supplier_guess)+"</span>"):"<span style='color:#9ca3af'>—</span>";
   h+="<tr><td>"+esc(c.date)+"</td><td class='num'>"+money(c.amount)+"</td><td style='font-size:12px;color:#555'>"+esc(c.desc)+"</td><td>"+sg+"</td>"+
   "<td style='white-space:nowrap'><button style='background:#0369a1;padding:4px 8px;font-size:12px' onclick=\"pickInvoiceForCharge('"+c.id+"')\">🔗 קשר</button> "+
   "<button style='background:#16a34a;padding:4px 8px;font-size:12px' onclick=\"createInvoiceFromCharge('"+c.id+"')\">➕ צור חשבונית</button> "+
   "<button class='del' onclick=\"ignoreCharge('"+c.id+"')\">התעלם</button></td></tr>"; });
 h+="</table>";
 document.getElementById('app').innerHTML=h;
}

// ---- modal ----
function modal(html){ let m=document.getElementById('mdl'); if(!m){m=document.createElement('div');m.id='mdl';m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99';document.body.appendChild(m);} m.innerHTML="<div style='background:#fff;border-radius:12px;padding:18px;max-width:620px;width:92%;max-height:80vh;overflow:auto'>"+html+"<div style='text-align:center;margin-top:10px'><button onclick=\"closeModal()\" style='background:#6b7280'>סגור</button></div></div>"; m.style.display='flex'; }
function closeModal(){const m=document.getElementById('mdl');if(m)m.style.display='none';}

function openLinkPicker(invId){ // from an invoice -> pick a bank charge
 const sup=VIEW; const all=unmatchedCharges();
 const pref=all.filter(c=>c.supplier_guess===sup), rest=all.filter(c=>c.supplier_guess!==sup);
 const ordered=pref.concat(rest);
 let h="<h3>🔗 בחרי חיוב מהבנק לקישור</h3><div class='sub'>"+esc(invName(invId))+"</div>";
 if(!ordered.length)h+="<div class='sub'>אין חיובים ללא שיוך.</div>";
 h+="<table>"+ordered.map(c=>"<tr><td>"+esc(c.date)+"</td><td class='num'>"+money(c.amount)+"</td><td style='font-size:12px'>"+esc(c.desc)+"</td><td>"+(c.supplier_guess?"<span class='tag'>"+esc(c.supplier_guess)+"</span>":"")+"</td><td><button onclick=\"linkInvoiceToCharge('"+invId+"','"+c.id+"')\">בחר</button></td></tr>").join('')+"</table>";
 modal(h);
}
function allOpenInvoices(){ const out=[]; supNames().forEach(name=>{ supInvoices(name).forEach(iv=>{ if(!bkFor(iv.id)) out.push(Object.assign({_sup:name},iv)); }); }); return out; }
function pickInvoiceForCharge(bankId){ // from a bank charge -> pick an invoice
 const c=(BANK.bank_charges||[]).find(x=>String(x.id)===String(bankId)); if(!c)return;
 const sup=c.supplier_guess;
 let invs, scoped;
 if(sup){ invs=supInvoices(sup).filter(iv=>!bkFor(iv.id)).map(iv=>Object.assign({_sup:sup},iv)); scoped=true; }
 else { invs=allOpenInvoices(); scoped=false; }
 // sort by closeness of amount to the charge
 invs.sort((a,b)=>Math.abs(effAmt(a)-c.amount)-Math.abs(effAmt(b)-c.amount));
 if(!scoped) invs=invs.slice(0,40);
 let h="<h3>🔗 קשרי את החיוב לחשבונית</h3><div class='sub'>"+money(c.amount)+" · "+esc(c.date)+" · "+esc(c.desc)+"</div>";
 if(scoped) h+="<div class='sub'>ספק: "+esc(sup)+(invs.length?"":" — אין חשבוניות פתוחות, צרי חדשה")+"</div>";
 else h+="<div class='sub' style='color:#b45309'>צ'ק בלי שם ספק — מוצגות כל החשבוניות הפתוחות, הקרובות בסכום למעלה. אם זה תשלום על חשבונית 2025 (לא במערכת) — לחצי 'התעלם'.</div>";
 h+="<table><tr><th>קרבה</th><th>תאריך</th><th>סכום</th><th>ספק / אירוע</th><th></th></tr>"+invs.map(iv=>{const diff=Math.round((effAmt(iv)-c.amount)*100)/100;const close=Math.abs(diff)<=1?"🎯":(Math.abs(diff)<=Math.max(5,c.amount*0.03)?"≈":"");return "<tr><td>"+close+(diff?" <span style='font-size:11px;color:#94a3b8'>"+(diff>0?'+':'')+diff+"</span>":"")+"</td><td>"+esc(iv.date||'')+"</td><td class='num'>"+money(effAmt(iv))+"</td><td>"+(scoped?"":"<b>"+esc(iv._sup)+"</b> · ")+(iv.manual?"<span class='tag'>ידני</span>":"")+esc(iv.event||'')+"</td><td><button onclick=\"linkInvoiceToCharge('"+iv.id+"','"+bankId+"')\">קשר</button></td></tr>";}).join('')+"</table>";
 modal(h);
}

async function saveLinks(msg){
 const m=await putFile(LINK_FILE,cur=>{cur=cur||{links:{},rejected:[],ignored:[]};cur.links=cur.links||{};cur.rejected=cur.rejected||[];cur.ignored=cur.ignored||[];
   cur.links=Object.assign(cur.links,LINKS.links);
   const rj=new Set([...(cur.rejected||[]),...(LINKS.rejected||[])]); cur.rejected=[...rj];
   const ig=new Set([...(cur.ignored||[]),...(LINKS.ignored||[])]); cur.ignored=[...ig];
   return cur;},msg);
 if(m){LINKS=m;LINKS.links=LINKS.links||{};LINKS.rejected=LINKS.rejected||[];LINKS.ignored=LINKS.ignored||[];}
 return m;
}
async function linkInvoiceToCharge(invId,bankId){
 const c=chargeById(bankId); const invSup=invSupplierOf(invId);
 if(c&&c.supplier_guess&&invSup&&c.supplier_guess!==invSup){ if(!confirm('\u26a0 \u05e9\u05d9\u05dd \u05dc\u05d1: \u05d4\u05d7\u05d9\u05d5\u05d1 \u05e0\u05e8\u05d0\u05d4 \u05db\u05de\u05d5 \u05e1\u05e4\u05e7 "'+c.supplier_guess+'" \u05d0\u05d1\u05dc \u05d4\u05d7\u05e9\u05d1\u05d5\u05e0\u05d9\u05ea \u05d4\u05d9\u05d0 \u05e9\u05dc "'+invSup+'". \u05dc\u05e7\u05e9\u05e8 \u05d1\u05db\u05dc \u05d6\u05d0\u05ea?'))return; }
 toast("מקשר…"); LINKS.links[invId]=bankId;
 // clear any rejection of this pair
 LINKS.rejected=(LINKS.rejected||[]).filter(x=>x!==(invId+"|"+bankId));
 const m=await saveLinks("supplier-link: "+invId+" ↔ "+bankId);
 if(m){toast("✓ קושר");closeModal();route();}
}
async function rejectMatch(invId,bankId){
 if(!confirm("לבטל את השיוך בין החשבונית לחיוב?"))return;
 toast("מבטל…");
 if(LINKS.links && LINKS.links[invId]===bankId){ delete LINKS.links[invId]; }
 else { LINKS.rejected=[...new Set([...(LINKS.rejected||[]),invId+"|"+bankId])]; if(BANK.matched)delete BANK.matched[invId]; }
 const m=await saveLinks("supplier-unlink: "+invId+" ✗ "+bankId);
 if(m){toast("✓ בוטל");route();}
}
async function ignoreCharge(bankId){
 toast("מסתיר…"); LINKS.ignored=[...new Set([...(LINKS.ignored||[]),String(bankId)])];
 const m=await saveLinks("supplier-ignore-charge: "+bankId);
 if(m){toast("✓ הוסתר");route();}
}
async function createInvoiceFromCharge(bankId){
 const c=(BANK.bank_charges||[]).find(x=>String(x.id)===String(bankId)); if(!c)return;
 let sup=c.supplier_guess; if(!sup){ sup=prompt("שם הספק לחשבונית:"); if(!sup)return; }
 toast("יוצר…");
 const id="man-"+slug(sup)+"-"+Date.now();
 const m=await putFile(MAN_FILE,cur=>{cur=cur||{invoices:[]};if(!cur.invoices)cur.invoices=[];cur.invoices.push({id,supplier:sup,date:c.date,event:"(מהבנק)",amount:c.amount});return cur;},"supplier-manual-invoice from charge: "+id);
 if(!m)return; MAN=m;
 LINKS.links[id]=bankId; await saveLinks("supplier-link new invoice "+id);
 toast("✓ נוצרה וקושרה"); route();
}
