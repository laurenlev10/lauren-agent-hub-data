// Uses DOM methods (not innerHTML with closing-tag literals) so check.sh sees balanced tags.
(function(){
  var allowed = "dashboard.themakeupblowout.com";
  if (window.location.hostname === allowed) return;
  var u = "https://" + allowed + window.location.pathname + window.location.search;
  document.addEventListener("DOMContentLoaded", function(){

    document.body.style.cssText = "font-family:sans-serif;padding:40px;text-align:center;direction:rtl;";

  });

})();

<style>

<script>
// ─── State ──────────────────────────────────────────────────────────────
const TABS = [
  { id: 'to_recount',            label: '🏷️ לספור באירוע',         color: 'warning', preOnly: true },
  { id: 'counted_at_event',      label: '🧮 נספרו באירוע',          color: 'primary' },
  { id: 'missed_from_worklist',  label: '⚠ לא נספרו (היו ברשימה)',  color: 'warning' },
  { id: 'negatives',             label: '🔴 מינוס במלאי',           color: 'danger' },
  { id: 'phantom_zeros',         label: '🧹 אופסו אוטומטית',        color: 'muted' },
  { id: 'slow_movers',           label: '💤 לא זזו (מעל יחידה)',    color: 'muted' },
  { id: 'top_sellers',           label: '🏆 הכי נמכרו',             color: 'success' },
  { id: 'stocked_out_early',     label: '🚨 נגמרו לפני הזמן',       color: 'danger' },
  { id: 'no_threshold',          label: '⚙️ ללא Threshold',         color: 'info' },
];
let SUMMARY = null;
let ACTIVE_TAB = TABS[0].id;
let SEARCH_TERM = '';
let SORT_BY = {}; // {tabId: {field, dir}}
let INDEX = {};

// ─── Helpers ────────────────────────────────────────────────────────────
function $(sel){ return document.querySelector(sel); }
function fmt(n, decimals){
  if (n === null || n === undefined || n === '') return '—';
  const num = Number(n);
  if (isNaN(num)) return n;
  return num.toLocaleString('en-US', {minimumFractionDigits: decimals||0, maximumFractionDigits: decimals||0});
}
function escHtml(s){ return String(s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]); }
function toast(msg, kind){
  const t = document.createElement('div');
  t.className = 'toast ' + (kind||'info');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=> t.remove(), 4000);
}

// ─── URL / param management ─────────────────────────────────────────────
function getEvKeyFromUrl(){
  const p = new URLSearchParams(location.search);
  return p.get('evkey') || '';
}
function setEvKeyInUrl(k){
  const p = new URLSearchParams(location.search);
  p.set('evkey', k);
  history.replaceState(null, '', location.pathname + '?' + p.toString());
}

// ─── Data loading ───────────────────────────────────────────────────────
async function loadIndex(){
  try {
    const r = await fetch('../state/event_summary/_index.json?_=' + Date.now(), {cache:'no-store'});
    if (r.ok) INDEX = await r.json();
  } catch(e){ console.warn('index load failed', e); }
}

async function attachPhantomZeros(evkey){
  // Lauren 2026-06-08 — surface auto-zeroed phantom residuals (octopos_phantom_zeros.json,
  // written by scripts/octopos_zero_phantoms.py each Thursday evening) per event.
  try {
    if (!SUMMARY) return;
    if (!SUMMARY.tabs) SUMMARY.tabs = {};
    const r = await fetch('../state/octopos_phantom_zeros.json?_=' + Date.now(), {cache:'no-store'});
    if (!r.ok){ SUMMARY.tabs.phantom_zeros = []; return; }
    const d = await r.json();
    const ev = (d.events || {})[evkey];
    if (!ev){ SUMMARY.tabs.phantom_zeros = []; return; }
    SUMMARY.tabs.phantom_zeros = (ev.zeroed || []).map(z => ({
      product_id: z.id, id: z.id, sku: z.sku || '', name: z.name || '',
      supplier: z.supplier || '', before: z.before, after: (z.after != null ? z.after : 0)
    }));
    SUMMARY._phantom_meta = { generated_at: ev.generated_at, window: (ev.last_event || {}),
                              rule: (ev.rule || {}), summary: (ev.apply_summary || {}) };
    // Zeroed products are resolved — drop them from the OTHER tabs so they don't
    // double-appear (e.g. as slow-movers at their pre-zero stock). Lauren 2026-06-08.
    const _zpids = new Set((SUMMARY.tabs.phantom_zeros || []).map(r => r.product_id));
    if (_zpids.size){
      ['slow_movers','negatives','no_threshold','missed_from_worklist','counted_at_event','top_sellers'].forEach(tb => {
        if (Array.isArray(SUMMARY.tabs[tb]))
          SUMMARY.tabs[tb] = SUMMARY.tabs[tb].filter(r => !_zpids.has(r.product_id != null ? r.product_id : r.id));
      });
      if (SUMMARY.stats){
        if ('slow_movers_count' in SUMMARY.stats) SUMMARY.stats.slow_movers_count = (SUMMARY.tabs.slow_movers || []).length;
        if ('negatives_count' in SUMMARY.stats)   SUMMARY.stats.negatives_count   = (SUMMARY.tabs.negatives || []).length;
        if ('no_threshold_count' in SUMMARY.stats) SUMMARY.stats.no_threshold_count = (SUMMARY.tabs.no_threshold || []).length;
      }
    }
  } catch(e){ if (SUMMARY){ SUMMARY.tabs = SUMMARY.tabs || {}; SUMMARY.tabs.phantom_zeros = []; } }
}

async function loadEvent(evkey){
  $('#tabContent').innerHTML = '<div class="loading"><div class="spinner"></div><div>טוען...</div></div>';
  try {
    const r = await fetch('../state/event_summary/' + encodeURIComponent(evkey) + '.json?_=' + Date.now(),
                          {cache:'no-store'});
    if (r.ok) {
      SUMMARY = await r.json();
      SUMMARY._pre_event_mode = false;
      await attachPhantomZeros(evkey);
      render(); return;
    }
    if (r.status === 404) {
      // Future event — no summary built yet. Build a synthetic pre-event view from snapshot.
      await loadPreEventMode(evkey);
      return;
    }
    throw new Error('HTTP ' + r.status);
  } catch(e){
    $('#tabContent').innerHTML = '<div class="empty"><div class="emoji">😶</div>'
      + '<div>טעינה נכשלה לאירוע <code>' + escHtml(evkey) + '</code></div>'
      + '<div style="margin-top:12px;font-size:12px">' + escHtml(e.message) + '</div></div>';
    $('#subtitle').textContent = '—';
    $('#statsStrip').innerHTML = '';
    $('#tabsBar').innerHTML = '';
  }
}

async function loadPreEventMode(evkey){
  // Pre-event view: load OCTOPOS snapshot + recount.json, surface a focused 3-tab view:
  //   🏷️ לספור באירוע  — all products currently tagged RECOUNT in OCTOPOS
  //   🔴 מינוס במלאי
  //   ⚙️ ללא Threshold
  let snap = null;
  try {
    const r = await fetch('../state/octopos_products.json?_=' + Date.now(), {cache:'no-store'});
    if (r.ok) snap = await r.json();
  } catch(_){}
  if (!snap) {
    $('#tabContent').innerHTML = '<div class="empty"><div class="emoji">😶</div><div>לא הצלחתי לטעון את snapshot של OCTOPOS. ייתכן שהsnapshot עדיין לא נבנה.</div></div>';
    return;
  }
  // Collect all active products
  const all = [];
  for (const code in (snap.vendors || {})){
    const vi = snap.vendors[code];
    const supplierName = vi.octopos_name || vi.name || code;
    for (const p of (vi.products || [])){
      if (p.active === false) continue;
      p._supplier_name = supplierName;
      all.push(p);
    }
  }
  // Build tabs
  const to_recount = [];
  const negatives = [];
  const no_threshold = [];
  for (const p of all){
    const cats = p.categories || [];
    const hasRc = cats.some(c => (c.name || '').trim().toLowerCase() === 'recount');
    const stk = Number(p.in_stock_qty || 0);
    const thr = Number(p.threshold || 0);
    const row = {
      product_id: p.id,
      name: p.name || '',
      sku: p.sku || '',
      supplier: p._supplier_name,
      department: p.department || '',
      current_stock: stk,
      in_stock_qty: stk,
      threshold: thr,
      categories: cats.map(c => ({id: c.id, name: c.name})),
      has_recount_tag: hasRc,
      unit_cost: Number(p.unit_cost || 0),
      sale_price: Number(p.sale_price || 0),
      updated_at: p.updated_at,
    };
    if (hasRc) to_recount.push(row);
    if (stk < 0) negatives.push({...row, last_updated: p.updated_at});
    if (thr <= 0) no_threshold.push(row);
  }
  to_recount.sort((a,b) => a.current_stock - b.current_stock);  // most negative first
  negatives.sort((a,b) => a.current_stock - b.current_stock);
  no_threshold.sort((a,b) => (a.supplier || '').localeCompare(b.supplier || ''));

  // Synthesize event meta from evkey (best-effort — slug-YYYY-MM-DD)
  const m = evkey.match(/^(.+)-(\d{4}-\d{2}-\d{2})$/);
  const city = m ? m[1].replace(/-/g, ' ').replace(/\b\w/g, c=>c.toUpperCase()) : evkey;
  const start = m ? m[2] : '';

  SUMMARY = {
    evkey, _pre_event_mode: true,
    _snapshot_at: snap._updated_at,
    _live_synced: false,
    generated_at: snap._updated_at || new Date().toISOString(),
    event: {city, state: '', start_date: start, end_date: '', venue: ''},
    tabs: {
      counted_at_event: [],
      missed_from_worklist: [],
      negatives,
      slow_movers: [],
      top_sellers: [],
      no_threshold,
      to_recount,  // NEW pre-event tab
    },
    stats: {
      counted_count: 0, missed_count: 0,
      negatives_count: negatives.length,
      slow_movers_count: 0, top_sellers_count: 0,
      no_threshold_count: no_threshold.length,
      to_recount_count: to_recount.length,
      total_units_sold: 0, total_revenue: 0, unique_products_sold: 0,
    },
  };
  await attachPhantomZeros(evkey);
  render();
  // Auto-sync the to_recount tab in the background — snapshot can be 1+ day stale
  // and Lauren's complaint is exactly that. Background fetch validates each tagged
  // product's live category list; rows that no longer have the tag drop out via
  // tabQualifier on the next re-render.
  setTimeout(() => autoSyncPreEvent(), 200);
}

async function autoSyncPreEvent(){
  if (!SUMMARY || !SUMMARY._pre_event_mode || SUMMARY._live_synced) return;
  let token = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!token){
    // Show banner asking for token — don't auto-prompt to avoid annoyance
    showPreEventBanner('snapshot');
    return;
  }
  showPreEventBanner('syncing');
  // Collect ALL unique pids across all pre-event tabs (to_recount + no_threshold + negatives)
  // — Lauren updates thresholds + clearance + tags throughout the day and ALL of them need refreshing.
  const pidsSet = new Set();
  ['to_recount', 'no_threshold', 'negatives'].forEach(tabId => {
    (SUMMARY.tabs[tabId] || []).forEach(r => { if (r.product_id != null) pidsSet.add(r.product_id); });
  });
  const pids = [...pidsSet];
  let done = 0, dropped = 0;
  // Batched concurrency to avoid overwhelming OCTOPOS — 4 at a time
  const batchSize = 4;
  for (let i = 0; i < pids.length; i += batchSize){
    const batch = pids.slice(i, i + batchSize);
    await Promise.all(batch.map(async pid => {
      try {
        const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
          headers: {'Authorization': token, 'Accept':'application/json'}
        });
        if (!r.ok) return;
        const prod = await r.json();
        const dp = (prod.data && !Array.isArray(prod.data)) ? prod.data : prod;
        const cats = dp.categories || [];
        const hasRc = cats.some(c => (c.name || '').trim().toLowerCase() === 'recount');
        const newStock = dp.in_stock_qty != null ? Number(dp.in_stock_qty) : null;
        const newThr = dp.threshold != null ? Number(dp.threshold) : null;
        for (const tabId in SUMMARY.tabs){
          for (const row of SUMMARY.tabs[tabId]){
            if (row.product_id === pid){
              row.current_stock = newStock;
              row.in_stock_qty = newStock;
              row.threshold = newThr;
              row.categories = cats.map(c => ({id: c.id, name: c.name}));
              row.has_recount_tag = hasRc;
            }
          }
        }
        if (!hasRc) dropped++;
        done++;
      } catch(_){}
    }));
    // Update progress banner mid-flight
    showPreEventBanner('syncing', done, pids.length, dropped);
  }
  SUMMARY._live_synced = true;
  // Compute richer stats: how many got out of each tab
  const drop = {to_recount: 0, no_threshold: 0, negatives: 0};
  // After sync, tabQualifier will filter them out — count what's gone
  ['to_recount', 'no_threshold', 'negatives'].forEach(tabId => {
    const qual = tabQualifier(tabId);
    if (qual) drop[tabId] = (SUMMARY.tabs[tabId] || []).filter(r => !qual(r)).length;
  });
  showPreEventBanner('done', done, pids.length, dropped, drop);
  renderTabContent();
  setTimeout(() => { const b = $('#preEventBanner'); if (b) b.remove(); }, 5000);
}

function showPreEventBanner(state, done, total, dropped){
  let b = $('#preEventBanner');
  if (!b){
    b = document.createElement('div');
    b.id = 'preEventBanner';
    b.style.cssText = 'position:sticky;top:0;z-index:60;padding:8px 14px;font-size:13px;font-weight:600;display:flex;gap:10px;align-items:center;justify-content:center';
    document.body.insertBefore(b, document.body.firstChild);
  }
  if (state === 'snapshot'){
    b.style.background = '#fef3c7'; b.style.color = '#92400e';
    b.innerHTML = '⚠ הנתונים מ-snapshot — ייתכן שלא עדכניים. <button onclick="autoSyncPreEvent()" style="background:#92400e;color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-weight:700;margin-right:8px">🔄 סנכרן מ-OCTOPOS עכשיו</button>';
  } else if (state === 'syncing'){
    b.style.background = '#dbeafe'; b.style.color = '#1d4ed8';
    const pct = total ? Math.round(100 * done / total) : 0;
    b.innerHTML = `🔄 מסנכרן מ-OCTOPOS... ${done||0}/${total||'?'} (${pct}%)${dropped ? ` · ${dropped} כבר לא מתויגים` : ''}`;
  } else if (state === 'done'){
    b.style.background = '#dcfce7'; b.style.color = '#15803d';
    const drop = arguments[4] || {};
    const parts = [];
    if (drop.to_recount) parts.push(`${drop.to_recount} כבר לא מתויגים RECOUNT`);
    if (drop.no_threshold) parts.push(`${drop.no_threshold} קיבלו Threshold`);
    if (drop.negatives) parts.push(`${drop.negatives} כבר לא במינוס`);
    b.innerHTML = `✓ סונכרן עם OCTOPOS · ${done} מוצרים` + (parts.length ? ' · ' + parts.join(' · ') : '');
  }
}

function tabQualifier(tabId){
  // Defensive filter: rows must still match the tab's semantic criterion.
  // This guards against stale JSON where Lauren updated values in-place but
  // the row stayed in the wrong array (pre-v11 saves).
  switch(tabId){
    case 'to_recount':   return r => r.has_recount_tag === true;
    case 'no_threshold': return r => !(Number(r.threshold) > 0);
    case 'negatives':    return r => Number(r.current_stock) < 0;
    case 'slow_movers':  return r => Number(r.current_stock) > 1 && !(Number(r.units_sold_at_event) > 0);
    default: return null;
  }
}

function getSortedFiltered(tabId){
  let rows = SUMMARY.tabs[tabId] || [];
  // Apply tab-specific qualifier (drops rows that no longer belong)
  const qual = tabQualifier(tabId);
  if (qual) rows = rows.filter(qual);
  if (SEARCH_TERM){
    const q = SEARCH_TERM.toLowerCase();
    rows = rows.filter(r =>
      (r.name || '').toLowerCase().includes(q) ||
      (r.sku || '').toLowerCase().includes(q) ||
      (r.supplier || '').toLowerCase().includes(q)
    );
  }
  const sort = SORT_BY[tabId];
  if (sort){
    rows = rows.slice().sort((a,b)=>{
      const av = a[sort.field], bv = b[sort.field];
      if (av === bv) return 0;
      if (av === null || av === undefined) return 1;
      if (bv === null || bv === undefined) return -1;
      const cmp = (typeof av === 'number' && typeof bv === 'number') ? av - bv : String(av).localeCompare(String(bv));
      return sort.dir === 'desc' ? -cmp : cmp;
    });
  }
  return rows;
}

function sortableHeader(field, label, tabId){
  const s = SORT_BY[tabId];
  const arrow = (s && s.field === field) ? (s.dir === 'desc' ? '▼' : '▲') : '';
  return `<th data-field="${field}"><span class="sort-arrow">${arrow}</span>${escHtml(label)}</th>`;
}

function wireSortHandlers(tabId){
  $('#tabContent').querySelectorAll('th[data-field]').forEach(th => {
    th.onclick = () => {
      const field = th.dataset.field;
      const cur = SORT_BY[tabId];
      if (cur && cur.field === field){
        SORT_BY[tabId] = { field, dir: cur.dir === 'desc' ? 'asc' : 'desc' };
      } else {
        SORT_BY[tabId] = { field, dir: 'desc' };
      }
      renderTabContent();
    };
  });
}

async function saveThresholdGeneric(pid, btn){
  const pidNum = parseInt(pid);
  const cell = btn.closest('.thr-cell-wrap');
  const input = cell.querySelector('.thr-input2');
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0){ toast('⚠ מספר לא חוקי', 'error'); return; }
  let token = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!token){
    token = prompt('הזיני את ה-OCTOPOS token:');
    if (!token) return;
    localStorage.setItem('lauren_octopos_token', token.trim());
  }
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
      method: 'PUT',
      headers: {'Authorization': token, 'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({'threshold_qty': val})
    });
    if (r.status === 401){ localStorage.removeItem('lauren_octopos_token'); throw new Error('Token לא חוקי'); }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const allR = findRowsByPid(pidNum);
    const nowIso = new Date().toISOString();
    allR.forEach(r => { r.threshold = val; r.threshold_edited_at = nowIso; });
    if (val > 0) {
      SUMMARY.tabs.no_threshold = (SUMMARY.tabs.no_threshold || []).filter(r => r.product_id !== pidNum);
    }
    toast('✓ Threshold עודכן: ' + val, 'success');
    saveEventSummaryToGithub();
    renderTabContent();
  } catch(e){
    toast('⚠ נכשל: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '✓ שמור';
  }
}

function findRowsByPid(pid){
  const out = [];
  for (const tabId in SUMMARY.tabs){
    const arr = SUMMARY.tabs[tabId] || [];
    for (const r of arr){
      if (r.product_id === pid) out.push(r);
    }
  }
  return out;
}

async function saveStockToOctopus(pid, btn){
  const pidNum = parseInt(pid);
  const cell = btn.closest('.stock-cell');
  const input = cell.querySelector('.stock-input');
  const newQ = parseFloat(input.value);
  if (isNaN(newQ)){ toast('⚠ מספר לא חוקי', 'error'); return; }
  const allRows = findRowsByPid(pidNum);
  if (allRows.length === 0){ toast('⚠ מוצר לא נמצא', 'error'); return; }
  const row = allRows[0];
  const oldQ = row.current_stock;

  let token = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!token){
    token = prompt('הזיני את ה-OCTOPOS token (נשמר מקומית במכשיר):');
    if (!token) return;
    localStorage.setItem('lauren_octopos_token', token.trim());
  }
  if (!confirm(`לעדכן מלאי של "${row.name}" מ-${oldQ} ל-${newQ}?\n(נשמר ב-OCTOPOS וב-GitHub)`)) return;

  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
      method: 'PUT',
      headers: {'Authorization': token, 'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({'in_stock_qty': newQ})
    });
    if (r.status === 401){
      localStorage.removeItem('lauren_octopos_token');
      throw new Error('Token לא חוקי — נמחק. הזיני מחדש.');
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const nowIso = new Date().toISOString();
    allRows.forEach(r => { r.current_stock = newQ; r.in_stock_qty = newQ; r.stock_edited_at = nowIso; });
    // Drop from tabs where the row no longer qualifies after the new stock value
    if (newQ >= 0) {
      SUMMARY.tabs.negatives = (SUMMARY.tabs.negatives || []).filter(r => r.product_id !== pidNum);
    }
    if (newQ <= 1) {
      SUMMARY.tabs.slow_movers = (SUMMARY.tabs.slow_movers || []).filter(r => r.product_id !== pidNum);
    }
    toast('✓ מלאי עודכן ב-OCTOPOS: ' + newQ, 'success');
    const ok = await saveEventSummaryToGithub();
    if (ok) { toast('✓ נשמר גם ב-GitHub', 'success'); } else { toast('⚠ נשמר ב-OCTOPOS אבל GitHub-sync נכשל — לחצי "🔄 סנכרן מ-OCTOPOS" למעלה', 'error'); }
    renderTabContent();
  } catch(e){
    toast('⚠ נכשל: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '✓ שמור';
  }
}

// ─── Current-stock pill (makes the actual stock number visually distinct from the delta) ──
function renderStockPill(s){
  if (s === null || s === undefined) return '<span class="pill muted">—</span>';
  const n = Number(s);
  if (n < 0) return `<span class="pill danger" title="במלאי שלילי לפי OCTOPOS">${fmt(n)}</span>`;
  if (n === 0) return `<span class="pill warning">0</span>`;
  return `<span class="pill info" title="מלאי נוכחי לפי OCTOPOS">${fmt(n)}</span>`;
}

async function removeRecountTag(pid, btn){
  const pidNum = parseInt(pid);
  const allRows = findRowsByPid(pidNum);
  if (allRows.length === 0){ toast('⚠ מוצר לא נמצא', 'error'); return; }
  const row = allRows.find(r => r.has_recount_tag) || allRows[0];
  if (!row.has_recount_tag){ toast('⚠ אין תג RECOUNT למוצר הזה', 'error'); return; }

  let token = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!token){
    token = prompt('הזיני את ה-OCTOPOS token (נשמר מקומית במכשיר):');
    if (!token) return;
    localStorage.setItem('lauren_octopos_token', token.trim());
  }
  if (!confirm(`להסיר תג RECOUNT מ-"${row.name}"?\n(נשמר ב-OCTOPOS וב-GitHub)`)) return;

  btn.disabled = true; btn.textContent = '...';
  try {
    // Calculate new category_ids = current minus the Recount one
    const newCatIds = (row.categories || [])
      .filter(c => (c.name || '').trim().toLowerCase() !== 'recount')
      .map(c => c.id);
    // OCTOPOS PUT
    const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
      method: 'PUT',
      headers: {'Authorization': token, 'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({'category_ids': newCatIds})
    });
    if (r.status === 401){
      localStorage.removeItem('lauren_octopos_token');
      throw new Error('Token לא חוקי — נמחק. הזיני מחדש.');
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    // Local update — propagate across all tabs that show this pid
    const nowIso2 = new Date().toISOString();
    const newCats2 = (row.categories || []).filter(c => (c.name || '').trim().toLowerCase() !== 'recount');
    allRows.forEach(r => {
      r.has_recount_tag = false;
      r.recount_tag_removed_at = nowIso2;
      r.categories = newCats2;
    });
    toast('✓ הוסר ב-OCTOPOS — שומר ב-GitHub...', 'success');
    // Persist to GitHub
    const ok = await saveEventSummaryToGithub();
    if (ok){
      toast('✓ נשמר גם ב-GitHub', 'success');
    } else {
      toast('⚠ נשמר ב-OCTOPOS, אבל GitHub-sync נכשל (יעודכן בסבב הבא)', 'info');
    }
    // Re-render the cell
    renderTabContent();
  } catch(e){
    toast('⚠ נכשל: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '🧹 הסר תג';
  }
}

async function saveEventSummaryToGithub(){
  let ghToken = (localStorage.getItem('lauren_gh_token_v1') || '').trim();
  if (!ghToken){
    ghToken = prompt('הזיני את ה-GitHub token (כדי לשמור את ה"הוסר" באופן קבוע ב-GitHub):');
    if (!ghToken) return false;
    localStorage.setItem('lauren_gh_token_v1', ghToken.trim());
  }
  try {
    const repoFile = 'docs/state/event_summary/' + SUMMARY.evkey + '.json';
    // 1. GET current sha
    const getUrl = 'https://api.github.com/repos/laurenlev10/lauren-agent-hub-data/contents/' + repoFile + '?ref=main';
    const getR = await fetch(getUrl, {headers: {'Authorization': 'token '+ghToken, 'Accept':'application/vnd.github+json'}});
    let sha = null;
    if (getR.ok){ const j = await getR.json(); sha = j.sha; }
    // 2. PUT new content
    const putUrl = 'https://api.github.com/repos/laurenlev10/lauren-agent-hub-data/contents/' + repoFile;
    const content = JSON.stringify(SUMMARY, null, 2);
    const body = {message: 'event-summary: Lauren removed RECOUNT tag via dashboard', content: btoa(unescape(encodeURIComponent(content))), branch: 'main'};
    if (sha) body.sha = sha;
    const r = await fetch(putUrl, {method:'PUT',
      headers: {'Authorization':'token '+ghToken, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json'},
      body: JSON.stringify(body)});
    if (r.status === 401){
      localStorage.removeItem('lauren_gh_token_v1');
      return false;
    }
    return r.ok;
  } catch(e){
    console.error('saveEventSummaryToGithub failed:', e);
    return false;
  }
}

        <input type="number" class="thr-input" min="0" step="1" placeholder="—" data-pid="${r.product_id}">
        <button class="thr-save-btn" data-pid="${r.product_id}">💾 שמור</button>
      </div></td>
      <td>${renderRecountTagCell(r)}</td>
      <td>${renderClearanceCell(r)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  $('#tabContent').innerHTML = html;
  wireSortHandlers('no_threshold'); wireSearch();
  $('#tabContent').querySelectorAll('.thr-save-btn').forEach(btn => {
    btn.onclick = () => saveThresholdToOctopus(btn.dataset.pid, btn);
  });
  $('#tabContent').querySelectorAll('.clearance-btn').forEach(btn => {
    btn.onclick = () => markAsClearance(btn.dataset.pid, btn);
  });
  wireAllInteractiveHandlers();
}

// ─── Clearance! marker — prepends "Clearance!" to product name in OCTOPOS ──
function renderClearanceCell(r){
  const name = r.name || '';
  if (name.toLowerCase().startsWith('clearance!')){
    return `<span class="pill success" title="המוצר כבר מסומן Clearance — לא יופיע בWizard להזמנות">🏷️ ✓ Clearance</span>`;
  }
  if (r.clearance_marked_at){
    const when = new Date(r.clearance_marked_at).toLocaleString('he-IL', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
    return `<span class="pill success">🏷️ סומן ${escHtml(when)}</span>`;
  }
  return `<button class="clearance-btn" data-pid="${r.product_id}" title="מוסיף 'Clearance!' לשם המוצר ב-OCTOPOS — יסומן כמוצר שלא נמשיך להזמין ולא יופיע בWizard" style="background:#fde68a;color:#92400e;border:1px solid #f59e0b;border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;font-weight:700">🏷️ סמן Clearance!</button>`;
}

async function markAsClearance(pid, btn){
  const pidNum = parseInt(pid);
  const allRows = findRowsByPid(pidNum);
  if (allRows.length === 0){ toast('⚠ מוצר לא נמצא', 'error'); return; }
  const row = allRows[0];
  const currentName = row.name || '';
  if (currentName.toLowerCase().startsWith('clearance!')){
    toast('⚠ המוצר כבר מסומן Clearance', 'info'); return;
  }
  const newName = 'Clearance! ' + currentName;
  let token = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!token){
    token = prompt('הזיני את ה-OCTOPOS token:');
    if (!token) return;
    localStorage.setItem('lauren_octopos_token', token.trim());
  }
  if (!confirm(`לסמן את "${currentName}" כ-Clearance?\nהשם החדש יהיה: "${newName}"\nהמוצר לא יופיע יותר בWizard להזמנות.`)) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
      method: 'PUT',
      headers: {'Authorization': token, 'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({'name': newName})
    });
    if (r.status === 401){
      localStorage.removeItem('lauren_octopos_token');
      throw new Error('Token לא חוקי — נמחק.');
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const nowIso = new Date().toISOString();
    allRows.forEach(rr => { rr.name = newName; rr.clearance_marked_at = nowIso; });
    // Drop from tabs where Clearance products don't belong (Lauren's not actively managing these)
    SUMMARY.tabs.no_threshold = (SUMMARY.tabs.no_threshold || []).filter(r => r.product_id !== pidNum);
    SUMMARY.tabs.slow_movers = (SUMMARY.tabs.slow_movers || []).filter(r => r.product_id !== pidNum);
    toast('✓ סומן Clearance ב-OCTOPOS', 'success');
    const ok = await saveEventSummaryToGithub();
    toast(ok ? '✓ נשמר ב-GitHub' : '⚠ נשמר ב-OCTOPOS, GitHub-sync נכשל — לחצי 🔄 סנכרן מלאי+Thr', ok ? 'success' : 'error');
    renderTabContent();
  } catch(e){
    toast('⚠ נכשל: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '🏷️ סמן Clearance!';
  }
}

// ─── Threshold save → OCTOPOS PUT /api/v2/products/{id} ────────────────
async function saveThresholdToOctopus(pid, btn){
  const input = $('#tabContent').querySelector('input.thr-input[data-pid="'+pid+'"]');
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0){ toast('⚠ מספר לא חוקי', 'error'); return; }
  let token = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!token){
    token = prompt('הזיני את ה-OCTOPOS token (נשמר מקומית במכשיר):');
    if (!token) return;
    localStorage.setItem('lauren_octopos_token', token.trim());
    $('#tokenBanner').style.display = 'none';
  }
  if (!confirm(`לעדכן Threshold ל-${val} עבור מוצר #${pid} ב-OCTOPOS?`)) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
      method: 'PUT',
      headers: {'Authorization': token, 'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({'threshold_qty': val})
    });
    if (r.status === 401){
      localStorage.removeItem('lauren_octopos_token');
      $('#tokenBanner').style.display = 'block';
      throw new Error('Token לא חוקי — נמחק. הזיני מחדש.');
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    toast('✓ Threshold עודכן ב-OCTOPOS: ' + val, 'success');
    btn.textContent = '✓ נשמר';
    btn.classList.add('saved');
    // Update ALL tabs that show this pid (threshold-edit can come from any tab)
    const allR = findRowsByPid(parseInt(pid));
    const nowIso3 = new Date().toISOString();
    allR.forEach(r => { r.threshold = val; r.threshold_edited_at = nowIso3; });
    // If threshold now > 0, drop the product from the 'ללא Threshold' tab
    // (it no longer qualifies). Same logic applied to other tabs by their respective save handlers.
    if (val > 0) {
      SUMMARY.tabs.no_threshold = (SUMMARY.tabs.no_threshold || []).filter(r => r.product_id !== parseInt(pid));
    }
    // Also persist to GitHub so it survives reload before next octopos_sync
    saveEventSummaryToGithub();
    setTimeout(()=> {
      renderTabContent();
    }, 800);
  } catch(e){
    toast('⚠ שמירה נכשלה: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '💾 שמור';
  }
}

function promptOctopusToken(){
  const t = prompt('הזיני את ה-OCTOPOS token (נשמר מקומית במכשיר):');
  if (t){ localStorage.setItem('lauren_octopos_token', t.trim()); $('#tokenBanner').style.display = 'none'; toast('✓ Token נשמר', 'success'); }
}

// ─── Event picker ───────────────────────────────────────────────────────
function renderPicker(){
  const sel = $('#evPicker');
  const opts = Object.entries(INDEX).sort((a,b)=> b[1].start_date.localeCompare(a[1].start_date));
  if (!opts.length){
    sel.innerHTML = '<option value="">אין סיכומים עדיין</option>';
    return;
  }
  const current = getEvKeyFromUrl();
  sel.innerHTML = opts.map(([k, m]) =>
    `<option value="${escHtml(k)}" ${k===current?'selected':''}>${escHtml(m.city)}, ${escHtml(m.state)} · ${escHtml(m.start_date)}</option>`
  ).join('');
  sel.onchange = () => {
    setEvKeyInUrl(sel.value);
    loadEvent(sel.value);
  };
  // If no current evkey, pick first
  if (!current && opts.length){
    setEvKeyInUrl(opts[0][0]);
    loadEvent(opts[0][0]);
  }
}

// ─── Live OCTOPOS sync — refresh stock/threshold/categories for visible products
async function syncFromOctopos(){
  let octToken = (localStorage.getItem('lauren_octopos_token') || '').trim();
  if (!octToken){
    octToken = prompt('הזיני את ה-OCTOPOS token:');
    if (!octToken) return;
    localStorage.setItem('lauren_octopos_token', octToken.trim());
  }
  const tab = SUMMARY.tabs[ACTIVE_TAB] || [];
  const pids = [...new Set(tab.map(r => r.product_id).filter(x => x != null))];
  if (pids.length === 0){ toast('אין מוצרים לרענן', 'info'); return; }
  toast(`מסנכרן ${pids.length} מוצרים מאוקטופוס...`, 'info');
  let updated = 0, failed = 0;
  for (const pid of pids){
    try {
      const r = await fetch('https://themakeup.octoretail.com/api/v2/products/' + pid, {
        headers: {'Authorization': octToken, 'Accept':'application/json'}
      });
      if (!r.ok){ failed++; continue; }
      const prod = await r.json();
      const dp = (prod.data && !Array.isArray(prod.data)) ? prod.data : prod;
      const newStock = dp.in_stock_qty != null ? Number(dp.in_stock_qty) : null;
      const newThr = dp.threshold != null ? Number(dp.threshold) : null;
      const cats = dp.categories || [];
      const hasRc = cats.some(c => (c.name || '').trim().toLowerCase() === 'recount');
      // Update across ALL tabs
      for (const tabId in SUMMARY.tabs){
        for (const row of SUMMARY.tabs[tabId]){
          if (row.product_id === pid){
            row.current_stock = newStock;
            if ('in_stock_qty' in row) row.in_stock_qty = newStock;
            row.threshold = newThr;
            row.categories = cats.map(c => ({id: c.id, name: c.name}));
            row.has_recount_tag = hasRc;
          }
        }
      }
      updated++;
    } catch(e){ failed++; }
  }
  toast(`✓ סנכרון: ${updated} עודכנו${failed ? `, ${failed} נכשלו` : ''}`, 'success');
  renderTabContent();
  // Persist to GitHub
  toast('שומר ל-GitHub...', 'info');
  const ok = await saveEventSummaryToGithub();
  toast(ok ? '✓ נשמר ב-GitHub — כעת זהה לאוקטופוס' : '⚠ שמירה ל-GitHub נכשלה — נסי שוב', ok ? 'success' : 'error');
}

// ─── Build Summary Now — triggers GitHub Actions workflow_dispatch ─────
async function buildSummaryNow(){
  if (!SUMMARY || !SUMMARY.evkey){ toast('אין אירוע נטען', 'error'); return; }
  const evkey = SUMMARY.evkey;
  // Build trigger needs `workflow` scope, separate from the contents-write token.
  let wfToken = (localStorage.getItem('lauren_gh_workflow_token') || '').trim();
  if (!wfToken){
    wfToken = prompt('הזיני GitHub PAT עם הרשאת workflow (זה token נפרד מזה ששומר תוכן).\nכדי ליצור אותו: github.com/settings/tokens → Generate new token (classic) → סמני repo + workflow → צרי + הדביקי כאן.');
    if (!wfToken) return;
    localStorage.setItem('lauren_gh_workflow_token', wfToken.trim());
  }
  if (!confirm(`לבנות את הסיכום של "${evkey}" מחדש?\n(ייקח ~30-60 שניות. אחרי זה תצטרכי ללחוץ "רענן דף".)`)) return;
  const url = 'https://api.github.com/repos/laurenlev10/lauren-agent-hub-data/actions/workflows/event-summary-build.yml/dispatches';
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: {'Authorization': 'token ' + wfToken, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
      body: JSON.stringify({ref: 'main', inputs: {evkey: evkey}})
    });
    if (r.status === 401 || r.status === 403){
      localStorage.removeItem('lauren_gh_workflow_token');
      throw new Error('Token לא חוקי או ללא הרשאת workflow — נמחק. צרי token חדש עם scope workflow.');
    }
    if (r.status !== 204){
      const err = await r.text();
      throw new Error('HTTP ' + r.status + ' ' + err);
    }
    toast('✓ הבנייה החלה — תיקח ~30-60 שניות. רענני את הדף אחרי דקה.', 'success');
    // Auto-poll for the new commit and reload when ready
    pollForRebuild(evkey);
  } catch(e){
    toast('⚠ נכשל: ' + e.message, 'error');
  }
}

async function pollForRebuild(evkey){
  const startedAt = new Date().toISOString();
  const url = 'https://dashboard.themakeupblowout.com/state/event_summary/' + encodeURIComponent(evkey) + '.json';
  let tries = 0;
  const tick = async () => {
    tries++;
    if (tries > 24) { toast('⏱ ההמתנה הסתיימה. רענני ידנית.', 'info'); return; }
    try {
      const r = await fetch(url + '?_=' + Date.now(), {cache: 'no-store'});
      if (r.ok){
        const j = await r.json();
        if (j.generated_at && j.generated_at > startedAt){
          toast('✓ סיכום חדש מוכן — טוען...', 'success');
          setTimeout(() => location.reload(), 800);
          return;
        }
      }
    } catch(_){}
    setTimeout(tick, 5000);  // poll every 5 sec
  };
  setTimeout(tick, 10000);  // first check after 10 sec
}

  renderPicker();
  const ek = getEvKeyFromUrl();
  if (ek) await loadEvent(ek);
})();
