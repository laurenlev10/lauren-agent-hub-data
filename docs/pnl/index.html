<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>סיכום אירוע — P&L</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;margin:0;padding:24px;line-height:1.5}
.wrap{max-width:920px;margin:0 auto}
h1{font-size:25px;margin:0 0 2px}.sub{color:#666;margin-bottom:16px}
.banner{color:#fff;border-radius:14px;padding:18px 22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.banner .big{font-size:30px;font-weight:800}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi .kv{font-size:20px;font-weight:700}.kpi .kl{color:#777;font-size:13px;margin-top:2px}
.card{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:17px;margin:0 0 10px;border-bottom:2px solid #f0c;padding-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:7px 8px;text-align:right;border-bottom:1px solid #eee}
th{color:#888;font-weight:600;font-size:12px}
.num{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
.subtot td{font-weight:800;border-top:2px solid #ddd}
.pl .grand td{font-size:18px;font-weight:800;border-top:3px solid #333}
.pend{background:#fde68a;color:#92400e;font-size:11px;border-radius:6px;padding:1px 6px;margin:0 6px}
.manual{background:#dbeafe;color:#1e40af;font-size:11px;border-radius:6px;padding:1px 6px;margin:0 6px}
.edit{cursor:pointer;color:#a21caf;font-size:13px;margin-right:8px;user-select:none}
.warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:14px}
.warn ul{margin:6px 0 0;padding-right:18px}
.cash{border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:14px}
.cash.good{background:#ecfdf5;border:1px solid #a7f3d0}.cash.bad{background:#fef2f2;border:1px solid #fecaca}
.foot{color:#999;font-size:12px;text-align:center;margin-top:18px}
input.amt{width:110px;font-size:14px;padding:3px 6px;border:1px solid #a21caf;border-radius:6px;text-align:right}
button.sv{font-size:12px;padding:3px 9px;border-radius:6px;border:0;background:#a21caf;color:#fff;cursor:pointer;margin-right:4px}
button.cx{font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;opacity:0;transition:.3s;pointer-events:none}
#toast.show{opacity:1}
.tokrow{font-size:12px;color:#888;text-align:center;margin-top:10px}
</style></head><body><div class="wrap" id="app">טוען…</div>
<div id="toast"></div>
<script>
const REPO="laurenlev10/lauren-agent-hub-data";
const OVERRIDES_FILE="docs/state/pnl_overrides.json";
const qs=new URLSearchParams(location.search);
const EVKEY=qs.get("evkey")||"";
const EXP_ORDER=[
 ["inventory","מלאי"],["shipping","משלוח"],["mystery_box","מיסטרי בוקס"],
 ["staff","צוות"],["meals","אוכל"],["other","שונות"],
 ["marketing_meta","שיווק — Meta"],["marketing_tiktok","שיווק — TikTok"],
 ["travel","נסיעות (QB)"],["venue","מקום (QB)"],
 ["uline","ULINE — ציוד לאירוע"],["lyft","Lyft — נסיעות צוות"]];
let PNL=null, OVR=null, OVR_SHA=null, LIVE=[], INV_LIVE=null, MGR_LIVE=null, MKT_LIVE=null;

// 🔴 LIVE manager-report overlay (Lauren 2026-06-10: "אם המנהלת ממלאת את הדוח — תכניס ל-P&L").
// Mirrors scripts/pnl_manager.py: staff = Σ(total || base+bonus+extra); cash expenses split
// meals/other by keyword (category field wins). Latest FINAL report only — drafts ignored.
function computeMgrLive(rep){
 const f=x=>{const n=Number(x||0);return isFinite(n)?n:0;};
 const MEAL_KW=["meal","food","lunch","dinner","breakfast","coffee","starbucks","restaurant","pizza","snack","drink","water","catering","אוכל","ארוחה","קפה","מסעדה"];
 const team=rep.team||[];
 const staff_lines=team.filter(t=>t.name).map(t=>({name:t.name,amount:+((f(t.total)||f(t.base)+f(t.bonus)+f(t.extra))).toFixed(2)}));
 const staff=+staff_lines.reduce((a,x)=>a+x.amount,0).toFixed(2);
 let meals=0,other=0;const expense_lines=[];
 (rep.expenses||[]).forEach(e=>{
   const amt=f(e.amount);
   const cat=String(e.category||(MEAL_KW.some(k=>String(e.desc||"").toLowerCase().includes(k))?"meals":"other")).toLowerCase();
   if(cat==="meals")meals+=amt;else other+=amt;
   expense_lines.push({desc:e.desc,amount:+amt.toFixed(2),category:cat});
 });
 return {staff,meals:+meals.toFixed(2),other:+other.toFixed(2),staff_lines,expense_lines,submitted_at:rep.submitted_at||"",manager:rep.manager_name||""};
}

// 🔴 LIVE inventory overlay (Lauren 2026-06-10) — replicates scripts/pnl_inventory.py:
// supplier-level invoice OVERRIDES order-level (no double-count, Lauren 2026-06-04);
// anomaly guard: supplier invoice >3× its order estimate AND >$1000 → excluded;
// Inventory = Σinvoiced − Σshipping; Shipping separate. So every invoice entered in
// the inventory dashboard reaches this P&L the moment the page loads.
function computeInvLive(ev){
 const f=x=>{const n=Number(x||0);return isFinite(n)?n:0;};
 const sups=ev.suppliers||{};
 const orders=(ev.local_orders||[]).filter(o=>!o.cancelled_at&&!o.moved_to);
 const byCode={};
 orders.forEach(o=>{(byCode[o.supplier_code]=byCode[o.supplier_code]||[]).push(o);});
 const codes=new Set(Object.keys(sups).concat(Object.keys(byCode)));
 let inv=0,ship=0;const lines=[];
 codes.forEach(code=>{
   const s=(sups[code]&&typeof sups[code]==="object")?sups[code]:{};
   const ords=byCode[code]||[];
   const est=ords.reduce((a,o)=>a+f(o.total_cost),0);
   let supInv=f(s.invoice_total_usd),supShip=f(s.shipping_cost_usd);
   const ordInv=ords.reduce((a,o)=>a+f(o.invoice_total_usd),0);
   const ordShip=ords.reduce((a,o)=>a+f(o.shipping_cost_usd),0);
   let anom=false;
   if(supInv>0&&est>0&&supInv>3*est&&supInv>1000){anom=true;supInv=0;supShip=0;}
   const total=supInv>0?supInv:ordInv, sh=supInv>0?supShip:ordShip;
   const name=(s.name||(ords[0]&&ords[0].supplier_name)||code);
   lines.push({supplier:name,invoiced:+total.toFixed(2),shipping:+sh.toFixed(2),estimate:+est.toFixed(2),status:anom?"anomaly-excluded":(total>0?"invoiced":"no-invoice")});
   if(total>0&&!anom){inv+=total;ship+=sh;}
 });
 lines.sort((a,b)=>(b.invoiced-a.invoiced)||(b.estimate-a.estimate));
 return {inventory:+(inv-ship).toFixed(2),shipping:+ship.toFixed(2),lines,
         n_invoiced:lines.filter(x=>x.status==="invoiced").length};
}

function money(v){return (typeof v==="number")?("$"+v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})):"— ממתין";}
function esc(s){const d=document.createElement("div");d.textContent=(s==null?"":s);return d.innerHTML;}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.className="show";setTimeout(()=>t.className="",2600);}

async function load(){
 if(!EVKEY){document.getElementById("app").innerHTML="<h1>חסר evkey</h1><p>פתחי עם <code>?evkey=city-YYYY-MM-DD</code></p>";return;}
 try{
   const r=await fetch("../state/event_pnl/"+EVKEY+".json?_="+Date.now(),{cache:"no-store"});
   if(!r.ok)throw new Error("אין נתוני P&L לאירוע הזה עדיין");
   PNL=await r.json();
 }catch(e){
   // Lauren 2026-06-10: no baked P&L file yet (e.g. 2027 events) — don't die; render the
   // page from LIVE sources only (inventory invoices, manager report, QB filings, marketing).
   try{
     const ri=await fetch("../state/events_index.json?_="+Date.now(),{cache:"no-store"});
     const evm=(((await ri.json()).events)||[]).find(x=>x.evkey===EVKEY);
     if(!evm)throw new Error("האירוע לא נמצא באינדקס");
     PNL={event:{city:evm.city,state:evm.state,start_date:evm.start_date,end_date:evm.end_date,venue:evm.venue},expenses:{},revenue:{},detail:{},warnings:[],_live_only:true};
   }catch(e2){document.getElementById("app").innerHTML="<h1>סיכום אירוע</h1><p>"+esc(e.message)+"</p>";return;}
 }
 try{const r2=await fetch("../state/pnl_overrides.json?_="+Date.now(),{cache:"no-store"});if(r2.ok)OVR=await r2.json();}catch(e){}
 try{
   const r3=await fetch("../state/pnl_qb_live.json?_="+Date.now(),{cache:"no-store"});
   if(r3.ok){
     const lv=((await r3.json()).events||{})[EVKEY];
     const gen=PNL.generated_at||"";
     // include: staged (not in QB yet) OR pushed after the last build (not yet in the built numbers)
     LIVE=Object.entries((lv&&lv.entries)||{}).map(([k,e])=>({key:k,...e}))
       .filter(e=>e.status==="staged"||!gen||((e.pushed_at||e.added_at||"")>gen))
       .sort((a,b)=>(a.date||"").localeCompare(b.date||""));
   }
 }catch(e){}
 // 🔴 Lauren 2026-06-10: the P&L pulls from ALL channels in PARALLEL, continuously —
 // inventory invoices + manager report + QB class filings (pnl_qb_live, fetched above)
 // + marketing — live on every page open, future and past events alike. The daily baked
 // build remains the fallback for sales/QB-history; live sources win when present.
 const [rInv,rMgr,rMkt]=await Promise.allSettled([
   fetch("../state/inventory_orders.json?_="+Date.now(),{cache:"no-store"}),
   fetch("../state/manager_reports.json?_="+Date.now(),{cache:"no-store"}),
   fetch("https://events.themakeupblowout.com/state/event_analytics.json?_="+Date.now(),{cache:"no-store"})
 ]);
 try{
   if(rInv.status==="fulfilled"&&rInv.value.ok){const ev=(((await rInv.value.json()).events)||{})[EVKEY];if(ev)INV_LIVE=computeInvLive(ev);}
 }catch(e){}
 try{
   if(rMgr.status==="fulfilled"&&rMgr.value.ok){
     const mj=await rMgr.value.json();
     const finals=(((mj.reports)||{})[EVKEY]||[]).filter(r=>String(r.mode||"final").toLowerCase()!=="draft");
     if(finals.length){finals.sort((a,b)=>(a.submitted_at||"").localeCompare(b.submitted_at||""));MGR_LIVE=computeMgrLive(finals[finals.length-1]);}
   }
 }catch(e){}
 try{
   if(rMkt.status==="fulfilled"&&rMkt.value.ok){
     const aj=await rMkt.value.json();
     const evm=PNL.event||{};
     const slug=String(evm.city||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")+"-"+String(evm.state||"").toLowerCase()+"-"+String(evm.start_date||"").slice(0,4);
     const node=((aj.events)||{})[slug];
     if(node){
       const m=(node.meta||{}).spend, t=(node.tiktok||{}).spend;
       MKT_LIVE={meta:(m!=null?+(+m).toFixed(2):null),tiktok:(t!=null?+(+t).toFixed(2):null)};
     }
   }
 }catch(e){}
 if(!OVR)OVR={_updated_at:null,events:{}};
 render();
}

function effExpenses(){
 // start from PNL.expenses, apply overrides for this event
 const ov=((OVR.events||{})[EVKEY])||{};
 const out={};
 for(const[k,lbl]of EXP_ORDER){
   const base=(PNL.expenses||{})[k]||{amount:null,status:"pending",source:""};
   if(k in ov && ov[k]!=null && ov[k]!==""){
     out[k]={amount:Number(ov[k]),source:"manual override",status:"ok"};
   }else if(k==="inventory"&&INV_LIVE&&INV_LIVE.n_invoiced>0){
     out[k]={amount:INV_LIVE.inventory,source:"inventory_orders (live)",status:"ok"};
   }else if(k==="shipping"&&INV_LIVE&&INV_LIVE.n_invoiced>0){
     out[k]={amount:INV_LIVE.shipping,source:"inventory_orders (live)",status:"ok"};
   }else if(k==="mystery_box"&&(function(){
     const mb=(((PNL||{}).detail||{}).mystery_box)||{};
     if(typeof mb.units!=="number")return false;
     const hasC=("mystery_box_unit_cost" in ov)&&ov.mystery_box_unit_cost!=null&&ov.mystery_box_unit_cost!=="";
     return hasC||base.amount==null;
   })()){
     const mb=(((PNL||{}).detail||{}).mystery_box)||{};
     const uc=effMbUnitCost();
     out[k]={amount:+(mb.units*uc).toFixed(2),source:"units x cost",status:"ok"};
   }else if(MGR_LIVE&&(k==="staff"||k==="meals"||k==="other")){
     out[k]={amount:MGR_LIVE[k],source:"manager_report (live)",status:"ok"};
   }else if(MKT_LIVE&&k==="marketing_meta"&&typeof MKT_LIVE.meta==="number"){
     out[k]={amount:MKT_LIVE.meta,source:"event_analytics (live)",status:"ok"};
   }else if(MKT_LIVE&&k==="marketing_tiktok"&&typeof MKT_LIVE.tiktok==="number"){
     out[k]={amount:MKT_LIVE.tiktok,source:"event_analytics (live)",status:"ok"};
   }else out[k]={amount:base.amount,source:base.source,status:base.status};
 }
 return out;
}
function totals(){
 const e=effExpenses();let sum=0,pending=[];
 for(const[k,lbl]of EXP_ORDER){const a=e[k].amount;if(typeof a==="number")sum+=a;if(e[k].status!=="ok")pending.push(lbl);}
 const liveSum=LIVE.reduce((a,x)=>a+(x.amount||0),0);sum+=liveSum;
 const net=PNL.revenue?PNL.revenue.net_sales:null;
 const profit=(typeof net==="number")?+(net-sum).toFixed(2):null;
 const margin=(profit!=null&&net)?profit/net:null;
 return {exp:e,sum:+sum.toFixed(2),net,profit,margin,pending};
}

function render(){
 const t=totals();const r=PNL.revenue||{};const ev=PNL.event||{};const d=PNL.detail||{};
 // Lauren 2026-06-10: a future event with no sales yet is NOT a "loss" — show a neutral
 // "waiting for sales" banner with expenses-accrued-so-far instead of a red הפסד.
 const noSales=(t.net==null);
 const pos=(t.profit!=null&&t.profit>=0);
 const accent=noSales?"#475569":(pos?"#16a34a":"#dc2626");
 const rw=noSales?"⏳ ממתין למכירות":(pos?"רווח":"הפסד");
 const prelim=t.pending.length>0;
 let kpis=[["מכירות נטו",noSales?"— בקרוב":money(r.net_sales)],["ברוטו",noSales?"— בקרוב":money(r.gross_sales)],[noSales?"הוצאות עד כה":rw,noSales?money(t.sum):money(t.profit)],
   ["מרווח",t.margin!=null?(t.margin*100).toFixed(1)+"%":"—"],["עסקאות",r.transactions||"—"],["ממוצע",money(r.avg_ticket)]];
 let h="";
 h+="<div style='display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px'>"+"<a href='https://dashboard.themakeupblowout.com/' style='background:#1F4E78;color:#fff;text-decoration:none;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px'>🏠 דף הבית</a>"+"<a href='https://bookkeeping.themakeupblowout.com/' style='background:#0a7d2c;color:#fff;text-decoration:none;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px'>📒 הנהלת חשבונות</a>"+"<a href='https://dashboard.themakeupblowout.com/launch/' style='background:#db2777;color:#fff;text-decoration:none;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px'>🎪 לוח אירועים</a>"+"<a href='https://dashboard.themakeupblowout.com/suppliers/' style='background:#7c3aed;color:#fff;text-decoration:none;padding:7px 13px;border-radius:8px;font-weight:600;font-size:13px'>📦 ספקים</a>"+"</div>";
 h+="<h1>סיכום אירוע — "+esc(ev.city||"")+", "+esc(ev.state||"")+"</h1>";
 h+="<div class='sub'>"+esc(ev.start_date||"")+" – "+esc(ev.end_date||"")+" · "+esc(ev.venue||"")+"</div>";
 h+="<div class='sub' style='font-size:12px'>🔄 שאיבה חיה בכל פתיחה: 📦 חשבוניות מלאי"+(INV_LIVE?" ✓":"")+" · 📋 דוח מנהלת"+(MGR_LIVE?" ✓":"")+" · 🧾 תיוקי הנה\"ח (QB)"+(LIVE.length?" ✓":"")+" · 📣 פרסום"+(MKT_LIVE?" ✓":"")+" — בנוסף לבנייה היומית (מכירות/QB היסטורי)</div>";
 if(noSales){
   h+="<div class='banner' style='background:"+accent+"'><div>⏳ ממתין למכירות — האירוע טרם התקיים</div><div class='big'>הוצאות שנצברו עד כה: "+money(t.sum)+"</div></div>";
 }else{
   h+="<div class='banner' style='background:"+accent+"'><div>"+rw+(prelim?" (ראשוני)":"")+"</div><div class='big'>"+money(t.profit)+(t.margin!=null?" · "+(t.margin*100).toFixed(1)+"%":"")+"</div></div>";
 }
 if(prelim)h+="<div class='warn'>⏳ עדיין ממתין/חסר: "+esc(t.pending.join(", "))+" — הרווח <b>ראשוני</b>. אפשר להזין ידנית כל שורה למטה (✏️).</div>";
 (PNL.warnings||[]).forEach(function(w){h+="<div class='warn'>"+esc(w)+"</div>";});
 if(PNL.historical){h+="<div class='warn' style='background:#eef2ff;border-color:#c7d2fe'>📄 מקור: הגיליון הידני של 2026."+(typeof PNL.sheet_profit==="number"&&Math.abs((t.profit||0)-PNL.sheet_profit)>=5?(" הרווח הרשום בגיליון: "+money(PNL.sheet_profit)+"."):"")+" אפשר להשלים/לתקן כל שורה ידנית (✏️).</div>";}
 h+="<div class='kpis'>"+kpis.map(k=>"<div class='kpi'><div class='kv'>"+esc(k[1])+"</div><div class='kl'>"+esc(k[0])+"</div></div>").join("")+"</div>";

 // income
 h+="<div class='card'><h2>💰 הכנסות</h2><table>"+
    "<tr><td>מכירות נטו</td><td class='num'>"+money(r.net_sales)+"</td></tr>"+
    "<tr><td>ברוטו (כולל מס)</td><td class='num'>"+money(r.gross_sales)+"</td></tr>"+
    "<tr><td>מס</td><td class='num'>"+money(r.tax)+"</td></tr>"+
    "<tr><td>עסקאות</td><td class='num'>"+(r.transactions||"—")+"</td></tr>"+
    "<tr><td>ממוצע לעסקה</td><td class='num'>"+money(r.avg_ticket)+"</td></tr></table>";
 const pay=d.payment_breakdown||{};
 if(Object.keys(pay).length){h+="<h2 style='margin-top:14px'>פירוט תשלומים</h2><table>"+Object.entries(pay).map(([k,v])=>"<tr><td>"+esc(k)+"</td><td class='num'>"+money(v)+"</td></tr>").join("")+"</table>";}
 h+="</div>";

 // (qb_tagged card merged into the unified itemized section below)

 // top products
 const tp=PNL.top_products||[];
 if(tp.length){h+="<div class='card'><h2>🏆 מוצרים מובילים</h2><table><tr><th>#</th><th>מוצר</th><th>ספק</th><th>יח׳</th><th>הכנסה</th></tr>"+
   tp.map((p,i)=>"<tr><td>"+(i+1)+"</td><td>"+esc(p.name)+"</td><td>"+esc(p.vendor)+"</td><td class='num'>"+(p.units_sold||0).toFixed(0)+"</td><td class='num'>"+money(p.revenue)+"</td></tr>").join("")+"</table></div>";}

 // inventory by supplier
 const inv=(INV_LIVE&&INV_LIVE.lines&&INV_LIVE.lines.length)?INV_LIVE.lines:(d.inventory_lines||[]);
 const invLiveBadge=(INV_LIVE&&INV_LIVE.lines&&INV_LIVE.lines.length)?" <span class='pend' style='background:#fee2e2;color:#b91c1c;border-color:#fca5a5;font-size:11px'>🔴 חי — מתעדכן מיידית מחשבוניות המלאי</span>":"";
 h+="<div class='card'><h2>📦 מלאי לפי ספק"+invLiveBadge+"</h2><table><tr><th>ספק</th><th>חשבונית</th><th>משלוח</th><th>סטטוס</th></tr>"+
   (inv.length?inv.map(x=>"<tr><td>"+esc(x.supplier)+"</td><td class='num'>"+money(x.invoiced)+"</td><td class='num'>"+money(x.shipping)+"</td><td>"+(x.status==="anomaly-excluded"?"⚠ הוחרג":(x.status==="invoiced"?"✓":"—"))+"</td></tr>").join(""):"<tr><td colspan=4>אין נתוני חשבוניות</td></tr>")+"</table></div>";

 // mystery box
 const mb=d.mystery_box||{};
 const mbUC=effMbUnitCost();
 const mbOvrSet=((((OVR||{}).events||{})[EVKEY])||{}).mystery_box_unit_cost!=null;
 h+="<div class='card'><h2>🎁 מיסטרי בוקס</h2><table><tr><th>מוצר</th><th>יח׳ שנמכרו</th><th>עלות ליח׳</th><th>סה״כ</th></tr>"+

async function saveEdit(k){
 const i=document.getElementById("in-"+k);if(!i)return;
 const raw=i.value.trim();const val=raw===""?null:Number(raw);
 if(raw!==""&&isNaN(val)){toast("סכום לא תקין");return;}
 const tok=(localStorage.getItem("lauren_gh_token_v1")||"").trim();
 if(!tok){toast("צריך GitHub token כדי לשמור");setTok();return;}
 toast("שומר…");
 // read-merge-write (IRON RULE #18): fetch live, overlay this event/line, PUT
 try{
   const getR=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+OVERRIDES_FILE+"?ref=main&_="+Date.now(),
     {headers:{"Authorization":"token "+tok,"Accept":"application/vnd.github+json"},cache:"no-store"});
   let sha=null,data={_updated_at:null,events:{}};
   if(getR.ok){const j=await getR.json();sha=j.sha;try{data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,"")))));}catch(e){}}
   if(!data.events)data.events={};
   if(!data.events[EVKEY])data.events[EVKEY]={};
   if(val===null)delete data.events[EVKEY][k];else data.events[EVKEY][k]=val;
   data._updated_at=new Date().toISOString();
   const body={message:"pnl-override: "+EVKEY+" "+k+"="+(val===null?"(cleared)":val),
     content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),branch:"main"};
   if(sha)body.sha=sha;
   const putR=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+OVERRIDES_FILE,
     {method:"PUT",headers:{"Authorization":"token "+tok,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
   if(!putR.ok){toast("שמירה נכשלה ("+putR.status+")");return;}
   OVR=data;toast("✓ נשמר ב-GitHub");render();
 }catch(e){toast("שגיאה: "+e.message);}
}
function setTok(){const t=prompt("הדביקי GitHub token (Contents: write):");if(t){localStorage.setItem("lauren_gh_token_v1",t.trim());toast("נשמר במכשיר");}}
