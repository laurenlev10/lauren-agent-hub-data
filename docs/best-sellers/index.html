function clearToken(){ localStorage.removeItem(TOKEN_KEY); renderTokenSection(); }

  const sec = document.getElementById("token-section");

function moveDeal(i, dir){
  const j = i + dir;
  if (j < 0 || j >= STATE.deals.length) return;
  const a = STATE.deals[i];
  STATE.deals[i] = STATE.deals[j];
  STATE.deals[j] = a;
  renderDeals();
  summarize();
}
function removeDeal(i){
  if (!confirm("להסיר את הכרטיס?")) return;
  STATE.deals.splice(i, 1);
  renderDeals();
  summarize();
}
function addDeal(){
  // Pick next color in rotation
  const used = STATE.deals.length;

}

//══════════════════════════════════════════════════════════════════════════
// Image upload (in-memory until deploy)
//══════════════════════════════════════════════════════════════════════════
function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const dataUrl = r.result;
      const base64 = dataUrl.split(",")[1];
      resolve({ dataUrl, base64, contentType: file.type });
    };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function onHeroUpload(input){
  const file = input.files[0]; if (!file) return;
  const { dataUrl, base64, contentType } = await fileToBase64(file);
  const filename = "hero." + (file.name.split(".").pop().toLowerCase());
  STATE.hero.asset = filename;
  PENDING_UPLOADS[filename] = { name: filename, base64, contentType, dataUrl };
  renderHero();
  summarize();
  toast("✓ התמונה נטענה · לחצי 'שמרי ופרסמי' כדי לפרסם", "ok");
}

async function onDealUpload(idx, input){
  const file = input.files[0]; if (!file) return;
  const { dataUrl, base64, contentType } = await fileToBase64(file);
  // Use sanitized product name + extension as filename
  const baseName = (STATE.deals[idx].name || "deal-"+(idx+1))
    .toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40);
  const ext = file.name.split(".").pop().toLowerCase();
  const filename = `${baseName}.${ext}`;
  STATE.deals[idx].image = filename;
  PENDING_UPLOADS[filename] = { name: filename, base64, contentType, dataUrl };
  renderDeals();
  summarize();
  toast("✓ התמונה נטענה · לחצי 'שמרי ופרסמי' כדי לפרסם", "ok");
}

body{font-family:"Archivo Black","Bebas Neue",Impact,sans-serif;color:var(--ink);background-color:#59d6fa;background-image:radial-gradient(#ffd8e9 2px,transparent 2.5px),radial-gradient(#9be4fc 2px,transparent 2.5px);background-position:0 0,25px 25px;background-size:50px 50px,50px 50px;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;height:auto}
main{min-height:100vh;padding:32px 16px}
@media (min-width:768px){main{padding:56px 16px}}
header.hero{max-width:64rem;margin:0 auto;text-align:center}
section.grid{max-width:72rem;margin:0 auto;display:grid;grid-template-columns:1fr;gap:32px}
@media (min-width:640px){section.grid{grid-template-columns:1fr 1fr}}
@media (min-width:1024px){section.grid{grid-template-columns:1fr 1fr 1fr}}
footer.cta{max-width:48rem;margin:64px auto 0;text-align:center}
@media (min-width:768px){footer.cta{margin-top:96px}}
.pop-border{border:4px solid var(--ink)}
.pop-shadow{box-shadow:8px 8px 0 var(--ink)}
.halftone{height:32px;max-width:64rem;margin:48px auto;opacity:.4;background-image:radial-gradient(var(--ink) 1.5px,transparent 1.5px);background-size:10px 10px}
.hero-img{margin-bottom:24px;background:#fff;overflow:hidden;transform:rotate(-1deg)}
.hero-img img{width:100%;height:auto;display:block}
.eyebrow{display:inline-block;background:var(--pop-yellow);padding:8px 20px;transform:rotate(-3deg);margin-bottom:24px;font-size:.9rem;letter-spacing:.2em}
@media (min-width:768px){.eyebrow{font-size:1rem}}
h1.title{margin:0;font-family:"Archivo Black",Impact,sans-serif;font-size:clamp(3rem,12vw,8rem);line-height:.9;letter-spacing:-.02em;text-transform:uppercase;color:var(--pop-red);-webkit-text-stroke:2px var(--ink);text-shadow:6px 6px 0 var(--ink),12px 12px 0 var(--pop-blue)}
.scan-card{display:inline-block;margin-top:32px;background:#fff;padding:16px 24px;transform:rotate(2deg);max-width:32rem}
.scan-card p{margin:0;font-size:1.1rem;text-transform:uppercase;font-family:"Bebas Neue","Archivo Black",sans-serif;letter-spacing:.03em}
@media (min-width:768px){.scan-card p{font-size:1.5rem}}
.scan-card .accent{color:var(--pop-red)}
.zaps{margin-top:24px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.zaps span{display:inline-block;background:#fff;padding:4px 14px;font-size:1rem;letter-spacing:.04em;animation:wiggle 3s ease-in-out infinite;border:4px solid var(--ink)}
@media (min-width:768px){.zaps span{font-size:1.1rem}}
.zaps span:nth-child(1){transform:rotate(-1deg);animation-delay:0s}
.zaps span:nth-child(2){transform:rotate(2deg);animation-delay:.2s}
.zaps span:nth-child(3){transform:rotate(-3deg);animation-delay:.4s}
.zaps span:nth-child(4){transform:rotate(4deg);animation-delay:.6s}
@keyframes wiggle{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
.card{position:relative;background:#fff;overflow:hidden;border:4px solid var(--ink);box-shadow:8px 8px 0 var(--ink)}
.card.tilt-l{transform:rotate(-0.8deg)}.card.tilt-r{transform:rotate(0.8deg)}
.card-badge{position:absolute;top:-12px;right:-12px;z-index:10;width:80px;height:80px;border-radius:9999px;border:4px solid var(--ink);display:flex;align-items:center;justify-content:center;text-transform:uppercase;font-size:.95rem;font-family:"Archivo Black",Impact,sans-serif;transform:rotate(12deg);text-align:center}
.card-img{aspect-ratio:1/1;background:#000;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-foot{padding:16px;border-top:4px solid var(--ink)}
.card-foot h2{margin:0;font-size:1.15rem;line-height:1.1;text-transform:uppercase;font-family:"Archivo Black",Impact,sans-serif}
@media (min-width:768px){.card-foot h2{font-size:1.35rem}}
.card-foot .deal{margin:10px 0 0;font-size:1.6rem;text-transform:uppercase;color:#fff;-webkit-text-stroke:1px var(--ink);text-shadow:3px 3px 0 var(--ink);font-family:"Archivo Black",Impact,sans-serif}
@media (min-width:768px){.card-foot .deal{font-size:2rem}}
.bg-pop-pink{background:var(--pop-pink)}.bg-pop-yellow{background:var(--pop-yellow)}.bg-pop-blue{background:var(--pop-blue)}.bg-pop-red{background:var(--pop-red)}
.cta-card{display:inline-block;background:var(--pop-pink);padding:24px 32px;transform:rotate(-1deg);border:4px solid var(--ink);box-shadow:8px 8px 0 var(--ink)}
.cta-card .grab{margin:0;font-size:1.5rem;line-height:1.05;text-transform:uppercase;font-family:"Archivo Black",Impact,sans-serif}
@media (min-width:768px){.cta-card .grab{font-size:2.5rem}}
.cta-card .only{margin:12px 0 0;font-size:.85rem;letter-spacing:.2em}
@media (min-width:768px){.cta-card .only{font-size:1rem}}
</style>
</head>
<body>
<main>

  <header class="hero">
    <div class="hero-img pop-border pop-shadow">
      <img src="assets/${esc(STATE.hero.asset)}" alt="${escAttr(STATE.hero.alt)}">
    </div>

    <div class="eyebrow pop-border pop-shadow">${esc(STATE.eyebrow)}</div>

    <h1 class="title">${esc(STATE.title_line_1)}<br>${esc(STATE.title_line_2)}</h1>

    <div class="scan-card pop-border pop-shadow">
      <p>${esc(STATE.scan_card_text)}</p>
    </div>

    <div class="zaps">
      <span>POW!</span>
      <span>WOW!</span>
      <span>BAM!</span>
      <span>ZAP!</span>
    </div>
  </header>

  <div class="halftone"></div>

  <section class="grid">

${cards}

  </section>

  <footer class="cta">
    <div class="cta-card">
      <p class="grab">${esc(STATE.footer_grab)}</p>
      <p class="only">${esc(STATE.footer_only)}</p>
    </div>
  </footer>

<\/main>
<\/body>
<\/html>
`;
}

//══════════════════════════════════════════════════════════════════════════
// GitHub API write helpers
//══════════════════════════════════════════════════════════════════════════
async function getFileSha(repo, path){
  const token = getToken();
  const url = `https://api.github.com/repos/${repo}/contents/${path}?ref=main`;
  const r = await fetch(url, { headers: { Authorization: "token " + token, Accept: "application/vnd.github+json" }});
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
  const j = await r.json();
  return j.sha;
}

async function putFile(repo, path, contentBase64, commitMsg){
  const token = getToken();
  const sha = await getFileSha(repo, path);
  const url = `https://api.github.com/repos/${repo}/contents/${path}`;
  const body = { message: commitMsg, content: contentBase64, branch: "main" };
  if (sha) body.sha = sha;
  const r = await fetch(url, {
    method: "PUT",
    headers: { Authorization: "token " + token, Accept: "application/vnd.github+json", "Content-Type":"application/json" },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`PUT ${path} → ${r.status}: ${t.slice(0,200)}`);
  }
  return r.json();
}

function utf8ToBase64(str){
  return btoa(unescape(encodeURIComponent(str)));
}

//══════════════════════════════════════════════════════════════════════════
// Deploy
//══════════════════════════════════════════════════════════════════════════
async function deployAll(){
  if (!getToken()){ toast("⚠️ צריך טוקן GitHub קודם", "warn"); return; }

  // Sanity checks
  if (!STATE.hero.asset){ toast("⚠️ אין תמונת Hero", "warn"); return; }
  for (let i = 0; i < STATE.deals.length; i++){
    const d = STATE.deals[i];
    if (!d.image){ toast(`⚠️ דיל #${i+1} בלי תמונה`, "warn"); return; }
    if (!d.name.trim()){ toast(`⚠️ דיל #${i+1} בלי שם`, "warn"); return; }
  }

  const btn = document.getElementById("deploy-btn");
  btn.disabled = true;
  btn.textContent = "⏳ מפרסם…";

  try {
    // 1. Upload pending images to the live site repo
    const pendingNames = Object.keys(PENDING_UPLOADS);
    for (let i = 0; i < pendingNames.length; i++){
      const name = pendingNames[i];
      const p = PENDING_UPLOADS[name];
      btn.textContent = `⏳ תמונה ${i+1}/${pendingNames.length}…`;
      await putFile(TARGET_REPO, `${TARGET_DIR}/assets/${name}`, p.base64, `best-sellers: upload ${name}`);
    }

    // 2. Generate + push new index.html
    btn.textContent = "⏳ מפרסם דף…";
    const html = generateIndexHtml();
    await putFile(TARGET_REPO, `${TARGET_DIR}/index.html`, utf8ToBase64(html), "best-sellers: deploy from dashboard");

    // 3. Save state JSON to lauren-agent-hub-data
    STATE._updated_at = new Date().toISOString();
    btn.textContent = "⏳ שומר מצב…";
    await putFile(STATE_REPO, STATE_PATH, utf8ToBase64(JSON.stringify(STATE, null, 2) + "\n"), "best-sellers: state update from dashboard");

    // Clear pending
    PENDING_UPLOADS = {};
    summarize();
    toast("✓ הופץ בהצלחה! יחי תוך ~30 שניות", "ok");
  } catch(e){
    console.error(e);
    toast("✗ שגיאה: " + e.message, "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "💾 שמרי ופרסמי";
  }
}

//══════════════════════════════════════════════════════════════════════════
// Init
//══════════════════════════════════════════════════════════════════════════
async function init(){
  renderTokenSection();
  try {
    const r = await fetch(STATE_URL + "?_=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("state fetch " + r.status);
    STATE = await r.json();
  } catch(e){
    toast("⚠️ לא הצליח לטעון state: " + e.message, "err");
    STATE = { hero: { asset: "hero.jpeg", alt: "" }, deals: [], title_line_1:"Monthly", title_line_2:"Deals!", eyebrow:"★ POP-UP EXCLUSIVE ★", scan_card_text:"", footer_grab:"", footer_only:"" };
  }
  renderHero();
  renderFixedText();
  renderDeals();
  summarize();
}

init();
</script>
