name: event-yield — Sunday 22:30 local stockout/overstock analyzer

# Lauren's directive 2026-05-17 PM (late): detect Fri/Sat stockouts → bump
# next order; detect Mon-leftover overstocks → trim next order. Reads
# docs/state/octopos_stock_timeseries.json (filled by octopos-stock-poll daily),
# writes per-product signal + multiplier into docs/state/slow_movers.json.

on:
  schedule:
    # 22:30 local each US timezone band — fires 5 times Sun→Mon UTC
    - cron: "30 21 * * 0"   # 17:30 EDT Sunday (event-end + 15min)
    - cron: "30 22 * * 0"   # 17:30 CDT
    - cron: "30 23 * * 0"   # 17:30 MDT
    - cron: "30 0  * * 1"   # 17:30 PDT
    - cron: "30 1  * * 1"   # 17:30 PST (winter Pacific edge)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run event-yield analyzer
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: python3 scripts/event_yield_run.py

      - name: Commit slow_movers.json if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/state/slow_movers.json; then
            git add docs/state/slow_movers.json
            git commit -m "@event-yield: per-product signal + multiplier after event"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Update scheduled-runs.json lastRunAt
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d.get("tasks", []):
              if t.get("id") == "event-yield":
                  t["lastRunAt"] = now
                  break
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), indent=2, ensure_ascii=False)
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump event-yield lastRunAt"
            git pull --rebase origin main
            git push origin main
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
