name: qb-recurring-watch
# Weekly recurring-expense watchdog — deviations / duplicate charges (Lauren 2026-06-06).
on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 7 AM PT
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan recurring expenses
        env:
          QB_CLIENT_ID:        ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET:    ${{ secrets.QB_CLIENT_SECRET }}
          QB_REALM_ID:         ${{ secrets.QB_REALM_ID }}
          QB_TOKEN_KEY:        ${{ secrets.QB_TOKEN_KEY }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: python3 scripts/qb_recurring_watch.py
      - name: Commit watch state
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          git add docs/state/qb_recurring_watch.json
          if ! git diff --cached --quiet; then
            git commit -m "qb: recurring-expense watch run [qb-applied]"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi
      - name: Update scheduled-runs lastRunAt
        run: |
          python3 - <<'PY'
          import json, datetime
          p = "docs/scheduled-runs.json"
          d = json.load(open(p, encoding="utf-8"))
          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d["tasks"]:
              if t["id"] == "qb-recurring-watch":
                  t["lastRunAt"] = now
          d["_updated_at"] = now
          json.dump(d, open(p, "w", encoding="utf-8"), indent=2, ensure_ascii=False)
          PY
          git add docs/scheduled-runs.json
          if ! git diff --cached --quiet; then
            git commit -m "scheduled-runs: bump qb-recurring-watch lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
