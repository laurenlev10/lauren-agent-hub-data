name: qb-post-queue
# Applies Lauren's bookkeeping POSTs (dashboard 🚀) to QuickBooks within ~1 minute.
on:
  push:
    paths:
      - "docs/state/qb_post_queue.json"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[qb-go]')
    steps:
      - uses: actions/checkout@v4
      - name: Apply queue to QuickBooks
        env:
          QB_CLIENT_ID:     ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_REALM_ID:      ${{ secrets.QB_REALM_ID }}
          QB_TOKEN_KEY:     ${{ secrets.QB_TOKEN_KEY }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/qb_apply_queue.py
      - name: Refresh untagged snapshot (applied rows drop out)
        env:
          QB_CLIENT_ID:     ${{ secrets.QB_CLIENT_ID }}
          QB_CLIENT_SECRET: ${{ secrets.QB_CLIENT_SECRET }}
          QB_REALM_ID:      ${{ secrets.QB_REALM_ID }}
          QB_TOKEN_KEY:     ${{ secrets.QB_TOKEN_KEY }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/qb_untagged_pull.py
      - name: Commit results
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          git add docs/state/qb_post_queue.json docs/state/qb_untagged.json docs/state/qb_lists.json
          if ! git diff --cached --quiet; then
            git commit -m "qb: apply post queue [qb-applied]"
            git pull --rebase origin main
            git push origin main
          fi
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
