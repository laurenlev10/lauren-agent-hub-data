name: Stock spike watchdog

# Polls docs/state/octopos_stock_audit.json every 30 minutes for unack'd stock
# spikes (|delta| >= 100 or pct >= 200%) and SMSes Lauren if any are found.
# Companion to the PREFLIGHT G1 guard in the dashboard — catches future bugs
# that bypass the UI (cron-driven agents, manual API hits, etc.).
# Required: stock_spike_watchdog.py, audit log writes (from confirmInvoiceCompared).

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write    # so we can mark spikes as smsd_at after sending

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run watchdog
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE }}
        run: python3 scripts/stock_spike_watchdog.py

      - name: Commit audit log if updated
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/state/octopos_stock_audit.json; then
            git add docs/state/octopos_stock_audit.json
            git commit -m "stock-spike-watchdog: mark $(date -u +%FT%TZ) spikes as smsd_at"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Bump scheduled-runs.json
        run: |
          python3 <<'PY'
          import json, datetime
          d = json.load(open('docs/scheduled-runs.json'))
          for t in d.get('tasks', []):
            if t.get('id') == 'stock-spike-watchdog':
              t['lastRunAt'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          d['_updated_at'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          open('docs/scheduled-runs.json', 'w').write(json.dumps(d, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs bump
        run: |
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump stock-spike-watchdog lastRunAt"
            git pull --rebase origin main
            git push origin main
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
