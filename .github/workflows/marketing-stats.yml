name: Marketing stats — pull from GA4 + Meta + TikTok + SimpleTexting

# Aggregates per-event traffic, conversion %, ROAS, SMS funnel + insights digest.
#
# State files updated:
#   - lauren-agent-hub-data: docs/state/conversion_history.json
#   - themakeupblowout-events: docs/state/event_analytics.json
#   - lauren-agent-hub-data: docs/launch/index.html (EVENT_ANALYTICS map)
#
# Cron schedule:
#   - "30 */6 * * *" → every 6 hours (data refresh only, no SMS)
#   - "0 16 * * *"   → 9 AM PT daily (data refresh + SMS digest to Lauren + Eli)
#   - "0 4  * * *"   → 9 PM PT daily (data refresh + SMS digest)
#
# Required GitHub Secrets:
#   GA4_PROPERTY_ID, GA4_SERVICE_ACCOUNT_JSON
#   META_PAGE_TOKEN, META_AD_ACCOUNT_ID
#   TIKTOK_ACCESS_TOKEN, TIKTOK_ADVERTISER_ID
#   SIMPLETEXTING_TOKEN, EVENTS_REPO_PAT
#   LAUREN_PHONE (optional, default 4243547625), ELI_PHONE

on:
  schedule:
    - cron: "30 */6 * * *"   # Data pull every 6h
    - cron: "0 16 * * *"     # 9 AM PT — SMS digest
    - cron: "0 4 * * *"      # 9 PM PT — SMS digest
  workflow_dispatch: {}

jobs:
  pull-and-render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SHOULD_SEND_SMS: ${{ github.event.schedule == '0 16 * * *' || github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet cryptography

      - name: Run @stats Level 2 aggregator (with funnel)
        env:
          GA4_PROPERTY_ID:           ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON:  ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          META_PAGE_TOKEN:           ${{ secrets.META_PAGE_TOKEN }}
          META_AD_ACCOUNT_ID:        ${{ secrets.META_AD_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN:       ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_ADVERTISER_ID:      ${{ secrets.TIKTOK_ADVERTISER_ID }}
          SIMPLETEXTING_TOKEN:       ${{ secrets.SIMPLETEXTING_TOKEN }}
        run: |
          python3 - <<'PY'
          import sys, json, urllib.request
          sys.path.insert(0, "scripts")
          from lauren_stats import (
              aggregate_with_funnel, detect_anomalies,
              extract_setups_from_launch_dashboard,
              extract_eventbrite_stats_from_launch_dashboard,
          )

          url = "https://events.themakeupblowout.com/upcoming-events.json"
          try:
              with urllib.request.urlopen(url, timeout=10) as r:
                  events = json.load(r).get("events", [])
          except Exception:
              events = []
          slugs = []
          for e in events:
              city = (e.get("city") or "").lower().replace(" ", "-")
              state = (e.get("state") or "").lower()
              year = (e.get("start_date") or "")[:4]
              if city and state and year: slugs.append(f"{city}-{state}-{year}")
          print(f"Pulling stats for {len(slugs)} events")

          setups = extract_setups_from_launch_dashboard("docs/launch/index.html")
          eb_stats = extract_eventbrite_stats_from_launch_dashboard("docs/launch/index.html")
          print(f"Loaded {len(setups)} SETUPS, {len(eb_stats)} EVENTBRITE_STATS")

          data = aggregate_with_funnel(slugs, events, setups, eventbrite_stats=eb_stats)

          baselines = {"median_conv_rate_overall": 0.10}
          for slug, ev in data["events"].items():
              ev["anomalies"] = []
          ann = detect_anomalies(data, baselines)
          for a in ann:
              data["events"][a["event"]]["anomalies"].append(a)

          import os
          os.makedirs("docs/state", exist_ok=True)
          with open("docs/state/conversion_history.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f"Wrote {len(data['events'])} events, {len(ann)} anomalies")
          PY

      - name: Upsert EVENT_ANALYTICS into launch_dashboard.html
        run: python3 scripts/upsert_event_analytics.py

      - name: Push to themakeupblowout-events repo (event_analytics.json)
        env:
          GH_PAT: ${{ secrets.EVENTS_REPO_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "⚠ EVENTS_REPO_PAT not set — skipping cross-repo push"; exit 0
          fi
          git clone https://x-access-token:${GH_PAT}@github.com/laurenlev10/themakeupblowout-events.git /tmp/events
          cp docs/state/conversion_history.json /tmp/events/docs/state/event_analytics.json
          cd /tmp/events
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via marketing-stats)"
          git add docs/state/event_analytics.json
          if ! git diff --cached --quiet; then
            git commit -m "stats: refresh event_analytics.json (with funnel)"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: Commit local changes
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via marketing-stats)"
          git add docs/state/conversion_history.json docs/launch/index.html
          if ! git diff --cached --quiet; then
            git commit -m "stats: refresh conversion_history.json + EVENT_ANALYTICS map"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: Send insights digest SMS (9 AM/PM PT)
        if: env.SHOULD_SEND_SMS == 'true'
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          ELI_PHONE:           ${{ secrets.ELI_PHONE }}
        run: |
          python3 - <<'PY'
          import sys, json, os, urllib.request
          sys.path.insert(0, "scripts")
          from lauren_stats import (
              extract_setups_from_launch_dashboard,
              extract_eventbrite_stats_from_launch_dashboard,
              extract_event_financials_from_launch_dashboard,
              fetch_all_simpletexting_lists, find_previous_year_lists,
              compute_real_averages, fetch_simpletexting_list_sizes,
              map_setups_to_slugs, generate_per_event_insights, format_insights_sms,
          )
          from lauren_sms import send_sms

          # Load events + parse data
          with urllib.request.urlopen("https://events.themakeupblowout.com/upcoming-events.json", timeout=10) as r:
              events = json.load(r).get("events", [])
          setups = extract_setups_from_launch_dashboard("docs/launch/index.html")
          eb_stats = extract_eventbrite_stats_from_launch_dashboard("docs/launch/index.html")
          financials = extract_event_financials_from_launch_dashboard("docs/launch/index.html")

          slug_to_list = map_setups_to_slugs(setups, events)
          sms_data = fetch_simpletexting_list_sizes(slug_to_list)
          averages = compute_real_averages(financials, eb_stats, sms_data)

          # Read latest conversion_history.json (just written)
          history = json.load(open("docs/state/conversion_history.json"))
          all_lists = fetch_all_simpletexting_lists()
          print(f"Loaded {len(all_lists)} SimpleTexting lists for YoY")

          # Generate per-event insights (only events with data)
          insights = []
          for slug, ev in history.get("events", {}).items():
              if ev.get("eventbrite_registered", 0) == 0 and ev.get("sms_registered", 0) == 0:
                  continue
              parts = slug.rsplit("-", 2)
              if len(parts) != 3: continue
              city = parts[0].replace("-", " ").title()
              state = parts[1].upper()
              year = int(parts[2])
              prev_lists = find_previous_year_lists(city, state, year, all_lists)
              insight = generate_per_event_insights(slug, ev, averages, prev_year_lists=prev_lists)
              insights.append(insight)

          if not insights:
              print("· no events with data — no SMS to send")
              sys.exit(0)

          msg = format_insights_sms(insights, averages)
          print(f"\n=== SMS PREVIEW ({len(msg)} chars) ===")
          print(msg)
          print("="*40)

          # Send to Lauren + Eli
          recipients = []
          lp = os.environ.get("LAUREN_PHONE")
          ep = os.environ.get("ELI_PHONE")
          if lp: recipients.append(("Lauren", lp))
          if ep: recipients.append(("Eli", ep))
          if not recipients:
              print("⚠ no recipients configured (LAUREN_PHONE + ELI_PHONE both missing)")
              sys.exit(0)

          for name, phone in recipients:
              try:
                  send_sms(phone, msg)
                  print(f"✓ sent to {name} ({phone})")
              except Exception as e:
                  print(f"⚠ send to {name} failed: {e}")
          PY
