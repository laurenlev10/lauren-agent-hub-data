name: Marketing stats — pull from GA4 + Meta + TikTok + SimpleTexting

# Aggregates per-event traffic, conversion %, share clicks, ROAS, and SMS funnel.
# Updates three state files:
#   - lauren-agent-hub-data: docs/state/conversion_history.json (rolling — used by @forecast)
#   - themakeupblowout-events: docs/state/event_analytics.json (per-event — used by stats.html)
#   - lauren-agent-hub-data: docs/launch/index.html (EVENT_ANALYTICS map — flips Stats button green)
#
# Required GitHub Secrets:
#   GA4_PROPERTY_ID, GA4_SERVICE_ACCOUNT_JSON
#   META_PAGE_TOKEN, META_AD_ACCOUNT_ID
#   TIKTOK_ACCESS_TOKEN, TIKTOK_ADVERTISER_ID
#   SIMPLETEXTING_TOKEN  (for funnel-end SMS list size — Level 2)
#   EVENTS_REPO_PAT      (PAT with write access to themakeupblowout-events)

on:
  schedule:
    - cron: "30 */6 * * *"  # 00:30, 06:30, 12:30, 18:30 UTC daily
  workflow_dispatch: {}

jobs:
  pull-and-render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: python3 -m pip install --quiet cryptography

      - name: Run @stats Level 2 aggregator (with funnel)
        env:
          GA4_PROPERTY_ID:           ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON:  ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          META_PAGE_TOKEN:           ${{ secrets.META_PAGE_TOKEN }}
          META_AD_ACCOUNT_ID:        ${{ secrets.META_AD_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN:       ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_ADVERTISER_ID:      ${{ secrets.TIKTOK_ADVERTISER_ID }}
          SIMPLETEXTING_TOKEN:       ${{ secrets.SIMPLETEXTING_TOKEN }}
        run: |
          python3 - <<'PY'
          import sys, json, urllib.request
          sys.path.insert(0, "scripts")
          from lauren_stats import aggregate_with_funnel, detect_anomalies, extract_setups_from_launch_dashboard, extract_eventbrite_stats_from_launch_dashboard

          # 1. Pull upcoming events list
          url = "https://events.themakeupblowout.com/upcoming-events.json"
          try:
              with urllib.request.urlopen(url, timeout=10) as r:
                  events = json.load(r).get("events", [])
          except Exception:
              events = []
          slugs = []
          for e in events:
              city = (e.get("city") or "").lower().replace(" ", "-")
              state = (e.get("state") or "").lower()
              year = (e.get("start_date") or "")[:4]
              if city and state and year:
                  slugs.append(f"{city}-{state}-{year}")
          print(f"Pulling stats for {len(slugs)} events")

          # 2. Parse SETUPS + EVENTBRITE_STATS from launch_dashboard.html
          setups = extract_setups_from_launch_dashboard("docs/launch/index.html")
          eb_stats = extract_eventbrite_stats_from_launch_dashboard("docs/launch/index.html")
          print(f"Loaded {len(setups)} SETUPS entries, {len(eb_stats)} EVENTBRITE_STATS entries")

          # 3. Aggregate everything (GA4 + Meta + TikTok + SimpleTexting + Eventbrite + funnel + forecast)
          data = aggregate_with_funnel(slugs, events, setups, eventbrite_stats=eb_stats)

          # 4. Detect anomalies
          baselines = {"median_conv_rate_overall": 0.10}
          for slug, ev in data["events"].items():
              ev["anomalies"] = []
          ann = detect_anomalies(data, baselines)
          for a in ann:
              data["events"][a["event"]]["anomalies"].append(a)

          # 5. Write conversion_history.json
          import os
          os.makedirs("docs/state", exist_ok=True)
          with open("docs/state/conversion_history.json", "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(f"Wrote conversion_history.json with {len(data['events'])} events, {len(ann)} anomalies")
          PY

      - name: Upsert EVENT_ANALYTICS into launch_dashboard.html
        run: python3 scripts/upsert_event_analytics.py

      - name: Push to themakeupblowout-events repo (event_analytics.json)
        env:
          GH_PAT: ${{ secrets.EVENTS_REPO_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "⚠ EVENTS_REPO_PAT not set — skipping cross-repo push"
            exit 0
          fi
          git clone https://x-access-token:${GH_PAT}@github.com/laurenlev10/themakeupblowout-events.git /tmp/events
          cp docs/state/conversion_history.json /tmp/events/docs/state/event_analytics.json
          cd /tmp/events
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via marketing-stats)"
          git add docs/state/event_analytics.json
          if ! git diff --cached --quiet; then
            git commit -m "stats: refresh event_analytics.json (with funnel)"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: Commit local changes
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via marketing-stats)"
          git add docs/state/conversion_history.json docs/launch/index.html
          if ! git diff --cached --quiet; then
            git commit -m "stats: refresh conversion_history.json + EVENT_ANALYTICS map"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: Anomaly SMS alert (if any critical)
        if: success()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
        run: |
          python3 - <<'PY'
          import sys, json, os
          sys.path.insert(0, "scripts")

          history = json.load(open("docs/state/conversion_history.json"))
          critical = []
          for slug, ev in history.get("events", {}).items():
              for a in ev.get("anomalies", []):
                  if a.get("severity") == "critical":
                      critical.append({"slug": slug, **a})

          if not critical:
              print("· no critical anomalies — no SMS sent")
              sys.exit(0)

          # Compose short Hebrew SMS for first critical anomaly (cap to avoid SMS spam)
          a = critical[0]
          msg_lines = [
              "🚨 @stats anomaly:",
              a["slug"].replace("-", " ").title(),
              a.get("hypothesis", ""),
              "https://laurenlev10.github.io/lauren-agent-hub-data/stats/"
          ]
          if len(critical) > 1:
              msg_lines.insert(2, f"+ {len(critical)-1} more anomalies")
          msg = "\n".join(msg_lines)

          token = os.environ.get("SIMPLETEXTING_TOKEN")
          if not token:
              print(f"would have sent SMS:\n{msg}")
              sys.exit(0)

          try:
              from lauren_meta import send_sms
              send_sms(msg)
              print(f"✓ sent anomaly SMS to Lauren ({len(critical)} critical)")
          except Exception as e:
              print(f"⚠ SMS send failed: {e}")
              print(f"would have sent:\n{msg}")
          PY
