# VWAP Demo Broker Reconciler — hourly
#
# Pulls REAL fills from the Tradovate DEMO account (30647272), reconstructs
# completed round-trip trades (FIFO) with real P&L, and writes them to
# docs/trading/broker-ledger.json (the account-level "real execution" ledger).
# Per-strategy tracking lives in journal-data.json (indicator alert webhooks);
# this is the reality check. Idempotent by (entry_fill_id, exit_fill_id).
#
# Created 2026-06-29 per Lauren's request ("every hour pull the demo account
# trades into the journal"). Replaces the paused 5-min fill-reconciler.

name: vwap-demo-reconciler

on:
  schedule:
    - cron: '0 * * * *'      # top of every hour (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull demo fills -> broker-ledger.json
        env:
          TRADOVATE_NAME:     ${{ secrets.TRADOVATE_NAME }}
          TRADOVATE_PASSWORD: ${{ secrets.TRADOVATE_PASSWORD }}
          TRADOVATE_CID:      ${{ secrets.TRADOVATE_CID }}
          TRADOVATE_SEC:      ${{ secrets.TRADOVATE_SEC }}
        run: python3 scripts/vwap_demo_reconciler.py

      - name: Bump scheduled-runs.json + commit
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if p.exists():
              data = json.loads(p.read_text())
              now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
              for t in data.get("tasks", []):
                  if t.get("id") == "vwap-demo-reconciler":
                      t["lastRunAt"] = now
              data["_updated_at"] = now
              p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/trading/broker-ledger.json docs/scheduled-runs.json; then
            git add docs/trading/broker-ledger.json docs/scheduled-runs.json
            git commit -m "broker-ledger: hourly demo fills refresh"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
