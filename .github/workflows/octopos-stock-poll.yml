name: octopos-stock-poll

# Daily OCTOPOS inventory snapshot (Lauren 2026-05-12).
# Pulls all products from themakeup.octoretail.com, filters to Lauren's 15
# mapped suppliers, writes docs/state/octopos_products.json.
# Inventory dashboard reads that file to render per-supplier product lists
# with stock chips.

on:
  schedule:
    # 09:00 UTC = 2 AM PT — daily baseline (off-peak)
    - cron: '0 9 * * *'
    # 01:00 UTC Mon = 6 PM PDT Sunday — post-event snapshot.
    # Lauren orders Sunday evening, so the sales delta needs to be ready by 6:15 PM PT.
    - cron: '0 1 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OCTOPOS sync
        env:
          OCTOPOS_EMAIL:    ${{ secrets.OCTOPOS_EMAIL }}
          OCTOPOS_PASSWORD: ${{ secrets.OCTOPOS_PASSWORD }}
        run: python3 scripts/octopos_sync.py

      - name: Seed invoice archive from OCTOPOS POs
        # Rebuilds docs/state/invoice_archive.json from every received PO
        # so the per-product history on the dashboard stays current with
        # the OCTOPOS source-of-truth (Lauren 2026-05-21).
        run: python3 scripts/seed_archive_from_pos.py

      - name: Commit + push snapshot if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via octopos-stock-poll)"
          # Stage BOTH outputs of octopos_sync.py + the seeded archive — otherwise
          # they sit as unstaged work and block `git pull --rebase`.
          git add docs/state/octopos_products.json docs/state/octopos_stock_timeseries.json docs/state/invoice_archive.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "octopos: refresh products snapshot"
            # Retry push up to 3 times to survive races with other workflows pushing to main.
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "✓ pushed octopos snapshot (attempt $attempt)"
                break
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep $((attempt * 5))
            done
          else
            echo "no changes in octopos snapshot"
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "octopos-stock-poll":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump octopos-stock-poll lastRunAt"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "✓ pushed scheduled-runs bump (attempt $attempt)"
                break
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep $((attempt * 5))
            done
          fi

      # IRON RULE (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
