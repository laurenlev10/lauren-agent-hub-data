name: pr-influencer-reply-sync — link influencer replies back to the pipeline

# Set up 2026-07-12 (Lauren: "so it won't happen that someone answered and it
# got missed"). Reconciles inbound signals against contacted creators:
#   A. Collab form applications (token-free)  -> flip status to "ענתה — מעוניינת!"
#   B. Meta comments (fail-soft, needs META_PAGE_TOKEN) -> log as "review"
# Writes docs/pr-influencer/notes.json and SMSes Lauren on NEW replies only.

on:
  schedule:
    - cron: "40 */6 * * *"    # every 6h at :40 (offset from the daily digest)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconcile replies → notes.json + SMS Lauren
        env:
          SIMPLETEXTING_TOKEN:   ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:          ${{ secrets.LAUREN_PHONE || '4243547625' }}
          META_PAGE_TOKEN:       ${{ secrets.META_PAGE_TOKEN }}
          META_IG_BUSINESS_ID:   ${{ secrets.META_IG_BUSINESS_ID }}
          META_FB_PAGE_ID:       ${{ secrets.META_FB_PAGE_ID }}
        run: python3 scripts/pr_influencer_reply_sync.py

      - name: Commit notes.json if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/pr-influencer/notes.json; then
            git add docs/pr-influencer/notes.json
            git commit -m "pr-influencer-reply-sync: link inbound replies to pipeline"
            for i in 1 2 3; do
              git pull --rebase -X ours origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          else
            echo "no notes change"
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d["tasks"]:
              if t["id"] == "pr-influencer-reply-sync":
                  t["lastRunAt"] = now
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), ensure_ascii=False, indent=1)
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          git add docs/scheduled-runs.json
          git commit -m "scheduled-runs: bump pr-influencer-reply-sync lastRunAt" || exit 0
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push origin main && break
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
