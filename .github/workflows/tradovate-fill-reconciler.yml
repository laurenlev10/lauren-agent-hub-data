# Tradovate Fill Reconciler — every 5 minutes (Mon–Fri)
#
# Catches the edge case where Tradovate's bracket SL/TP fills but Pine's
# alert() never fires (e.g., intra-bar spike that reverses before bar close).
# Polls Tradovate /fill/list, compares with docs/trading/journal-data.json,
# writes synthetic EXIT rows for fills that aren't already journaled.
#
# Created 2026-05-26 per Lauren's request — see CLAUDE.md change-log.
# Idempotent: each row carries `tradovate_fill_id`; Pine-written rows are
# matched by direction + 3-min time window so reconciler doesn't duplicate.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   TRADOVATE_NAME      = Laurenlev318    (or whatever the demo account login is)
#   TRADOVATE_PASSWORD  = <Tradovate demo password>
#   TRADOVATE_CID       = 13601           (the appId numeric — already in Zapier code)
#   TRADOVATE_SEC       = <Tradovate API secret>
#   SIMPLETEXTING_TOKEN (already configured)
#   LAUREN_PHONE        (already configured)

name: tradovate-fill-reconciler

on:
  schedule:
    # Every 5 minutes Mon-Fri (futures trade 23h/day on weekdays)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconcile Tradovate fills → journal
        env:
          TRADOVATE_NAME:     ${{ secrets.TRADOVATE_NAME }}
          TRADOVATE_PASSWORD: ${{ secrets.TRADOVATE_PASSWORD }}
          TRADOVATE_CID:      ${{ secrets.TRADOVATE_CID }}
          TRADOVATE_SEC:      ${{ secrets.TRADOVATE_SEC }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: python3 scripts/tradovate_fill_reconciler.py

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          found = False
          for t in data.get("tasks", []):
              if t.get("id") == "tradovate-fill-reconciler":
                  t["lastRunAt"] = now
                  found = True
                  break
          if not found:
              # First run after registry add — task entry might exist but be missing lastRunAt
              pass
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump tradovate-fill-reconciler lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      # IRON RULE #3 (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
