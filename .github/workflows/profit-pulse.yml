name: profit-pulse — bi-weekly margin scan

# Phase 0 (2026-05-17 PM) — scaffold only. Algorithm in Scheduled/NEW/profit-pulse/scoring.md.
# Real scoring (Phase 1) replaces the placeholder step with: python3 scripts/profit_pulse_run.py

on:
  schedule:
    - cron: "0 5 * * 1"   # Sunday 22:00 PT (PST -8) = Monday 06:00 UTC. Staggered before slow-movers (which runs 06:00).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Phase 0 — log + skip
        run: |
          echo "@profit-pulse Phase 0 — scaffold only, no scoring yet."
          echo "See Scheduled/NEW/profit-pulse/SKILL.md for the algorithm."
          echo "First real run pending: scripts/profit_pulse_run.py (next sprint)."

      - name: Update scheduled-runs.json lastRunAt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d.get("tasks", []):
              if t.get("id") == "profit-pulse":
                  t["lastRunAt"] = now
                  break
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), indent=2, ensure_ascii=False)
          print(f"Bumped profit-pulse lastRunAt → {now}")
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump profit-pulse lastRunAt"
            git pull --rebase origin main
            git push origin main
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
