name: profit-pulse — weekly margin scan

# Phase 1 (2026-05-20) — real scoring. Algorithm spec: Scheduled/NEW/profit-pulse/scoring.md.
# Reads docs/state/octopos_products.json (refreshed daily by octopos-stock-poll), scores every
# active product, writes docs/state/profit_pulse.json. Lauren-decision fields are preserved.

on:
  schedule:
    - cron: "0 5 * * 1"   # Sunday 22:00 PT (PST -8) = Monday 06:00 UTC. Staggered before slow-movers (which runs 06:00).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run profit-pulse margin scan
        run: python3 scripts/profit_pulse_run.py

      - name: Commit profit_pulse.json if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via profit-pulse)"
          git add docs/state/profit_pulse.json
          if ! git diff --cached --quiet; then
            git commit -m "@profit-pulse: refresh margin snapshot"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "✓ pushed profit_pulse.json (attempt $attempt)"
                break
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep $((attempt * 5))
            done
          else
            echo "no changes in profit_pulse.json"
          fi

      - name: Update scheduled-runs.json lastRunAt
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d.get("tasks", []):
              if t.get("id") == "profit-pulse":
                  t["lastRunAt"] = now
                  break
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), indent=2, ensure_ascii=False)
          print(f"Bumped profit-pulse lastRunAt → {now}")
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump profit-pulse lastRunAt"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "✓ pushed scheduled-runs bump (attempt $attempt)"
                break
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep $((attempt * 5))
            done
          fi

      # IRON RULE #3 — SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
