# update-subscribe-target.yml — daily refresh of docs/state/subscribe_target.json.
#
# This file is fetched cross-origin by the public landing page at
# https://www.themakeupblowoutsale-group.com/subscribe-list/ (in the new
# `themakeupblowoutsale-group-site` repo) so the QR code at the event door
# always routes signups into the CURRENT event's SimpleTexting list.
#
# Picks "today's event" if today is in [start_date, end_date] of any event,
# otherwise the next upcoming event. Pulls form_id from event_form_ids.json
# and ig_reel_url from launch/notes.json.
#
# IRON RULE #4 compliant: registers in scheduled-runs.json + SMS on failure.
# Created 2026-05-11.

name: update-subscribe-target

on:
  schedule:
    # Monday at 15:00 UTC = 08:00 PT (PDT) / 07:00 PT (PST).
    # Refreshes the public events page once a week — events end Sunday night,
    # so Monday morning is when the rotation needs to happen.
    # Runs 1h before weekly-event-check (Mon 09:00 PT) so that workflow sees fresh data.
    # Lauren 2026-05-11: 'מספיק ביום שני בבוקר כדי לרענן את האירועים'.
    - cron: '0 15 * * 1'  # Monday 08:00 PT (was daily 06:00 PT — Lauren 2026-05-11)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute next-event subscribe target
        run: python3 scripts/update_subscribe_target.py

      - name: Commit + push if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          # NOTE: the script writes BOTH subscribe_target.json AND upcoming_events.json.
          # Staging only one left the other as an unstaged change, which made
          # `git pull --rebase` abort ("unstaged changes") and the push get rejected
          # on a non-fast-forward (this repo has ~30 workflows pushing to main).
          # Fix (2026-06-01): stage both, rebase on a clean tree, retry the push.
          git add docs/state/subscribe_target.json docs/state/upcoming_events.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "subscribe-target: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then
                echo "pushed on attempt $i"; break
              fi
              echo "push attempt $i failed, retrying in 5s..."; sleep 5
            done
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "update-subscribe-target":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump update-subscribe-target lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      # SMS Lauren + Eli on success — confirms the public QR landing page rotated to the new event.
      # Lauren 2026-05-11: 'כל יום שני תעדכן אותי בSMS'.
      # Lauren 2026-05-20: 'תשלח לי הודעת טקסט ברגע שהדף התעדכן אוטומטית? להודיע לי שהדף התעדכן בהצלחה?
      # כולל לינק לדף?' — body leads with QR LP confirmation + direct link to the page she actually
      # wants to verify (themakeupblowoutsale-group.com/subscribe-list/), not the events directory.
      # Lauren 2026-05-20 #2: 'תוכל כל שבוע לשלוח את אותה הודעה גם לאלי?' — added ELI_PHONE as a
      # co-recipient (per IRON RULE #4.C: weekly-digest-style content goes to Lauren + Eli, with
      # fail-soft per recipient so one bad number can't block the other).
      - name: SMS Lauren + Eli — QR LP refreshed
        if: success()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          ELI_PHONE:           ${{ secrets.ELI_PHONE }}
        run: |
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          sys.path.insert(0, "scripts")
          from lauren_sms import send_sms

          tgt = json.loads(Path("docs/state/subscribe_target.json").read_text())
          upc_path = Path("docs/state/upcoming_events.json")
          upc = json.loads(upc_path.read_text()) if upc_path.exists() else {"events": []}
          n = len(upc.get("events", []))
          city      = tgt.get("city", "?")
          state     = tgt.get("state", "")
          sd        = tgt.get("start_date", "")
          ed        = tgt.get("end_date", "")
          list_name = tgt.get("list_name", "")

          # Format dates as M/D
          def md(d):
              try: return f"{int(d[5:7])}/{int(d[8:10])}"
              except: return d
          dates = f"{md(sd)}-{md(ed)}" if sd and ed else sd

          # Body leads with QR LP confirmation + DIRECT link to the page Lauren wants to verify.
          # IRON RULE #6: no shorteners. Direct URL only.
          lines = [
              "✓ דף ה-QR LP עודכן אוטומטית",
              f"אירוע פעיל: {city}, {state} ({dates})",
          ]
          if list_name:
              lines.append(f"רשימת SMS: {list_name}")
          if n:
              lines.append(f"{n} אירועים קרובים בלו\"ז")
          lines.append("")
          lines.append("\U0001F517 לבדיקה:")
          lines.append("https://www.themakeupblowoutsale-group.com/subscribe-list/")
          body = "\n".join(lines)

          print("--- SMS body ---")
          print(body)

          # Multi-recipient (IRON RULE #4.C — weekly digest content goes to Lauren + Eli).
          # Fail-soft per recipient: one missing/bad number must not block the other.
          recipients = []
          for env_key, label in [("LAUREN_PHONE", "Lauren"), ("ELI_PHONE", "Eli")]:
              v = (os.environ.get(env_key) or "").strip()
              if v: recipients.append((label, v))
          if not recipients:
              raise SystemExit("⚠ no recipients configured (both LAUREN_PHONE and ELI_PHONE are missing)")
          for label, phone in recipients:
              try:
                  send_sms(phone, body)
                  print(f"  ✓ sent to {label} ({phone})")
              except Exception as e:
                  print(f"  ✗ SMS to {label} ({phone}) failed: {e}")
          print("sent.")
          PY

      # IRON RULE (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
