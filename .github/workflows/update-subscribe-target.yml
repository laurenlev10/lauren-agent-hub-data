# update-subscribe-target.yml — daily refresh of docs/state/subscribe_target.json.
#
# This file is fetched cross-origin by the public landing page at
# https://www.themakeupblowoutsale-group.com/subscribe-list/ (in the new
# `themakeupblowoutsale-group-site` repo) so the QR code at the event door
# always routes signups into the CURRENT event's SimpleTexting list.
#
# Picks "today's event" if today is in [start_date, end_date] of any event,
# otherwise the next upcoming event. Pulls form_id from event_form_ids.json
# and ig_reel_url from launch/notes.json.
#
# IRON RULE #4 compliant: registers in scheduled-runs.json + SMS on failure.
# Created 2026-05-11.

name: update-subscribe-target

on:
  schedule:
    # Monday at 15:00 UTC = 08:00 PT (PDT) / 07:00 PT (PST).
    # Refreshes the public events page once a week — events end Sunday night,
    # so Monday morning is when the rotation needs to happen.
    # Runs 1h before weekly-event-check (Mon 09:00 PT) so that workflow sees fresh data.
    # Lauren 2026-05-11: 'מספיק ביום שני בבוקר כדי לרענן את האירועים'.
    - cron: '0 15 * * 1'  # Monday 08:00 PT (was daily 06:00 PT — Lauren 2026-05-11)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute next-event subscribe target
        run: python3 scripts/update_subscribe_target.py

      - name: Commit + push if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          if ! git diff --quiet docs/state/subscribe_target.json; then
            git add docs/state/subscribe_target.json
            git commit -m "subscribe-target: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main || true
            git push origin main
          else
            echo "No changes."
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "update-subscribe-target":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump update-subscribe-target lastRunAt"
            git pull --rebase origin main || true
            git push origin main
          fi

      # SMS Lauren on success (Lauren 2026-05-11: 'כל יום שני תעדכן אותי בSMS')
      - name: SMS Lauren — events page refreshed
        if: success()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          sys.path.insert(0, "scripts")
          from lauren_sms import send_sms, LAUREN_PHONE

          tgt = json.loads(Path("docs/state/subscribe_target.json").read_text())
          upc = json.loads(Path("docs/state/upcoming_events.json").read_text())
          n = len(upc.get("events", []))
          city = tgt.get("city", "?")
          state = tgt.get("state", "")
          sd = tgt.get("start_date", "")
          ed = tgt.get("end_date", "")
          # Format dates as M/D
          def md(d):
              try: return f"{int(d[5:7])}/{int(d[8:10])}"
              except: return d
          dates = f"{md(sd)}-{md(ed)}" if sd and ed else sd

          body = (
              "✓ דף האירועים עודכן.\n"
              f"אירוע קרוב: {city}, {state} ({dates}).\n"
              f"{n} אירועים בלו\"ז הקרוב.\n"
              "https://events.themakeupblowout.com/"
          )
          print("--- SMS body ---")
          print(body)
          send_sms(LAUREN_PHONE, body)
          print("sent.")
          PY

      # IRON RULE (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
