name: pr-influencer-t30 — daily T-30 pr-influencer reminder

# Set up 2026-07-01 (Lauren: "SMS כן"). Checks docs/state/pr_influencer_t30.json
# (written by the manager-report Worker from events.themakeupblowout.com/collab/)
# and SMSes Lauren a Hebrew digest of applications newer than the watermark.

on:
  schedule:
    - cron: "30 14 * * *"     # daily 15:00 UTC (08:00 PT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: T-30 reminder check → SMS Lauren
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: python3 scripts/pr_influencer_t30.py

      - name: Commit watermark if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/state/pr_influencer_t30.json; then
            git add docs/state/pr_influencer_t30.json
            git commit -m "pr-influencer-t30: mark notified events"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          else
            echo "no watermark change"
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d["tasks"]:
              if t["id"] == "pr-influencer-t30":
                  t["lastRunAt"] = now
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), ensure_ascii=False, indent=1)
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          git add docs/scheduled-runs.json
          git commit -m "scheduled-runs: bump pr-influencer-t30 lastRunAt" || exit 0
          for i in 1 2 3; do
            git pull --rebase -X theirs origin main && git push origin main && break
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 5 + 2))
          done

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
