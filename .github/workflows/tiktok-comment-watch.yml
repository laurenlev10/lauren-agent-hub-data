name: TikTok comment-support watch (monthly — pings Lauren when it becomes possible)

# Lauren's TikTok campaigns are Smart+, which TikTok's comment API does NOT
# support (verified 2026-07-07). So the every-3h tiktok-inbox agent returns
# nothing today. This monthly watcher samples the async comment export and SMSes
# Lauren the moment ANY export COMPLETES — i.e. TikTok added Smart+ support or a
# non-Smart+ campaign is live — at which point tiktok-inbox handles comments
# automatically. Silent while still unsupported.
#
# Intentionally NOT registered in scheduled-runs.json: a monthly cadence is
# rarer than the registry's weekly LATE threshold (would false-flag LATE). The
# IRON RULE #3 failure-SMS step below still covers real failures.

on:
  schedule:
    - cron: "0 15 1 * *"   # 1st of each month, 15:00 UTC
  workflow_dispatch: {}

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check TikTok comment support
        env:
          TIKTOK_COMMENT_TOKEN: ${{ secrets.TIKTOK_COMMENT_TOKEN }}
          TIKTOK_ACCESS_TOKEN:  ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_ADVERTISER_ID: ${{ secrets.TIKTOK_ADVERTISER_ID }}
          SIMPLETEXTING_TOKEN:  ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:         ${{ secrets.LAUREN_PHONE }}
        run: python3 scripts/tiktok_comment_watch.py

      # IRON RULE #3 (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
