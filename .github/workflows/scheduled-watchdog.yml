# Scheduled-task watchdog
#
# Lauren's directive (2026-05-10 PM): "במקרים של משימות אחרות שלא
# רצות חלק אני רוצה לקבל תמיד הודעת טקסט". This workflow runs every
# 4 hours, reads docs/scheduled-runs.json, and SMSes Lauren if any
# enabled task hasn't run within its frequency threshold.
#
# Anti-spam: tracks last-alert-time per task in
# docs/state/watchdog_alerts.json — same task only re-alerts after
# 12h gap, so a long-stuck workflow doesn't pager-bomb Lauren.

name: scheduled-watchdog

on:
  schedule:
    # Every 4 hours at :45 (offset from other crons: refresh-meta :07,
    # registrations-6h :15, marketing-stats :30).
    - cron: '45 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run watchdog
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: python3 scripts/scheduled_watchdog.py

      - name: Commit watchdog state if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          if ! git diff --quiet docs/state/watchdog_alerts.json 2>/dev/null; then
            git add docs/state/watchdog_alerts.json
            git commit -m "watchdog: update alert timestamps"
            git pull --rebase origin main || true
            git push origin main
          fi

      # IRON RULE (Lauren 2026-05-10): SMS Lauren if THIS workflow fails.
      # (It would be ironic if the watchdog itself silently failed.)
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
