name: Daily @meta inbox triage (Phase 2 — Bucket A auto-reply LIVE)

# Runs EVERY 3 HOURS (was daily) so auto-replies happen within Meta's 24-hour
# Messenger window. Lauren's directive 2026-05-20 PM #3: "תידע לענות איך
# שהיא מקבלת את ההודעה ושלא תשלח לי לאישור אלא כמה שפחות".
#
# Phase 2 (since 2026-05-08) = AUTO-REPLY for Bucket A + preview Bucket B for Lauren. Generates the static preview page
# at /meta/inbox-api-preview/ and SMSes Lauren a summary so she can review on
# her phone before drafting/replying manually.
#
# Required GitHub Secrets (Lauren must add manually via repo Settings):
#   META_PAGE_TOKEN       — the never-expiring Page Access Token
#   META_IG_BUSINESS_ID   — IG Business Account ID
#   META_FB_PAGE_ID       — FB Page ID
#   SIMPLETEXTING_TOKEN   — for the SMS touchpoints (already used by other workflows)
#   LAUREN_PHONE          — 4243547625
#
# To trigger manually: Actions tab → "Daily @meta inbox triage" → Run workflow.

on:
  schedule:
    # 2026-05-20 PM #3 — every 3 hours so auto-replies fire well inside Meta's
    # 24-hour Messenger window (was once-daily; new messages could sit up to 23
    # hours before being auto-replied, dangerously close to the limit).
    - cron: "0 */3 * * *"   # every 3 hours at :00 UTC
  workflow_dispatch:
    inputs:
      force_send_replies:
        description: 'Force LIVE auto-reply for Bucket A (default false = preview only)'
        type: boolean
        default: false
      force_send_sms:
        description: 'Force send SMS digest (default false)'
        type: boolean
        default: false
      bulk_mark_handled:
        description: 'Mark ALL items as handled WITHOUT sending (manual cleanup)'
        type: boolean
        default: false

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install python-docx
        run: python3 -m pip install python-docx --quiet

      - name: Run @meta inbox preview
        env:
          META_PAGE_TOKEN:     ${{ secrets.META_PAGE_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          META_FB_PAGE_ID:     ${{ secrets.META_FB_PAGE_ID }}
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 2026-05-20 PM #4 — Lauren's directive: SMS once a day, not every 3h.
            # Auto-reply runs every 3h (kept fast for Meta 24h window), but the
            # SMS digest only fires on the 03:00 UTC run (= 8 PM PDT / 7 PM PST).
            UTC_HOUR=$(date -u +%H)
            if [ "$UTC_HOUR" = "03" ]; then
              echo "Cron @ 03:00 UTC — LIVE auto-reply + SMS digest"
              ARGS="--send-sms --reply-bucket-a"
            else
              echo "Cron @ $UTC_HOUR:00 UTC — LIVE auto-reply only (no SMS)"
              ARGS="--reply-bucket-a"
            fi
          else
            if [ "${{ inputs.force_send_replies }}" = "true" ]; then
              ARGS="$ARGS --reply-bucket-a"
              echo "Manual trigger — LIVE Bucket A auto-reply enabled"
            fi
            if [ "${{ inputs.force_send_sms }}" = "true" ]; then
              ARGS="$ARGS --send-sms"
              echo "Manual trigger — SMS enabled"
            fi
            if [ "${{ inputs.bulk_mark_handled }}" = "true" ]; then
              ARGS="$ARGS --bulk-mark-handled"
              echo "Manual trigger — BULK MARK ALL HANDLED"
            fi
            if [ -z "$ARGS" ]; then
              echo "Manual trigger — preview only"
            fi
          fi
          python3 scripts/meta_inbox_preview.py $ARGS

      - name: Commit + push if preview or handled.json changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          git add docs/meta/inbox-api-preview/ docs/meta/handled.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "@meta daily triage: $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
            echo "✓ pushed updates"
          else
            echo "no changes to commit"
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PYIRON4'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "meta-inbox-check":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PYIRON4

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump meta-inbox-check lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      # IRON RULE (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      # Notify-on-failure is mandatory for every scheduled workflow in this repo.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
