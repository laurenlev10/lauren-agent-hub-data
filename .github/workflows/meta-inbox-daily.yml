name: Daily @meta inbox triage (Phase 2 — Bucket A auto-reply LIVE)

# Runs every day at 8 PM Lauren-local (PDT) — 03:00 UTC.
# In PST (Nov–Mar) this becomes 7 PM local — accept the seasonal shift.
#
# Phase 2 (since 2026-05-08) = AUTO-REPLY for Bucket A + preview Bucket B for Lauren. Generates the static preview page
# at /meta/inbox-api-preview/ and SMSes Lauren a summary so she can review on
# her phone before drafting/replying manually.
#
# Required GitHub Secrets (Lauren must add manually via repo Settings):
#   META_PAGE_TOKEN       — the never-expiring Page Access Token
#   META_IG_BUSINESS_ID   — IG Business Account ID
#   META_FB_PAGE_ID       — FB Page ID
#   SIMPLETEXTING_TOKEN   — for the SMS touchpoints (already used by other workflows)
#   LAUREN_PHONE          — 4243547625
#
# To trigger manually: Actions tab → "Daily @meta inbox triage" → Run workflow.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC = 8 PM PDT (May–Oct) / 7 PM PST (Nov–Mar)
  workflow_dispatch:
    inputs:
      force_send_replies:
        description: 'Force LIVE auto-reply for Bucket A (default false = preview only)'
        type: boolean
        default: false
      force_send_sms:
        description: 'Force send SMS digest (default false)'
        type: boolean
        default: false
      bulk_mark_handled:
        description: 'Mark ALL items as handled WITHOUT sending (manual cleanup)'
        type: boolean
        default: false

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install python-docx
        run: python3 -m pip install python-docx --quiet

      - name: Run @meta inbox preview
        env:
          META_PAGE_TOKEN:     ${{ secrets.META_PAGE_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          META_FB_PAGE_ID:     ${{ secrets.META_FB_PAGE_ID }}
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Daily cron — LIVE Phase 2 auto-reply + SMS"
            ARGS="--send-sms --reply-bucket-a"
          else
            if [ "${{ inputs.force_send_replies }}" = "true" ]; then
              ARGS="$ARGS --reply-bucket-a"
              echo "Manual trigger — LIVE Bucket A auto-reply enabled"
            fi
            if [ "${{ inputs.force_send_sms }}" = "true" ]; then
              ARGS="$ARGS --send-sms"
              echo "Manual trigger — SMS enabled"
            fi
            if [ "${{ inputs.bulk_mark_handled }}" = "true" ]; then
              ARGS="$ARGS --bulk-mark-handled"
              echo "Manual trigger — BULK MARK ALL HANDLED"
            fi
            if [ -z "$ARGS" ]; then
              echo "Manual trigger — preview only"
            fi
          fi
          python3 scripts/meta_inbox_preview.py $ARGS

      - name: Commit + push if preview or handled.json changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          git add docs/meta/inbox-api-preview/ docs/meta/handled.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "@meta daily triage: $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main || true
            git push origin main
            echo "✓ pushed updates"
          else
            echo "no changes to commit"
          fi
