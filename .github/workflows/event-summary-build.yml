name: event-summary-build — Sunday 18:30 local @ event location (after recount)

# Builds the post-event review JSON for the current week's event.
# Fires after recount-weekly (17:15 local) — same cron-coverage pattern.

on:
  schedule:
    - cron: "30 22 * * 0"     # Sun 18:30 EDT
    - cron: "30 23 * * 0"     # Sun 18:30 CDT
    - cron: "30 0  * * 1"     # Sun 18:30 MDT
    - cron: "30 1  * * 1"     # Sun 18:30 PDT
    - cron: "30 2  * * 1"     # Sun 18:30 PST (winter)
  workflow_dispatch:
    inputs:
      evkey:
        description: "Override: city-slug-YYYY-MM-DD (leave empty for --auto = most recent past event)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build event summary
        env:
          OCTOPOS_EMAIL:    ${{ secrets.OCTOPOS_EMAIL }}
          OCTOPOS_PASSWORD: ${{ secrets.OCTOPOS_PASSWORD }}
          OCTOPOS_TOKEN:    ${{ secrets.OCTOPOS_TOKEN }}
          EVKEY:            ${{ github.event.inputs.evkey }}
        run: |
          if [ -n "$EVKEY" ]; then
            python3 scripts/event_summary_build.py --evkey "$EVKEY"
          else
            python3 scripts/event_summary_build.py --auto
          fi

      - name: Commit event summary if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/state/event_summary/; then
            git add docs/state/event_summary/
            git commit -m "@event-summary: post-event build (cron fire)"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          else
            echo "no changes — most recent event already built"
          fi

      - name: Update scheduled-runs.json lastRunAt
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d.get("tasks", []):
              if t.get("id") == "event-summary-build":
                  t["lastRunAt"] = now
                  break
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), indent=2, ensure_ascii=False)
          print(f"Bumped event-summary-build lastRunAt → {now}")
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump event-summary-build lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
