name: Meta — moderate comment (hide/delete/block, on demand)

# Triggered by repository_dispatch from the @meta inbox dashboard's
# 🙈 Hide / 🗑️ Delete / 🚫 Block buttons.
# client_payload = {dedup_key, comment_id, platform, action}
#   action   : "hide" | "delete" | "block"
#   platform : "fb" | "ig"
# Uses the server-side META_PAGE_TOKEN secret (same as meta-send-reply).
# Writes a per-item result to docs/meta/moderation_results.json (on BOTH success
# and failure) so the dashboard can show the real outcome fast, and marks the
# item handled in docs/meta/handled.json ONLY on success.

on:
  repository_dispatch:
    types: [moderate-meta-comment]

jobs:
  moderate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Moderate Meta comment
        id: moderate
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_FB_PAGE_ID: ${{ secrets.META_FB_PAGE_ID }}
          PAYLOAD_JSON:    ${{ toJSON(github.event.client_payload) }}
        run: |
          python3 - <<'PY'
          import os, sys, json, datetime, time, urllib.error
          sys.path.insert(0, "scripts")
          from lauren_meta import hide_comment, delete_comment, block_commenter

          payload  = json.loads(os.environ.get("PAYLOAD_JSON") or "{}")
          action   = (payload.get("action") or "").lower()
          cid      = payload.get("comment_id", "")
          platform = (payload.get("platform") or "").lower()
          dkey     = payload.get("dedup_key", "")
          ig       = (platform == "ig")
          now_iso  = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          print(f"Moderate: action={action} platform={platform} comment_id={cid[:24]}... dkey={dkey}")

          ACTION_HE = {"hide": "הסתרה", "delete": "מחיקה", "block": "חסימה"}
          state = {"reason": ""}   # holder so helpers can set the human reason

          def _emit_error_detail(reason: str, hebrew: str):
              state["reason"] = hebrew
              gh_env = os.environ.get("GITHUB_ENV", "")
              if not gh_env: return
              try:
                  with open(gh_env, "a") as f:
                      f.write(f"ERROR_DETAIL<<EOF_DETAIL\n{hebrew}\nפריט: {dkey}\nEOF_DETAIL\n")
                      f.write(f"ERROR_CATEGORY={reason}\n")
              except Exception as e:
                  print(f"⚠ couldn't write GITHUB_ENV: {e}")

          def _classify(body_text: str, code=None, subcode=None) -> tuple:
              t = (body_text or "").lower()
              # Order matters: a truly-gone object returns code 100 / subcode 33 whose
              # generic message ALSO says "missing permissions" — so check "gone" first.
              if subcode == 33 or any(k in t for k in ["does not exist", "not exist", "cannot be loaded", "deleted", "unsupported get request", "unsupported post request"]):
                  return ("gone", "❌ התגובה כבר לא קיימת ב-Meta (כנראה נמחקה ע\"י המגיב). אין מה להסתיר/למחוק — אפשר 'סמני כטופל'.")
              if "rate" in t or "too many" in t or ("limit" in t and "rate" in t):
                  return ("rate_limit", "❌ יותר מדי בקשות ל-Meta כרגע. המתיני 10 דק' ונסי שוב.")
              if "permission" in t:
                  return ("permission", "❌ חסרה הרשאה ל-Meta API לפעולה הזו.")
              clipped = (body_text or "")[:140].replace("\n", " ")
              return ("unknown", f"❌ {clipped}")

          ok = False
          for attempt in (1, 2):
              try:
                  if action == "hide":
                      resp = hide_comment(cid, ig=ig)
                  elif action == "delete":
                      resp = delete_comment(cid)
                  elif action == "block":
                      if ig:
                          _emit_error_detail("ig_no_block",
                              "ℹ️ לאינסטגרם אין חסימה דרך API — פתחי את הפרופיל וחסמי ידנית.")
                          break
                      resp = block_commenter(cid)
                  else:
                      _emit_error_detail("bad_action", f"❌ פעולה לא מוכרת: {action}")
                      break
                  print(f"✓ {action} OK (attempt {attempt}): {resp}")
                  ok = True; break
              except urllib.error.HTTPError as e:
                  body = ""
                  try: body = e.read().decode("utf-8", errors="replace")
                  except Exception: pass
                  sub = None
                  try: sub = json.loads(body).get("error", {}).get("error_subcode")
                  except Exception: pass
                  cat, he = _classify(body, subcode=sub)
                  print(f"❌ Meta HTTP {e.code} sub={sub} ({cat}): {body[:400]}")
                  _emit_error_detail(cat, f"{ACTION_HE.get(action, action)}: {he}")
                  break
              except RuntimeError as e:
                  if str(e) == "no_identity":
                      _emit_error_detail("no_identity",
                          "❌ Meta לא חושפת את זהות המגיב — לא ניתן לחסום דרך API. חסמי ידנית מהפוסט.")
                  else:
                      _emit_error_detail("runtime", f"❌ {ACTION_HE.get(action, action)} נכשלה: {str(e)[:120]}")
                  break
              except (TimeoutError, OSError) as e:
                  print(f"⚠ timeout attempt {attempt}: {e}")
                  if attempt == 1:
                      time.sleep(3); continue
                  _emit_error_detail("timeout", f"⏱ Meta לא ענה (timeout) על {ACTION_HE.get(action, action)}. נסי שוב.")
                  break
              except Exception as e:
                  print(f"❌ unexpected: {type(e).__name__}: {e}")
                  _emit_error_detail("unexpected", f"❌ {type(e).__name__}: {str(e)[:120]}")
                  break

          # --- Write the per-item result (success AND failure) so the dashboard
          #     can react fast + show the real reason. Capped to last 150 items.
          rpath = "docs/meta/moderation_results.json"
          try:
              results = json.load(open(rpath)) if os.path.exists(rpath) else {}
          except Exception:
              results = {}
          results[dkey] = {
              "action": action, "ok": bool(ok),
              "reason": ("✓ בוצע" if ok else (state["reason"] or "❌ נכשל")),
              "at": now_iso,
          }
          if len(results) > 150:
              items = sorted(results.items(), key=lambda kv: kv[1].get("at", ""))[-150:]
              results = dict(items)
          json.dump(results, open(rpath, "w"), indent=2, ensure_ascii=False)
          print(f"✓ wrote result ok={ok} to {rpath}")

          # --- Mark handled ONLY on success (so failed items stay in the queue) ---
          if ok and dkey:
              hpath = "docs/meta/handled.json"
              try:
                  data = json.load(open(hpath)) if os.path.exists(hpath) else {}
                  data[dkey] = {"handled": True, "handledAt": now_iso, "via": f"moderate-{action}"}
                  json.dump(data, open(hpath, "w"), indent=2, ensure_ascii=False)
                  print(f"✓ Marked {dkey} handled ({action})")
              except Exception as e:
                  print(f"⚠ Failed to update handled.json: {e}")

          if not ok:
              sys.exit(1)
          PY

      - name: Commit result + handled updates
        if: always()
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via meta-moderate)"
          git add docs/meta/moderation_results.json docs/meta/handled.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
              git commit -m "@meta: moderation result (hide/delete/block)"
              for i in 1 2 3; do
                git pull --rebase -X theirs origin main && git push origin main && break
                git rebase --abort 2>/dev/null || true
                sleep $((RANDOM % 5 + 2))
              done
          fi

      # IRON RULE #3 (Lauren 2026-05-10): SMS Lauren on failure.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ERROR_DETAIL:        ${{ env.ERROR_DETAIL }}
          ERROR_CATEGORY:      ${{ env.ERROR_CATEGORY }}
        run: python3 scripts/notify_failure.py
