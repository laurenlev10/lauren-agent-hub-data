name: tracking-check — daily 14:00 UTC (shipment status for supplier orders)

# Set up 2026-06-10 (Lauren: per-supplier tracking numbers on the inventory
# dashboard + "איפה החבילה עכשיו?" button). Reads every tracking number saved on
# orders in docs/state/inventory_orders.json, queries the UPS Track API
# (secrets UPS_CLIENT_ID / UPS_CLIENT_SECRET — fail-soft if missing), and
# writes docs/state/tracking_status.json for the dashboard. Runs ONLY when
# dispatched from the dashboard's "📦 איפה החבילות?" popup (no schedule).

# Lauren 2026-06-10: manual ONLY — no cron. Most days there are no shipments in
# transit, so the check runs solely from the dashboard's 📦 button (or Actions tab).
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shipment tracking statuses
        env:
          UPS_CLIENT_ID:     ${{ secrets.UPS_CLIENT_ID }}
          UPS_CLIENT_SECRET: ${{ secrets.UPS_CLIENT_SECRET }}
        run: python3 scripts/check_tracking.py

      - name: Commit changes if any
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/state/tracking_status.json; then
            git add docs/state/tracking_status.json
            git commit -m "tracking-check: refresh shipment statuses"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          else
            echo "no changes — statuses unchanged"
          fi

      - name: Update scheduled-runs.json lastRunAt
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d.get("tasks", []):
              if t.get("id") == "tracking-check":
                  t["lastRunAt"] = now
                  break
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), indent=2, ensure_ascii=False)
          print(f"Bumped tracking-check lastRunAt -> {now}")
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump tracking-check lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
