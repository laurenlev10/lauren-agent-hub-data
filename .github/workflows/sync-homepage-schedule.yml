name: sync-homepage-schedule

# Monday 09:00 PT — keep the main site (themakeupblowout.com) tour schedule current.
# Reads the master SCHEDULE map (docs/launch/index.html), keeps confirmed events with
# end_date >= today (PT), and rewrites src/lib/schedule-data.ts in beauty-bash-usa.
# Pushing there makes Lovable auto-publish the updated homepage. Successor to the old
# weekly maintenance of events.themakeupblowout.com. (Lauren approved 2026-05-30.)

on:
  schedule:
    - cron: '0 16 * * 1'   # 16:00 UTC Mon = 09:00 PT (PDT) / 08:00 PT (PST) — same convention as weekly-event-check
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync homepage schedule -> beauty-bash-usa
        id: sync
        env:
          GH_PAT: ${{ secrets.EVENTS_REPO_PAT }}
        run: |
          python3 --version
          if [ -z "$GH_PAT" ]; then
            echo "FATAL: EVENTS_REPO_PAT secret not set"; exit 1
          fi
          python3 scripts/sync_homepage_schedule.py

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "sync-homepage-schedule":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump sync-homepage-schedule lastRunAt"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: SMS Lauren — schedule changed, click Update to publish
        if: steps.sync.outputs.changed == 'true'
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
        run: |
          python3 - <<'PYIN'
          import os
          try:
              from lauren_sms import send_sms
          except Exception:
              import sys; sys.path.insert(0, "scripts"); from lauren_sms import send_sms
          phone = os.environ.get("LAUREN_PHONE", "").strip()
          body = ("\U0001F5D3\uFE0F \u05dc\u05d5\u05d7 \u05d4\u05d0\u05d9\u05e8\u05d5\u05e2\u05d9\u05dd \u05d1\u05d3\u05e3 \u05d4\u05d1\u05d9\u05ea \u05e2\u05d5\u05d3\u05db\u05df. "
                  "\u05dc\u05d7\u05e6\u05d9 Update \u05d1-Lovable \u05db\u05d3\u05d9 \u05dc\u05e4\u05e8\u05e1\u05dd: "
                  "https://lovable.dev/projects/0b757644-8f54-4d25-9380-f58f7f38386b")
          send_sms(phone, body)
          print("reminder SMS sent")
          PYIN

      # IRON RULE (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
