name: venue-updates-weekly
# Weekly heads-up of NEW venue correspondence on upcoming events (Lauren 2026-06-30).
# Refreshes email logs + relationship summaries, then SMSes Lauren + Eli what's new.
on:
  schedule:
    - cron: "0 15 * * 1"   # Monday 8 AM PT
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  venue-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh venue email logs + relationship summaries
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/venue_email_digest.py || echo "venue email digest partial — continuing"
          python3 scripts/venue_relationship_sync.py
      - name: Commit if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          git add docs/state/venue_payments.json
          if ! git diff --cached --quiet; then
            git commit -m "venue: weekly email + relationship summary refresh"
            git pull --no-rebase -X ours origin main
            git push origin main
          fi
      - name: SMS Lauren + Eli — what's new this week
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          ELI_PHONE:           ${{ secrets.ELI_PHONE }}
        run: python3 scripts/venue_updates_weekly.py
      - name: Update scheduled-runs lastRunAt
        run: |
          python3 - <<'PY'
          import json, datetime
          p = "docs/scheduled-runs.json"
          d = json.load(open(p, encoding="utf-8"))
          now = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d["tasks"]:
              if t["id"] == "venue-updates-weekly":
                  t["lastRunAt"] = now
          d["_updated_at"] = now
          json.dump(d, open(p, "w", encoding="utf-8"), indent=2, ensure_ascii=False)
          PY
          git add docs/scheduled-runs.json
          if ! git diff --cached --quiet; then
            git commit -m "scheduled-runs: bump venue-updates-weekly lastRunAt"
            git pull --no-rebase -X ours origin main
            git push origin main
          fi
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
