name: manager-report-sync — daily 15:00 UTC (propagate final manager reports)

# Set up 2026-06-08. When a manager submits a FINAL event report (manager_reports.json),
# this propagates it into (A) that event's P&L (staff/meals/other + cash) and (B) the NEXT
# event's GARAGE prep notes on the inventory dashboard. Pure repo-JSON, no external tokens.
# Idempotent — safe to run daily.

on:
  schedule:
    - cron: "0 15 * * *"     # daily 15:00 UTC (08:00 PT)
  workflow_dispatch:
    inputs:
      evkey:
        description: "Override: process only this evkey (leave empty for all finals)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Propagate manager reports
        env:
          EVKEY: ${{ github.event.inputs.evkey }}
        run: |
          if [ -n "$EVKEY" ]; then
            python3 scripts/manager_report_sync.py --evkey "$EVKEY"
          else
            python3 scripts/manager_report_sync.py
          fi

      - name: Commit changes if any
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/state/event_pnl/ docs/state/inventory_orders.json; then
            git add docs/state/event_pnl/ docs/state/inventory_orders.json
            git commit -m "manager-report-sync: propagate final reports → P&L + next-event GARAGE notes"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          else
            echo "no changes — all final reports already propagated"
          fi

      - name: Update scheduled-runs.json lastRunAt
        run: |
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          p = "docs/scheduled-runs.json"
          d = json.load(open(p))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in d.get("tasks", []):
              if t.get("id") == "manager-report-sync":
                  t["lastRunAt"] = now
                  break
          d["_updated_at"] = now
          json.dump(d, open(p, "w"), indent=2, ensure_ascii=False)
          print(f"Bumped manager-report-sync lastRunAt -> {now}")
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump manager-report-sync lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
