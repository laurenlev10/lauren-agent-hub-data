# Daily SimpleTexting signups digest — once-a-day SMS to Lauren + Eli with
# every UPCOMING event's active SMS-list count + how many signed up today.
#
# Lauren's request (2026-06-25): "אני רוצה לדעת כמות הרשמות כל יום" — the
# SimpleTexting list counts lived only on the launch dashboard; this turns
# them into a daily text. Runs at 16:30 UTC, just after the :15 registrations
# sync so LIST_STATS history is fresh for an accurate daily delta.

name: daily-signups-digest

on:
  schedule:
    # 16:30 UTC daily = 09:30 PDT / 08:30 PST (after the :15 registrations-6h sync)
    - cron: '30 16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # to bump scheduled-runs.json lastRunAt

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send daily SimpleTexting signups digest SMS
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          ELI_PHONE:           ${{ secrets.ELI_PHONE }}
        run: python3 scripts/lauren_signups_sms.py

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "daily-signups-digest":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          print(f"updated lastRunAt = {now}")
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump daily-signups-digest lastRunAt"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 5 + 2))
            done
          fi

      # IRON RULE #3 (Lauren 2026-05-10): SMS Lauren if this workflow fails.
      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
