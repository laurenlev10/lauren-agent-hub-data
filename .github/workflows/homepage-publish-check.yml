name: homepage-publish-check

# Checks whether the LIVE homepage (themakeupblowout.com) already shows the current
# event, and writes docs/state/homepage_status.json. Powers the 🏠 Home Page button
# on the launch dashboard (green = published & current, black = needs a Publish click
# in the Lovable editor). Lovable does NOT auto-publish on git push (verified 2026-06-01),
# so this tells Lauren when a manual Publish is still pending. Created 2026-06-01.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min — homepage changes weekly, but this makes the
                              # button flip green within ~30 min of Lauren clicking Publish.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check live homepage vs current event
        run: python3 scripts/homepage_publish_check.py

      - name: Commit homepage_status.json if changed
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name  "Lauren (via Actions)"
          if ! git diff --quiet docs/state/homepage_status.json; then
            git add docs/state/homepage_status.json
            git commit -m "homepage-status: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then
                echo "pushed on attempt $i"; break
              fi
              echo "push attempt $i failed, retrying in 5s..."; sleep 5
            done
          else
            echo "No change."
          fi

      - name: Update scheduled-runs.json (refresh lastRunAt)
        run: |
          python3 - <<'PY'
          import json, datetime
          from pathlib import Path
          p = Path("docs/scheduled-runs.json")
          if not p.exists():
              raise SystemExit(0)
          data = json.loads(p.read_text())
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          for t in data.get("tasks", []):
              if t.get("id") == "homepage-publish-check":
                  t["lastRunAt"] = now
                  break
          data["_updated_at"] = now
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False))
          PY

      - name: Commit scheduled-runs.json bump
        run: |
          git config user.email "lauren@noreply.github.com"
          git config user.name "Lauren (via Actions)"
          if ! git diff --quiet docs/scheduled-runs.json; then
            git add docs/scheduled-runs.json
            git commit -m "scheduled-runs: bump homepage-publish-check lastRunAt"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then break; fi
              sleep 5
            done
          fi

      - name: SMS Lauren on failure
        if: failure()
        env:
          SIMPLETEXTING_TOKEN: ${{ secrets.SIMPLETEXTING_TOKEN }}
          LAUREN_PHONE:        ${{ secrets.LAUREN_PHONE || '4243547625' }}
          WORKFLOW_NAME:       ${{ github.workflow }}
          JOB_NAME:            ${{ github.job }}
          RUN_URL:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_failure.py
